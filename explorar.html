<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --verde: #32CD32; --negro: #0E0E0E; --blanco: #F8F8F5; --gris: #F2F3F0; }
        
        body { background: var(--gris); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { background: var(--negro); color: white; padding: 55px 20px 25px; border-radius: 0 0 30px 30px; z-index: 100; }
        .header h1 { font-family: 'Syne'; font-size: 1.8rem; margin-bottom: 15px; }
        .search-wrap { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 1rem; }

        /* CUADRÍCULA DE PRODUCTOS (IMÁGENES GRANDES) */
        #grid { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 15px; 
            overflow-y: auto; 
            padding-bottom: 100px;
        }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
        
        .prod-img { width: 100%; height: 180px; background: #eee; position: relative; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .tag-cat { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

        .prod-body { padding: 10px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .prod-nombre { font-size: 0.9rem; font-weight: 700; color: var(--negro); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .prod-precio { color: var(--verde); font-weight: 800; font-size: 1.1rem; }
        .prod-min { font-size: 0.7rem; color: #999; font-weight: 600; }

        /* MODAL DE DETALLE (CORREGIDO PARA TU IMAGEN) */
        #modal-detalle { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 2000; 
            align-items: flex-end; /* Abre desde abajo */
        }
        .modal-cont { 
            background: white; 
            width: 100%; 
            border-radius: 30px 30px 0 0; 
            max-height: 92vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #m-img-box { width: 100%; height: 380px; background: #000; overflow: hidden; }
        #m-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .m-info { padding: 25px; padding-bottom: 50px; /* ESPACIO DE SEGURIDAD ABAJO */ overflow-y: auto; }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        
        #m-desc { color: #666; font-size: 0.95rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #m-desc.expandido { -webkit-line-clamp: unset; }
        
        .leer-mas-btn { color: var(--negro); font-weight: 800; font-size: 0.85rem; cursor: pointer; text-decoration: underline; display: inline-block; margin-top: 8px; }

        .modal-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .btn-m { padding: 18px; border-radius: 18px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: 'DM Sans'; }
        .btn-negro { background: var(--negro); color: white; }
        .btn-outline { background: white; border: 2.5px solid var(--negro); color: var(--negro); }

        /* ÁREA INFERIOR PARA QUE NO CHOQUE CON EL BOTÓN DEL TELÉFONO */
        .safe-area { height: 30px; width: 100%; }

        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--negro); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="Buscar productos..." oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle" onclick="cerrarModal()">
    <div class="modal-cont" onclick="event.stopPropagation()">
        <div id="m-img-box"></div>
        
        <div class="m-info">
            <div class="m-header">
                <h2 id="m-nombre" style="font-family:'Syne'; font-size:1.6rem;"></h2>
                <div id="m-precio" style="font-size:1.7rem; font-weight:800; color:var(--verde);"></div>
            </div>
            
            <div id="m-prov" style="font-size:0.75rem; color:#aaa; font-weight:700; margin-bottom:15px; text-transform:uppercase;"></div>
            
            <p id="m-desc"></p>
            <span id="btn-leer" class="leer-mas-btn" onclick="toggleDetalles()">Leer más detalles</span>

            <div class="modal-footer">
                <button id="btn-add" class="btn-m btn-negro">Añadir</button>
                <button id="btn-chat" class="btn-m btn-outline">Chat</button>
            </div>

            <div class="safe-area"></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizar();
    }

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';

        productos.filter(p => (p.nombre || '').toLowerCase().includes(search)).forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.onclick = () => verDetalle(p);
            card.innerHTML = `
                <div class="prod-img">
                    <img src="${img}">
                    <div class="tag-cat">${p.categoria || 'Gral'}</div>
                </div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                    <div class="prod-min">Mín: ${p.minimo || 1} und.</div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.verDetalle = function(p) {
        const img = p.imagenes?.[0] || p.imagen || '';
        const modal = document.getElementById('modal-detalle');
        const desc = document.getElementById('m-desc');
        
        document.getElementById('m-img-box').innerHTML = `<img src="${img}">`;
        document.getElementById('m-nombre').textContent = p.nombre;
        document.getElementById('m-precio').textContent = `$${Number(p.precio).toFixed(2)}`;
        document.getElementById('m-prov').textContent = `Proveedor: ${p.nombreProveedor || 'Verificado'}`;
        desc.textContent = p.descripcion || 'Sin descripción detallada.';
        desc.classList.remove('expandido');
        document.getElementById('btn-leer').textContent = "Leer más detalles";

        document.getElementById('btn-add').onclick = () => {
            lanzarToast(`✓ ${p.nombre} añadido`);
            cerrarModal();
        };

        document.getElementById('btn-chat').onclick = () => {
            window.location.href = `chat.html?proveedorId=${p.proveedorId || 'admin'}`;
        };

        modal.style.display = 'flex';
    }

    window.toggleDetalles = function() {
        const d = document.getElementById('m-desc');
        d.classList.toggle('expandido');
        document.getElementById('btn-leer').textContent = d.classList.contains('expandido') ? "Ver menos" : "Leer más detalles";
    }

    window.cerrarModal = () => document.getElementById('modal-detalle').style.display = 'none';

    function lanzarToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    cargar();
</script>
</body>
</html>
