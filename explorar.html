<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; --verde-precio: #2bb12b; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* --- DISEÑO ORIGINAL RESTAURADO --- */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 25px 25px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-family: 'Syne'; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        
        .search-wrap { background: rgba(0,0,0,0.06); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .search-wrap input { background: transparent; border: none; outline: none; width: 100%; font-size: 0.9rem; font-weight: 500; color: var(--negro); }

        #main-scroll { flex: 1; overflow-y: auto; padding-bottom: 100px; }

        .section-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; }
        .section-head h3 { font-family: 'Syne'; font-size: 1.05rem; font-weight: 800; color: var(--negro); }

        .cats-scroll { display: flex; gap: 10px; padding: 0 20px 15px; overflow-x: auto; scrollbar-width: none; }
        .cats-scroll::-webkit-scrollbar { display: none; }
        
        .cat-chip { padding: 9px 18px; border-radius: 20px; background: white; border: 1.5px solid #eee; font-size: 0.8rem; font-weight: 700; color: #666; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .cat-chip.active { background: var(--negro); color: white; border-color: var(--negro); }

        /* GRID CATALOGO */
        #grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.2s; position: relative; cursor: pointer; }
        .prod-card:active { transform: scale(0.97); }
        .prod-img-min { width: 100%; height: 180px; background: #fafafa; }
        .prod-img-min img { width: 100%; height: 100%; object-fit: cover; }
        
        .prod-info-min { padding: 12px; text-align: center; }
        .prod-info-min h3 { font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; color: var(--negro); height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .prod-info-min p { color: var(--verde-precio); font-weight: 800; font-size: 1.1rem; }

        /* MODAL PRODUCTO */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        .btn-atras { position: absolute; top: 40px; left: 20px; background: rgba(0,0,0,0.4); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; z-index: 100; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        
        .carrusel-container { width: 100%; height: 55vh; position: relative; overflow: hidden; background: #000; }
        .carrusel-track { display: flex; height: 100%; transition: transform 0.3s ease; }
        .carrusel-item { min-width: 100%; height: 100%; }
        .carrusel-item img { width: 100%; height: 100%; object-fit: cover; }

        .detalle-body { padding: 25px; background: white; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 5; }
        .det-titulo { font-family: 'Syne'; font-size: 1.7rem; color: var(--negro); margin-bottom: 5px; }
        .det-precio { color: var(--verde-precio); font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }

        .contador-wrap { background: #f7f7f7; border-radius: 18px; padding: 18px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-qty { background: white; border: 1.5px solid #eee; width: 38px; height: 38px; border-radius: 12px; font-weight: 800; font-size: 1.2rem; }

        .btn-negro { background: var(--negro); color: white; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; border: none; text-transform: uppercase; margin-bottom: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .chat-float { position: fixed; bottom: 30px; right: 20px; background: var(--negro); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 3000; border: 2px solid var(--lima); cursor: pointer; }
        .chat-float svg { width: 24px; fill: var(--lima); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="¿Qué buscas para tu negocio?" oninput="renderizarGrid()">
    </div>
</header>

<div id="main-scroll">
    <div class="section-head"><h3>Categorías</h3></div>
    <div class="cats-scroll" id="cats-container"></div>

    <div class="section-head"><h3>Catálogo</h3></div>
    <div id="grid"></div>
</div>

<div id="modal-detalle">
    <button class="btn-atras" onclick="cerrarDetalle()">←</button>
    <div class="carrusel-container"><div class="carrusel-track" id="track"></div></div>
    
    <div class="detalle-body">
        <h2 class="det-titulo" id="det-nom"></h2>
        <p class="det-precio" id="det-pre"></p>

        <div class="contador-wrap">
            <div style="font-size: 0.7rem; color: #666;">📦 Mínimo: <b id="min-qty">12</b> und.<br>🚚 Entrega: <b>3-5 días</b></div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="btn-qty" onclick="changeQty(-1)">-</button>
                <span id="qty-val" style="font-weight: 800; font-size: 1.1rem;">12</span>
                <button class="btn-qty" onclick="changeQty(1)">+</button>
            </div>
        </div>
        
        <button class="btn-negro">Añadir al pedido</button>

        <h3 style="font-family:'Syne'; font-size:1.1rem; margin-bottom:15px; text-transform:uppercase;">Sugerencias</h3>
        <div id="reco-infinito" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 100px;"></div>
    </div>

    <div class="chat-float" id="btn-chat-directo">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let productos = [];
    let catSeleccionada = "Todos";

    async function cargarDatosReales() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        
        // Categorías dinámicas desde TU base de datos
        const cats = ["Todos", ...new Set(productos.map(p => p.categoria).filter(c => c))];
        document.getElementById('cats-container').innerHTML = cats.map(c => `
            <div class="cat-chip ${c === catSeleccionada ? 'active' : ''}" onclick="filtrarCat('${c}')">${c}</div>
        `).join('');

        renderizarGrid();
    }

    window.filtrarCat = (c) => { 
        catSeleccionada = c; 
        cargarDatosReales(); 
    };

    window.renderizarGrid = () => {
        const grid = document.getElementById('grid');
        const busqueda = document.getElementById('busqueda').value.toLowerCase();
        
        const filtrados = productos.filter(p => {
            const matchesSearch = p.nombre.toLowerCase().includes(busqueda);
            const matchesCat = catSeleccionada === "Todos" || p.categoria === catSeleccionada;
            return matchesSearch && matchesCat;
        });

        grid.innerHTML = filtrados.map(p => `
            <div class="prod-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                <div class="prod-img-min"><img src="${p.imagenes?.[0] || p.imagen}"></div>
                <div class="prod-info-min"><h3>${p.nombre}</h3><p>$${Number(p.precio).toFixed(2)}</p></div>
            </div>
        `).join('');
    };

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = `$${Number(p.precio).toFixed(2)}`;
        document.getElementById('min-qty').innerText = p.cantidadMinima || 12;
        document.getElementById('qty-val').innerText = p.cantidadMinima || 12;
        document.getElementById('track').innerHTML = (p.imagenes || [p.imagen]).map(img => `<div class="carrusel-item"><img src="${img}"></div>`).join('');
        
        // CHAT CONEXIÓN REAL
        document.getElementById('btn-chat-directo').onclick = async () => {
            const user = auth.currentUser;
            if(!user) return alert("Inicia sesión");
            
            const q = query(collection(db, "chats"), where("emprendedorId", "==", user.uid), where("proveedorId", "==", p.proveedorId || "SISTEMA"));
            const snap = await getDocs(q);
            let chatId = snap.empty ? (await addDoc(collection(db, "chats"), {
                emprendedorId: user.uid,
                proveedorId: p.proveedorId || "SISTEMA",
                proveedorNombre: p.proveedorNombre || "Proveedor",
                ultimoMensaje: "Referencia: " + p.nombre,
                ultimoMensajeEn: serverTimestamp()
            })).id : snap.docs[0].id;

            window.location.href = `chat.html?chatId=${chatId}&nombre=${p.proveedorNombre}&refMsg=Hola, me interesa este producto: ${p.nombre}`;
        };

        // Sugerencias Dinámicas
        document.getElementById('reco-infinito').innerHTML = productos.filter(x => x.id !== p.id).slice(0, 4).map(r => `
            <div class="prod-card" onclick='abrirDetalle(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
                <div class="prod-img-min" style="height:120px"><img src="${r.imagenes?.[0] || r.imagen}"></div>
                <div style="padding:10px; font-size:0.75rem; text-align:center;"><b>${r.nombre}</b></div>
            </div>
        `).join('');

        modal.style.display = 'flex';
        modal.scrollTop = 0;
    };

    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';
    window.changeQty = (v) => {
        let q = document.getElementById('qty-val');
        let val = parseInt(q.innerText) + v;
        if(val >= 1) q.innerText = val;
    };

    cargarDatosReales();
</script>
</body>
</html>
