<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --verde: #32CD32; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #E5DDD5; --bubble-v: #DCF8C6; }
        
        body { background: #F2F3F0; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--negro); color: white; padding: 55px 20px 20px; border-radius: 0 0 30px 30px; z-index: 10; }
        .header h1 { font-family: 'Syne'; font-size: 1.8rem; margin-bottom: 12px; }
        .search-wrap { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 1rem; }

        /* GRID: IMÁGENES PREDOMINANTES */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 100px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .prod-img-grid { width: 100%; height: 260px; background: #fafafa; }
        .prod-img-grid img { width: 100%; height: 100%; object-fit: cover; }
        .prod-body { padding: 12px; text-align: center; }
        .prod-nombre { font-size: 0.85rem; font-weight: 700; color: var(--negro); margin-bottom: 2px; }
        .prod-precio { color: var(--verde); font-weight: 800; font-size: 1.1rem; }

        /* MODAL DETALLE: LA IMAGEN PREDOMINA */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; }
        .det-cont { background: white; width: 100%; border-radius: 30px 30px 0 0; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease; }
        .det-img { width: 100%; height: 45vh; background: #000; }
        .det-img img { width: 100%; height: 100%; object-fit: cover; }
        .det-info { padding: 25px; flex: 1; overflow-y: auto; padding-bottom: 60px; }
        .det-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-m { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 700; font-family: 'DM Sans'; font-size: 1rem; cursor: pointer; }
        .btn-negro { background: var(--negro); color: white; }
        .btn-sutil { background: #eee; color: #555; }

        /* MODAL CHAT: COMPACTO Y PROPORCIONAL */
        #modal-chat { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; justify-content: flex-end; }
        .chat-container { background: var(--gris-f); background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); width: 100%; height: 85vh; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease; }
        .chat-header { background: var(--negro); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #mensajes { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 8px; }
        .burbuja { padding: 8px 14px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; width: fit-content; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .enviado { align-self: flex-end; background: var(--bubble-v); border-bottom-right-radius: 2px; }
        .recibido { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .chat-input-area { background: #F0F0F0; padding: 10px 15px 45px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 10px 18px; border: 1px solid #ccc; }
        .input-box input { width: 100%; border: none; outline: none; font-size: 1rem; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="Buscar productos..." oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle" onclick="this.style.display='none'">
    <div class="det-cont" onclick="event.stopPropagation()">
        <div class="det-img" id="det-img-box"></div>
        <div class="det-info">
            <h2 id="det-nombre" style="font-family:'Syne'; margin-bottom:5px;"></h2>
            <div id="det-precio" style="font-size:1.5rem; font-weight:800; color:var(--verde); margin-bottom:15px;"></div>
            <p id="det-desc" style="color:#666; font-size:0.95rem; line-height:1.5;"></p>
            <div class="det-footer">
                <button class="btn-m btn-negro" onclick="cerrarDetalle()">Añadir</button>
                <button id="btn-abrir-chat" class="btn-m btn-sutil">Chat</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-chat">
    <div class="chat-container">
        <header class="chat-header">
            <h2 id="chat-nombre">Chat</h2>
            <button onclick="cerrarChat()" style="background:none; border:none; color:white; font-size:1.5rem;">×</button>
        </header>
        <div id="mensajes"></div>
        <div class="chat-input-area">
            <div class="input-box"><input type="text" id="msg-input" placeholder="Escribe un mensaje..."></div>
            <button onclick="enviarMensaje()" style="width:45px; height:45px; background:var(--negro); border-radius:50%; border:none; color:white;">></button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];
    const miID = "usuario_demo";

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizar();
    }

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        productos.forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.onclick = () => verDetalle(p);
            card.innerHTML = `
                <div class="prod-img-grid"><img src="${img}"></div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.verDetalle = function(p) {
        const img = p.imagenes?.[0] || p.imagen || '';
        document.getElementById('det-img-box').innerHTML = `<img src="${img}">`;
        document.getElementById('det-nombre').textContent = p.nombre;
        document.getElementById('det-precio').textContent = `$${Number(p.precio).toFixed(2)}`;
        document.getElementById('det-desc').textContent = p.descripcion || 'Sin descripción.';
        document.getElementById('modal-detalle').style.display = 'flex';
        
        document.getElementById('btn-abrir-chat').onclick = () => {
            cerrarDetalle();
            abrirChat(p.nombreProveedor || 'Proveedor', p.proveedorId || 'admin');
        };
    }

    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';

    let chatActivo = "";
    let unsub = null;

    window.abrirChat = function(nombre, provId) {
        document.getElementById('chat-nombre').textContent = nombre;
        document.getElementById('modal-chat').style.display = 'flex';
        chatActivo = `${miID}_${provId}`;
        if (unsub) unsub();
        const q = query(collection(db, "chats", chatActivo, "mensajes"), orderBy("fecha", "asc"));
        unsub = onSnapshot(q, (snapshot) => {
            const box = document.getElementById('mensajes');
            box.innerHTML = '';
            snapshot.forEach(doc => {
                const m = doc.data();
                const div = document.createElement('div');
                div.className = `burbuja ${m.remitente === miID ? 'enviado' : 'recibido'}`;
                div.textContent = m.texto;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensaje = async function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        await addDoc(collection(db, "chats", chatActivo, "mensajes"), {
            texto: inp.value, remitente: miID, fecha: serverTimestamp()
        });
        inp.value = '';
    }

    window.cerrarChat = () => document.getElementById('modal-chat').style.display = 'none';

    cargar();
</script>
</body>
</html>
