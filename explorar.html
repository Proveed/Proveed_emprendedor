<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Explorar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:80px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; position:sticky; top:0; z-index:100; }
  .header-top{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; flex:1; }
  .filter-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .filter-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2; }
  .search-bar{ background:rgba(255,255,255,0.08); border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:10px; }
  .search-bar input{ flex:1; background:transparent; border:none; outline:none; color:white; font-family:'Inter',sans-serif; font-size:0.9rem; }
  .search-bar input::placeholder{ color:#555; }
  .search-bar svg{ width:16px; height:16px; stroke:#555; fill:none; stroke-width:2.5; flex-shrink:0; }
  .cats-scroll{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; background:white; border-bottom:1px solid #eee; }
  .cats-scroll::-webkit-scrollbar{ display:none; }
  .cat-pill{ padding:7px 14px; border-radius:20px; white-space:nowrap; border:1.5px solid #eee; background:white; font-size:0.76rem; font-weight:600; color:#aaa; cursor:pointer; transition:0.2s; }
  .cat-pill.active{ background:var(--negro); color:white; border-color:var(--negro); }
  .sort-row{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; background:white; border-bottom:1px solid #f0f0f0; }
  .sort-row::-webkit-scrollbar{ display:none; }
  .sort-pill{ padding:6px 12px; border-radius:20px; border:1.5px solid #eee; background:white; font-size:0.72rem; font-weight:600; color:#bbb; cursor:pointer; white-space:nowrap; transition:0.2s; }
  .sort-pill.active{ border-color:var(--verde); color:var(--negro); }
  .results-info{ padding:12px 16px 8px; font-size:0.78rem; color:#aaa; font-weight:500; }
  .products-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 16px; }
  .prod-card{ background:white; border-radius:14px; overflow:hidden; cursor:pointer; transition:0.2s; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
  .prod-card:active{ transform:scale(0.97); }
  .prod-img{ width:100%; height:155px; background:#f5f5f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .no-img{ width:40px; height:40px; stroke:#ddd; fill:none; stroke-width:1.5; }
  .prod-cat-tag{ position:absolute; top:8px; left:8px; background:var(--naranja); color:white; font-size:0.56rem; font-weight:700; padding:2px 7px; border-radius:6px; text-transform:uppercase; }
  .prod-video-tag{ position:absolute; top:8px; right:8px; background:rgba(168,230,61,0.9); color:var(--negro); font-size:0.56rem; font-weight:700; padding:2px 6px; border-radius:6px; }
  .prod-body{ padding:10px 12px 12px; }
  .prod-nombre{ font-size:0.82rem; font-weight:600; color:var(--negro); line-height:1.3; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .prod-proveedor{ font-size:0.68rem; color:#bbb; margin-bottom:6px; }
  .prod-precio{ font-size:0.95rem; font-weight:700; color:var(--naranja); }
  .prod-min{ font-size:0.62rem; color:#ccc; }
  .prod-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
  .add-btn{ width:30px; height:30px; border-radius:9px; background:var(--negro); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .add-btn svg{ width:14px; height:14px; stroke:white; fill:none; stroke-width:2.5; }
  .skeleton{ background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
  @keyframes shimmer{ from{background-position:200% 0;} to{background-position:-200% 0;} }
  .skel-card{ background:white; border-radius:14px; overflow:hidden; }
  .skel-img{ height:155px; }
  .skel-line{ height:10px; margin:10px 12px 5px; border-radius:6px; }
  .skel-line.s{ width:55%; height:8px; margin:0 12px 12px; }
  .empty{ grid-column:1/-1; text-align:center; padding:48px 20px; color:#bbb; }
  .empty svg{ width:52px; height:52px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 12px; display:block; }
  .empty p{ font-size:0.85rem; }
  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--negro); color:white; padding:10px 20px; border-radius:24px; font-size:0.82rem; font-weight:600; opacity:0; transition:0.3s; pointer-events:none; z-index:400; white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; box-shadow:0 -4px 20px rgba(0,0,0,0.06); z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
  .tab-dot{ width:4px; height:4px; background:var(--verde); border-radius:50%; display:none; }
  .tab.active .tab-dot{ display:block; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Explorar</div>
    <button class="filter-btn"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="18" x2="12" y2="18"/></svg></button>
  </div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="Buscar productos..." oninput="buscar(this.value)">
  </div>
</div>

<div class="cats-scroll">
  <div class="cat-pill active" data-cat="todos" onclick="selCat('todos',this)">Todos</div>
  <div class="cat-pill" data-cat="textiles" onclick="selCat('textiles',this)">Textiles</div>
  <div class="cat-pill" data-cat="tecnologia" onclick="selCat('tecnologia',this)">Tecnología</div>
  <div class="cat-pill" data-cat="alimentos" onclick="selCat('alimentos',this)">Alimentos</div>
  <div class="cat-pill" data-cat="cosmeticos" onclick="selCat('cosmeticos',this)">Cosméticos</div>
  <div class="cat-pill" data-cat="construccion" onclick="selCat('construccion',this)">Construcción</div>
  <div class="cat-pill" data-cat="maquinaria" onclick="selCat('maquinaria',this)">Maquinaria</div>
  <div class="cat-pill" data-cat="agricultura" onclick="selCat('agricultura',this)">Agricultura</div>
</div>

<div class="sort-row">
  <div class="sort-pill active" data-sort="recientes" onclick="selSort('recientes',this)">Más recientes</div>
  <div class="sort-pill" data-sort="precio_asc" onclick="selSort('precio_asc',this)">Menor precio</div>
  <div class="sort-pill" data-sort="precio_desc" onclick="selSort('precio_desc',this)">Mayor precio</div>
  <div class="sort-pill" data-sort="vistas" onclick="selSort('vistas',this)">Más vistos</div>
</div>

<div class="results-info" id="results-info">Cargando productos...</div>
<div class="products-grid" id="products-grid">
  <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line s skeleton"></div></div>
  <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line s skeleton"></div></div>
  <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line s skeleton"></div></div>
  <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line s skeleton"></div></div>
</div>
<div class="toast" id="toast"></div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span><div class="tab-dot"></div></a>
  <a class="tab active" href="explorar.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span><div class="tab-dot"></div></a>
  <a class="tab" href="tips.html"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><span>Tips</span><div class="tab-dot"></div></a>
  <a class="tab" href="carrito.html"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span><div class="tab-dot"></div></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><span>Pedidos</span><div class="tab-dot"></div></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let todosProds=[], catActiva='todos', sortActivo='recientes', busquedaActual='';
let carrito = JSON.parse(localStorage.getItem('carrito_proveed')||'[]');

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  cargarProductos();
})();

async function cargarProductos(){
  const { data } = await sb.from('productos').select('*').eq('activo',true);
  todosProds = data||[];
  renderGrid();
}

function renderGrid(){
  let lista=[...todosProds];
  if(catActiva!=='todos') lista=lista.filter(p=>p.categoria===catActiva);
  if(busquedaActual) lista=lista.filter(p=>(p.nombre||'').toLowerCase().includes(busquedaActual)||(p.nombre_proveedor||'').toLowerCase().includes(busquedaActual)||(p.descripcion||'').toLowerCase().includes(busquedaActual));
  if(sortActivo==='precio_asc') lista.sort((a,b)=>a.precio-b.precio);
  else if(sortActivo==='precio_desc') lista.sort((a,b)=>b.precio-a.precio);
  else if(sortActivo==='vistas') lista.sort((a,b)=>(b.vistas||0)-(a.vistas||0));
  else lista.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  document.getElementById('results-info').textContent=`${lista.length} producto${lista.length!==1?'s':''} encontrado${lista.length!==1?'s':''}`;
  const grid=document.getElementById('products-grid');
  if(!lista.length){ grid.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><p>Sin productos en esta categoría</p></div>'; return; }
  grid.innerHTML='';
  lista.forEach(p=>{
    const img=p.imagenes?.[0]||p.imagen||'';
    const div=document.createElement('div'); div.className='prod-card';
    div.onclick=()=>window.location.href=`producto.html?id=${p.id}`;
    div.innerHTML=`<div class="prod-img">${img?`<img src="${img}" alt="" loading="lazy">`:`<svg class="no-img" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}${p.categoria?`<div class="prod-cat-tag">${p.categoria}</div>`:''}${p.video_url?`<div class="prod-video-tag">▶</div>`:''}</div><div class="prod-body"><div class="prod-nombre">${p.nombre||'Producto'}</div><div class="prod-proveedor">${p.nombre_proveedor||'Proveedor'}</div><div class="prod-footer"><div><div class="prod-precio">$${Number(p.precio||0).toFixed(2)}</div><div class="prod-min">Mín: ${p.minimo||1}</div></div><button class="add-btn" onclick="agregar(event,'${p.id}','${(p.nombre||'').replace(/'/g,"\\'")}',${p.precio||0},${p.minimo||1},'${img}','${(p.nombre_proveedor||'').replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div></div>`;
    grid.appendChild(div);
  });
}

window.selCat=(cat,el)=>{ catActiva=cat; document.querySelectorAll('.cat-pill').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderGrid(); };
window.selSort=(sort,el)=>{ sortActivo=sort; document.querySelectorAll('.sort-pill').forEach(s=>s.classList.remove('active')); el.classList.add('active'); renderGrid(); };
window.buscar=v=>{ busquedaActual=v.toLowerCase().trim(); renderGrid(); };
window.agregar=function(e,id,nombre,precio,minimo,imagen,proveedor){ e.stopPropagation(); carrito=JSON.parse(localStorage.getItem('carrito_proveed')||'[]'); const idx=carrito.findIndex(i=>i.id===id); if(idx>=0) carrito[idx].cantidad+=minimo; else carrito.push({id,nombre,precio,cantidad:minimo,minimo,imagen,proveedor}); localStorage.setItem('carrito_proveed',JSON.stringify(carrito)); const t=document.getElementById('toast'); t.textContent=`✓ ${nombre} añadido`; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); };
</script>
</body>
</html>
