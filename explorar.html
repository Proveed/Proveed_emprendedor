<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#32CD32; --negro:#0E0E0E; --blanco:#F8F8F5; --gris:#F2F3F0; --rojo:#FF4D4D; }
  
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  
  /* VISTAS */
  #lista-view{ display:flex; flex-direction:column; height:100%; }
  #vista-chat{ display:none; flex:1; flex-direction:column; overflow:hidden; background: var(--gris); }

  /* HEADERS */
  .chat-header, .conv-header{ background:var(--negro); color:var(--blanco); padding:50px 20px 20px; display:flex; align-items:center; gap:14px; z-index: 10; }
  .back-btn{ width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .chat-title, .proveedor-nombre{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; }
  .proveedor-estado{ font-size:0.7rem; color:var(--verde); }

  /* LISTADO */
  #lista-chats{ flex:1; overflow-y:auto; padding:15px; }
  .chat-item{ display:flex; align-items:center; gap:14px; background:white; border-radius:20px; padding:16px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }

  /* AREA DE MENSAJES */
  #mensajes{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; padding-bottom: 30px; }
  .burbuja{ max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.9rem; line-height:1.4; position: relative; }
  .burbuja.enviado{ background:var(--verde); color:#000; align-self:flex-end; border-bottom-right-radius:4px; }
  .burbuja.recibido{ background:white; color:var(--negro); align-self:flex-start; border-bottom-left-radius:4px; }

  /* BARRA DE ENTRADA (AJUSTADA PARA EL TECLADO) */
  .input-area { 
    background: white; 
    padding: 15px 15px 35px; /* Más espacio abajo para que no choque con la barra del iPhone/Android */
    display: flex; 
    gap: 10px; 
    align-items: flex-end; 
    border-top: 1px solid #eee; 
    position: relative;
    z-index: 100;
  }
  .input-wrap { 
    flex:1; 
    background:var(--gris); 
    border-radius:20px; 
    padding: 12px 16px; 
    display:flex; 
    align-items:center; 
  }
  #msg-input { 
    flex:1; 
    border:none; 
    background:transparent; 
    outline:none; 
    font-family:'DM Sans',sans-serif; 
    font-size:1rem; 
    max-height:120px; 
    color:var(--negro); 
    resize: none;
  }
  .send-btn { 
    width: 48px; 
    height: 48px; 
    border-radius: 15px; 
    background: var(--negro); 
    border: none; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer;
    margin-bottom: 2px; /* Alineación visual con el input */
  }
  .send-btn svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2.5; }

  /* BANNERS */
  .aviso-chat{ background:#FFF9E6; border-radius:12px; padding:12px; margin-bottom:15px; font-size:0.75rem; color:#856404; display:flex; gap:10px; }
  .bloqueo-banner{ background:rgba(255,77,77,0.1); border:1px solid var(--rojo); border-radius:12px; padding:12px; margin:0 15px 10px; display:none; color:var(--rojo); font-size:0.8rem; font-weight:600; }
  .bloqueo-banner.visible{ display:flex; }
</style>
</head>
<body>

<div id="lista-view">
  <div class="chat-header">
    <div class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div><div class="chat-title">Mensajes</div><div class="chat-sub">Chat seguro PROVEED</div></div>
  </div>
  <div id="lista-chats">
    <div class="aviso-chat">
      <svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Por tu seguridad, no compartas datos externos. El sistema bloquea números de teléfono.</span>
    </div>
    <div id="chats-lista-content"></div>
  </div>
</div>

<div id="vista-chat">
  <div class="conv-header">
    <div class="back-btn" onclick="volverLista()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div style="flex:1;">
      <div class="proveedor-nombre" id="conv-nombre">Proveedor</div>
      <div class="proveedor-estado">● En línea</div>
    </div>
  </div>
  
  <div id="mensajes"></div>

  <div class="bloqueo-banner" id="bloqueo-banner">
    ⚠️ <span id="bloqueo-txt">Mensaje bloqueado por seguridad.</span>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Escribe aquí..." rows="1" onfocus="scrollAbajo()"></textarea>
    </div>
    <button class="send-btn" onclick="enviarMensaje()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script type="module">
// ... (Aquí va tu lógica de Firebase que ya tienes)
// He añadido la función para manejar el scroll cuando sale el teclado:

window.scrollAbajo = function() {
    setTimeout(() => {
        const contenedor = document.getElementById('mensajes');
        contenedor.scrollTop = contenedor.scrollHeight;
        // Ajuste extra para móviles: desplazar el body si es necesario
        window.scrollTo(0, document.body.scrollHeight);
    }, 300);
};

// Ajuste automático del área de texto
const input = document.getElementById('msg-input');
input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
    scrollAbajo();
});

// (Sigue con el resto de tu código de onAuthStateChanged, abrirChat, etc.)
</script>

</body>
</html>
