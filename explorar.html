<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris-f: #F2F3F0; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 30px 30px; z-index: 100; }
        .header h1 { font-family: 'Syne'; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
        .search-wrap { background: rgba(0,0,0,0.07); border-radius: 15px; padding: 12px 18px; display: flex; align-items: center; }
        .search-wrap input { background: transparent; border: none; outline: none; width: 100%; font-weight: 600; }

        /* GRID */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; overflow-y: auto; padding-bottom: 100px; }
        .prod-card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; position: relative; }
        
        .prod-img { width: 100%; height: 260px; border-radius: 24px 24px 0 0; overflow: hidden; cursor: pointer; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .prod-body { padding: 14px; text-align: center; pointer-events: auto; }
        .prod-nombre { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
        .prod-precio { color: #2bb12b; font-weight: 800; font-size: 1.15rem; margin-bottom: 14px; }

        /* ACCIONES REPARADAS */
        .prod-actions { display: flex; justify-content: center; gap: 8px; position: relative; z-index: 10; }
        .act-btn { background: #f2f3f0; border: none; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .act-btn svg { width: 20px; height: 20px; fill: #333; }
        
        /* Estilo unificado Negro/Lima */
        .act-add { background: var(--negro); }
        .act-add svg { fill: var(--lima); }
        .act-btn:active { transform: scale(0.9); }

        /* MODAL DETALLE */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; }
        .btn-atras { position: absolute; top: 40px; left: 20px; background: rgba(0,0,0,0.3); border: none; width: 42px; height: 42px; border-radius: 50%; z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

        .carrusel-container { width: 100%; height: 55vh; background: #000; position: relative; }
        .carrusel-track { display: flex; height: 100%; transition: transform 0.3s ease-out; }
        .carrusel-item { min-width: 100%; height: 100%; }
        .carrusel-item img { width: 100%; height: 100%; object-fit: cover; }

        .detalle-body { padding: 25px; border-radius: 30px 30px 0 0; margin-top: -30px; background: white; position: relative; }
        .btn-style { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; border: none; margin-bottom: 10px; }
        .btn-negro { background: var(--negro); color: white; }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" placeholder="Buscar stock..." oninput="renderizarGridPrincipal()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle">
    <button class="btn-atras" onclick="cerrarDetalle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
    <div class="carrusel-container"><div class="carrusel-track" id="track"></div></div>
    <div class="detalle-body">
        <h2 id="det-nom" style="font-family:'Syne'; font-size:1.7rem; margin-bottom:5px;"></h2>
        <p id="det-pre" style="color:#2bb12b; font-size:1.5rem; font-weight:800; margin-bottom:20px;"></p>
        <button class="btn-style btn-negro">Añadir al pedido</button>
        <button class="btn-style" style="border:2px solid #000; background:white;" id="btn-negociar-modal">Chat para negociar</button>
        <div id="reco-infinito" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:30px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizarGridPrincipal();
    }

    window.renderizarGridPrincipal = function() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        productos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.innerHTML = `
                <div class="prod-img" onclick="abrirDetalle(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    <img src="${p.imagenes?.[0] || p.imagen}">
                </div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                    <div class="prod-actions">
                        <button class="act-btn act-add" onclick="alert('Añadido')">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <button class="act-btn" onclick="abrirChatNegociacion(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
                        </button>
                        <button class="act-btn" onclick="abrirDetalle(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                            <svg viewBox="0 0 24 24"><path d="M12 16a1 1 0 1 0 1 1 1 1 0 0 0-1-1zm1-11h-2v7h2zm-1-3a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/></svg>
                        </button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        history.pushState({ modalAbierto: true }, "");
        window.onpopstate = () => cerrarDetalle(false);

        const track = document.getElementById('track');
        const fotos = p.imagenes || [p.imagen];
        track.innerHTML = fotos.map(f => `<div class="carrusel-item"><img src="${f}"></div>`).join('');
        
        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = `$${Number(p.precio).toFixed(2)}`;
        document.getElementById('btn-negociar-modal').onclick = () => abrirChatNegociacion(p);
        
        modal.style.display = 'flex';
        modal.scrollTop = 0;
    }

    window.abrirChatNegociacion = (p) => {
        alert("Iniciando negociación para: " + p.nombre);
    }

    window.cerrarDetalle = (back = true) => {
        document.getElementById('modal-detalle').style.display = 'none';
        if (back && window.history.state?.modalAbierto) history.back();
    }

    cargar();
</script>
</body>
</html>
