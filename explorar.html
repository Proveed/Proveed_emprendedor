<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Explorar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --blanco:#FFFFFF; --gris:#F5F6F2; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:100px; -webkit-font-smoothing:antialiased; }
  
  /* HEADER */
  .header{ background:var(--negro); padding:44px 16px 14px; position:sticky; top:0; z-index:100; }
  .header-top{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .search-wrap{ flex:1; background:rgba(255,255,255,0.1); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; }
  .search-wrap input{ flex:1; background:transparent; border:none; outline:none; color:white; font-family:'DM Sans',sans-serif; font-size:0.9rem; }
  .search-wrap input::placeholder{ color:#666; }
  .search-wrap svg{ width:16px; height:16px; stroke:#666; fill:none; stroke-width:2.5; flex-shrink:0; }

  /* FILTROS */
  .filtros{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .filtros::-webkit-scrollbar{ display:none; }
  .filtro{ padding:7px 14px; border-radius:20px; white-space:nowrap; border:1.5px solid #e8e8e8; background:white; font-size:0.76rem; font-weight:600; color:#888; cursor:pointer; transition:0.2s; }
  .filtro.active{ background:var(--negro); color:white; border-color:var(--negro); }

  /* GRID & CARDS */
  .orden-bar{ display:flex; justify-content:space-between; align-items:center; padding:0 16px 10px; }
  .orden-count{ font-size:0.78rem; color:#aaa; font-weight:500; }
  .orden-select{ border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:700; color:var(--naranja); outline:none; cursor:pointer; }
  
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 16px; }
  .prod-card{ background:white; border-radius:16px; overflow:hidden; cursor:pointer; transition:0.2s; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
  .prod-card:active{ transform:scale(0.97); }
  .prod-img{ width:100%; height:160px; background:#f5f5f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .no-img{ width:44px; height:44px; stroke:#ddd; fill:none; stroke-width:1.5; }
  .cat-tag{ position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.5); color:white; font-size:0.56rem; font-weight:700; padding:2px 7px; border-radius:6px; text-transform:uppercase; }
  
  .prod-body{ padding:10px 12px 12px; }
  .prod-nombre{ font-size:0.82rem; font-weight:600; color:var(--negro); line-height:1.3; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:2.4em; }
  .prod-empresa{ font-size:0.68rem; color:#bbb; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prod-precio{ font-size:1rem; font-weight:800; color:var(--naranja); }
  .prod-min{ font-size:0.62rem; color:#ccc; margin-top:1px; }
  
  .add-btn{ width:30px; height:30px; border-radius:9px; background:var(--negro); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
  .add-btn svg{ width:15px; height:15px; stroke:white; fill:none; stroke-width:2.5; }
  .add-btn.loading{ opacity: 0.5; pointer-events: none; }

  /* TOAST & TABBAR */
  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--negro); color:white; padding:11px 20px; border-radius:28px; font-size:0.82rem; font-weight:600; opacity:0; transition:0.3s; pointer-events:none; z-index:400; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; }
  .tab span{ font-size:0.58rem; font-weight:700; text-transform:uppercase; }
  
  /* SKELETON */
  .skeleton{ background:#eee; height:160px; border-radius:16px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div class="search-wrap" onclick="window.location.href='busqueda.html'">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Buscar productos..." readonly>
    </div>
  </div>
</header>

<div class="filtros" id="filtro-container">
  <div class="filtro active" data-cat="todos">Todos</div>
  <div class="filtro" data-cat="textiles">Textiles</div>
  <div class="filtro" data-cat="tecnologia">Tecnología</div>
  <div class="filtro" data-cat="alimentos">Alimentos</div>
  <div class="filtro" data-cat="maquinaria">Maquinaria</div>
  <div class="filtro" data-cat="otros">Otros</div>
</div>

<div class="orden-bar">
  <span class="orden-count" id="total-count">...</span>
  <select class="orden-select" id="orden-select">
    <option value="recientes">Más recientes</option>
    <option value="precio-asc">Menor precio</option>
    <option value="precio-desc">Mayor precio</option>
  </select>
</div>

<div class="grid" id="grid">
  <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></a>
  <a class="tab active" href="explorar.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span></a>
  <a class="tab" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
  <a class="tab" href="carrito.html"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span></a>
  <a class="tab" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
</nav>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

let todosProductos = [];
let catActiva = 'todos';
let userUID = null;

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userUID = session.user.id;
  await cargarProductos();
}

async function cargarProductos() {
  const { data, error } = await supabase
    .from('productos')
    .select('*')
    .eq('activo', true);

  if (error) { console.error(error); return; }
  todosProductos = data;
  renderizar();
}

function renderizar() {
  const grid = document.getElementById('grid');
  const orden = document.getElementById('orden-select').value;
  
  let lista = [...todosProductos];
  if (catActiva !== 'todos') lista = lista.filter(p => p.categoria === catActiva);
  
  if (orden === 'precio-asc') lista.sort((a, b) => a.precio - b.precio);
  if (orden === 'precio-desc') lista.sort((a, b) => b.precio - a.precio);
  if (orden === 'recientes') lista.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  document.getElementById('total-count').textContent = `${lista.length} productos`;
  grid.innerHTML = '';

  lista.forEach(p => {
    const div = document.createElement('div');
    div.className = 'prod-card';
    const img = p.imagenes?.[0] || '';
    
    div.innerHTML = `
      <div class="prod-img" onclick="window.location.href='producto.html?id=${p.id}'">
        ${img ? `<img src="${img}" loading="lazy">` : `<svg class="no-img" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M21 15l-5-5L5 21"/></svg>`}
        <div class="cat-tag">${p.categoria}</div>
      </div>
      <div class="prod-body">
        <div class="prod-nombre">${p.nombre}</div>
        <div class="prod-empresa">${p.nombre_proveedor || 'Proveedor PROVEED'}</div>
        <div style="display:flex; align-items:flex-end; justify-content:space-between; margin-top:8px;">
          <div>
            <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
            <div class="prod-min">Mín: ${p.minimo || 1} und.</div>
          </div>
          <button class="add-btn" id="btn-${p.id}">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>`;
    
    grid.appendChild(div);

    // Evento de agregar al carrito (DB Directa)
    div.querySelector(`#btn-${p.id}`).onclick = (e) => {
      e.stopPropagation();
      agregarAlCarrito(p);
    };
  });
}

async function agregarAlCarrito(p) {
  const btn = document.getElementById(`btn-${p.id}`);
  btn.classList.add('loading');

  // Verificar si ya existe en el carrito
  const { data: existente } = await supabase
    .from('carrito')
    .select('*')
    .eq('user_id', userUID)
    .eq('producto_id', p.id)
    .single();

  if (existente) {
    await supabase
      .from('carrito')
      .update({ cantidad: existente.cantidad + (p.minimo || 1) })
      .eq('id', existente.id);
  } else {
    await supabase
      .from('carrito')
      .insert([{
        user_id: userUID,
        producto_id: p.id,
        cantidad: p.minimo || 1
      }]);
  }

  btn.classList.remove('loading');
  showToast(`✓ ${p.nombre} añadido`);
}

function showToast(msj) {
  const t = document.getElementById('toast');
  t.textContent = msj;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Eventos de Filtros
document.querySelectorAll('.filtro').forEach(f => {
  f.onclick = () => {
    document.querySelectorAll('.filtro').forEach(x => x.classList.remove('active'));
    f.classList.add('active');
    catActiva = f.dataset.cat;
    renderizar();
  };
});

document.getElementById('orden-select').onchange = renderizar;

init();
</script>
</body>
</html>
