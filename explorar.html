<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #E5DDD5; --bubble-v: #DCF8C6; }
        
        body { background: #F2F3F0; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER SLIM VERDE LIMA */
        .header { background: var(--lima); color: var(--negro); padding: 40px 20px 15px; border-radius: 0 0 25px 25px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-family: 'Syne'; font-size: 1.4rem; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
        .search-wrap { background: rgba(0,0,0,0.05); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,0,0,0.1); }
        .search-wrap input { background: transparent; border: none; color: var(--negro); outline: none; width: 100%; font-size: 0.95rem; font-weight: 500; }
        .search-wrap input::placeholder { color: rgba(0,0,0,0.4); }

        /* GRID: IMÁGENES GRANDES (280px) */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 100px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; position: relative; }
        
        .prod-img { width: 100%; height: 280px; background: #fafafa; position: relative; cursor: zoom-in; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ETIQUETA PROVEEDOR */
        .tag-prov { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); color: var(--negro); padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; z-index: 5; }

        .prod-body { padding: 12px; text-align: center; }
        .prod-nombre { font-size: 0.85rem; font-weight: 700; color: var(--negro); margin-bottom: 2px; }
        .prod-precio { color: #2bb12b; font-weight: 800; font-size: 1.1rem; }

        /* BOTONES DE ACCIÓN SVG */
        .prod-actions { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .act-btn { background: #f8f8f8; border: none; width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .act-btn svg { width: 18px; height: 18px; fill: #444; }
        .act-add { background: var(--negro); }
        .act-add svg { fill: var(--lima); }
        .act-btn:active { transform: scale(0.9); }

        /* MODALES MANTENIDOS */
        #modal-img-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        #modal-img-full img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        #modal-chat { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; justify-content: flex-end; }
        .chat-container { background: var(--gris-f); width: 100%; height: 85vh; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="Buscar productos..." oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-img-full" onclick="this.style.display='none'">
    <div id="img-full-content"></div>
</div>

<div id="modal-chat">
    <div class="chat-container">
        <header style="background:var(--negro); color:white; padding: 20px; display:flex; justify-content:space-between;">
            <h2 id="chat-nombre" style="font-family:'Syne'; font-size:1rem;">Proveedor</h2>
            <button onclick="cerrarChat()" style="background:none; border:none; color:white; font-size:1.5rem;">×</button>
        </header>
        <div id="mensajes" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px;"></div>
        <div style="background:#eee; padding: 15px 15px 40px; display:flex; gap:10px;">
            <input type="text" id="msg-input" style="flex:1; padding:12px; border-radius:20px; border:none; outline:none;" placeholder="Escribe...">
            <button onclick="enviarMensaje()" style="background:var(--negro); border:none; border-radius:50%; width:45px; height:45px; color:white;">></button>
        </div>
    </div>
</div>

<script type="module">
    // ... Tu inicialización de Firebase aquí ...

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';

        productos.filter(p => (p.nombre || '').toLowerCase().includes(search)).forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.innerHTML = `
                <div class="prod-img">
                    <img src="${img}" onclick="abrirImgFull('${img}')">
                    <div class="tag-prov">👤 ${p.nombreProveedor || 'SOW'}</div>
                </div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                    <div class="prod-actions">
                        <button class="act-btn act-add" onclick="alert('Añadido')">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <button class="act-btn" onclick="abrirChat('${p.nombreProveedor}', '${p.proveedorId}')">
                            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                        </button>
                        <button class="act-btn" onclick="alert('Detalle: ${p.nombre}')">
                            <svg viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
                        </button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.abrirImgFull = (url) => {
        document.getElementById('img-full-content').innerHTML = `<img src="${url}" style="width:100%">`;
        document.getElementById('modal-img-full').style.display = 'flex';
    }

    // ... Funciones de Chat y Carga ...
    cargar();
</script>
</body>
</html>
