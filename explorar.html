<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#32CD32; --negro:#0E0E0E; --blanco:#F8F8F5; --gris:#F2F3F0; --rojo:#FF4D4D; }
  
  /* Evitamos que el scroll del body interfiera con el teclado */
  body{ 
    background:var(--gris); 
    font-family:'DM Sans',sans-serif; 
    height:100vh; 
    display:flex; 
    flex-direction:column; 
    overflow:hidden; 
    position: fixed; /* Mantiene la pantalla fija */
    width: 100%;
  }
  
  /* HEADER */
  .conv-header{ 
    background:var(--negro); 
    color:var(--blanco); 
    padding:55px 20px 20px; 
    display:flex; 
    align-items:center; 
    gap:14px; 
    z-index: 100;
  }
  .back-btn{ width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn svg{ width:20px; height:20px; stroke:white; fill:none; stroke-width:2.5; }

  /* AREA DE MENSAJES */
  #mensajes{ 
    flex:1; 
    overflow-y:auto; 
    padding:20px; 
    display:flex; 
    flex-direction:column; 
    gap:12px; 
    background: var(--gris);
    -webkit-overflow-scrolling: touch;
  }

  .burbuja{ max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.92rem; line-height:1.4; position: relative; }
  .burbuja.enviado{ background:var(--verde); color:#000; align-self:flex-end; border-bottom-right-radius:4px; font-weight:500; }
  .burbuja.recibido{ background:white; color:var(--negro); align-self:flex-start; border-bottom-left-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }

  /* BARRA DE ENTRADA CON MARGEN DE SEGURIDAD */
  .input-area { 
    background: white; 
    /* Subimos la barra para que no choques con el botón de 'Home' del celular */
    padding: 15px 15px 50px 15px; 
    display: flex; 
    gap: 10px; 
    align-items: flex-end; 
    border-top: 1px solid #eee; 
    position: relative;
    z-index: 100;
  }

  .input-wrap { 
    flex:1; 
    background:var(--gris); 
    border-radius:22px; 
    padding: 12px 18px; 
    display:flex; 
    align-items:center; 
  }

  #msg-input { 
    flex:1; 
    border:none; 
    background:transparent; 
    outline:none; 
    font-family:'DM Sans',sans-serif; 
    font-size:1rem; 
    max-height:120px; 
    color:var(--negro); 
    resize: none;
    line-height: 1.4;
  }

  .send-btn { 
    width: 50px; 
    height: 50px; 
    border-radius: 18px; 
    background: var(--negro); 
    border: none; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.5; }

  /* BANNER DE SEGURIDAD */
  .bloqueo-banner{ 
    background:rgba(255,77,77,0.1); 
    border:1px solid var(--rojo); 
    border-radius:12px; 
    padding:12px; 
    margin:0 15px 12px; 
    display:none; 
    color:var(--rojo); 
    font-size:0.8rem; 
    font-weight:700; 
    text-align: center;
  }
</style>
</head>
<body>

<div class="conv-header">
  <div class="back-btn" onclick="window.history.back()">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </div>
  <div style="flex:1;">
    <div class="proveedor-nombre" id="conv-nombre" style="font-family:'Syne';">Cargando...</div>
    <div style="font-size:0.7rem; color:var(--verde); font-weight:700;">● Chat Protegido</div>
  </div>
</div>

<div id="mensajes">
  </div>

<div class="bloqueo-banner" id="bloqueo-banner">
  ⚠️ No compartas números o redes sociales.
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="msg-input" placeholder="Escribe tu mensaje..." rows="1" onfocus="scrollFix()"></textarea>
  </div>
  <button class="send-btn" onclick="enviarMensaje()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script type="module">
  // Configuración de Firebase y lógica de mensajería (mantenla igual que la tenías)
  
  // FUNCIÓN PARA FIX DEL TECLADO
  function scrollFix() {
    // Retraso para que el teclado suba primero
    setTimeout(() => {
      const msgs = document.getElementById('mensajes');
      msgs.scrollTop = msgs.scrollHeight;
      // Forzamos al navegador a no desplazarse fuera de lugar
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
    }, 300);
  }
  window.scrollFix = scrollFix;

  // AUTO-CRECIMIENTO DEL INPUT
  const tx = document.getElementById('msg-input');
  tx.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = (this.scrollHeight) + "px";
    if(this.scrollHeight > 50) {
        document.getElementById('mensajes').scrollTop = document.getElementById('mensajes').scrollHeight;
    }
  });

  // Manejo de envío con Enter
  tx.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      // Llama a tu función enviarMensaje()
    }
  });
</script>

</body>
</html>
