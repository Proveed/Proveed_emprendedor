<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROVEED — Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* TU ESTILO ORIGINAL SIN CAMBIOS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --verde: #32CD32; --negro: #0E0E0E; --gris: #F2F3F0; }
        body { background: var(--gris); font-family: 'DM Sans', sans-serif; padding-bottom: 90px; }
        
        .header { background: var(--negro); color: white; padding: 40px 20px 25px; border-radius: 0 0 30px 30px; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-family: 'Syne'; font-size: 1.6rem; margin-bottom: 15px; }
        .search-wrap { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 1rem; }
        
        .filtros-scroll { display: flex; gap: 12px; padding: 20px; overflow-x: auto; scrollbar-width: none; }
        .filtro { padding: 10px 20px; border-radius: 25px; background: white; font-size: 0.85rem; font-weight: 700; cursor: pointer; border: 1px solid #eee; white-space: nowrap; }
        .filtro.active { background: var(--negro); color: white; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer; }
        .prod-img { width: 100%; height: 160px; background: #eee; overflow: hidden; position: relative; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        .prod-body { padding: 12px; }
        .prod-nombre { font-size: 0.95rem; font-weight: 700; color: var(--negro); margin-bottom: 5px; }
        .prod-precio { color: var(--verde); font-weight: 800; font-size: 1.2rem; }

        /* MODAL DE DETALLE (Invisible hasta que haces clic) */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-cont { background: white; width: 100%; max-width: 400px; border-radius: 30px; overflow: hidden; position: relative; animation: slide 0.3s; }
        @keyframes slide { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* TOAST DE AVISO */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--negro); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }
        #toast.show { opacity: 1; bottom: 110px; }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Buscar productos...">
    </div>
</header>

<div class="filtros-scroll">
    <div class="filtro active" data-cat="todos">Todos</div>
    <div class="filtro" data-cat="textiles">Textiles</div>
    <div class="filtro" data-cat="tecnologia">Tecnología</div>
    <div class="filtro" data-cat="otros">Otros</div>
</div>

<div class="grid" id="grid"></div>

<div id="modal-detalle" onclick="this.style.display='none'">
    <div class="modal-cont" onclick="event.stopPropagation()">
        <div id="modal-img-box" style="width:100%; height:250px; background:#eee;"></div>
        <div style="padding:25px;">
            <h2 id="modal-t" style="font-family:'Syne'; margin-bottom:10px;"></h2>
            <p id="modal-p" style="font-size:1.6rem; font-weight:800; color:var(--verde); margin-bottom:15px;"></p>
            <p id="modal-d" style="color:#666; font-size:0.9rem; margin-bottom:25px; line-height:1.5;"></p>
            <button id="modal-add" style="width:100%; background:var(--negro); color:white; border:none; padding:18px; border-radius:18px; font-weight:700; font-size:1rem;">Añadir al Carrito</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
    authDomain: "proveed-8cb7c.firebaseapp.com",
    projectId: "proveed-8cb7c",
    storageBucket: "proveed-8cb7c.firebasestorage.app",
    messagingSenderId: "235073250367",
    appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let todosProductos = [], catActiva = 'todos', busqueda = '';

async function cargar() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:#888;">Cargando...</p>';
    try {
        const snap = await getDocs(collection(db, 'productos'));
        todosProductos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        todosProductos.sort((a, b) => (b.creadoEn?.seconds || 0) - (a.creadoEn?.seconds || 0));
        renderizar();
    } catch (e) {
        grid.innerHTML = `<p>Error de conexión</p>`;
    }
}

function renderizar() {
    const grid = document.getElementById('grid');
    let lista = [...todosProductos];

    if (catActiva !== 'todos') lista = lista.filter(p => (p.categoria || '').toLowerCase() === catActiva);
    if (busqueda) lista = lista.filter(p => (p.nombre || '').toLowerCase().includes(busqueda));

    grid.innerHTML = '';
    
    lista.forEach(p => {
        const div = document.createElement('div');
        div.className = 'prod-card';
        const img = p.imagenes?.[0] || p.imagen || p.foto || '';
        
        // ACCIÓN: Abre el detalle al tocar la tarjeta
        div.onclick = () => {
            document.getElementById('modal-img-box').innerHTML = img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover;">` : '';
            document.getElementById('modal-t').textContent = p.nombre;
            document.getElementById('modal-p').textContent = "$" + Number(p.precio).toFixed(2);
            document.getElementById('modal-d').textContent = p.descripcion || 'Sin descripción disponible.';
            document.getElementById('modal-add').onclick = (e) => {
                agregarAlCarrito(e, p.id, p.nombre, p.precio, img);
                document.getElementById('modal-detalle').style.display = 'none';
            };
            document.getElementById('modal-detalle').style.display = 'flex';
        };

        div.innerHTML = `
            <div class="prod-img">${img ? `<img src="${img}">` : ''}</div>
            <div class="prod-body">
                <div class="prod-nombre">${p.nombre || 'Producto'}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="prod-precio">$${Number(p.precio || 0).toFixed(2)}</div>
                    <button onclick="event.stopPropagation(); agregarAlCarrito(event, '${p.id}', '${p.nombre}', ${p.precio}, '${img}')" style="width:32px; height:32px; border-radius:10px; background:var(--negro); border:none; color:white; font-weight:bold;">+</button>
                </div>
            </div>`;
        grid.appendChild(div);
    });
}

window.agregarAlCarrito = function(e, id, nombre, precio, imagen) {
    e.stopPropagation();
    let carrito = JSON.parse(localStorage.getItem('carrito_proveed') || '[]');
    const idx = carrito.findIndex(i => i.id === id);
    if (idx >= 0) carrito[idx].cantidad++;
    else carrito.push({ id, nombre, precio, imagen, cantidad: 1 });
    localStorage.setItem('carrito_proveed', JSON.stringify(carrito));
    
    const toast = document.getElementById('toast');
    toast.textContent = `✓ ${nombre} en carrito`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
};

document.querySelectorAll('.filtro').forEach(f => {
    f.addEventListener('click', () => {
        document.querySelectorAll('.filtro').forEach(x => x.classList.remove('active'));
        f.classList.add('active');
        catActiva = f.dataset.cat;
        renderizar();
    });
});

document.getElementById('search-input').addEventListener('input', e => {
    busqueda = e.target.value.toLowerCase().trim();
    renderizar();
});

cargar();
</script>

</body>
</html>
