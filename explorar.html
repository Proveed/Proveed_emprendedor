<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Explorar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#32CD32; --negro:#0E0E0E; --blanco:#F8F8F5; --gris:#F2F3F0; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); color:var(--blanco); padding:48px 20px 20px; position:sticky; top:0; z-index:100; border-radius:0 0 28px 28px; }
  .header-top{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .back-btn{ width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }
  .search-wrap{ background:rgba(255,255,255,0.1); border-radius:14px; padding:11px 14px; display:flex; align-items:center; gap:10px; }
  .search-wrap input{ flex:1; background:transparent; border:none; outline:none; color:white; font-family:'DM Sans',sans-serif; font-size:0.92rem; }
  .search-wrap input::placeholder{ color:#888; }
  .search-wrap svg{ width:17px; height:17px; stroke:#888; fill:none; stroke-width:2.5; flex-shrink:0; }
  .filtros-scroll{ display:flex; gap:8px; padding:14px 20px; overflow-x:auto; scrollbar-width:none; }
  .filtro{ padding:8px 16px; border-radius:20px; white-space:nowrap; border:1.5px solid #e0e0e0; background:white; font-size:0.78rem; font-weight:600; color:#666; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:6px; }
  .filtro.active{ background:var(--negro); color:white; border-color:var(--negro); }
  .filtro svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; }
  .orden-bar{ display:flex; justify-content:space-between; align-items:center; padding:0 20px 12px; }
  .orden-bar span{ font-size:0.78rem; color:#aaa; }
  .orden-select{ border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600; color:var(--verde); outline:none; cursor:pointer; }
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 20px; }
  .prod-card{ background:white; border-radius:20px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); cursor:pointer; transition:0.2s; }
  .prod-img{ width:100%; height:150px; background:#f5f5f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .cat-tag{ position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.55); color:white; font-size:0.58rem; font-weight:700; padding:3px 8px; border-radius:8px; text-transform:uppercase; }
  .prod-body{ padding:12px; }
  .prod-nombre{ font-size:0.88rem; font-weight:700; margin-bottom:3px; color:var(--negro); }
  .prod-precio{ font-size:1rem; font-weight:800; color:var(--verde); }
  .add-btn{ width:32px; height:32px; border-radius:10px; background:var(--negro); border:none; display:flex; align-items:center; justify-content:center; }
  .skeleton{ background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:10px; }
  @keyframes shimmer{ from{background-position:200% 0;} to{background-position:-200% 0;} }
  .empty{ grid-column:1/-1; text-align:center; padding:48px 20px; color:#aaa; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:10px 0 18px; border-top:1px solid #eee; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; color:#bbb; }
  .tab.active{ color:var(--verde); }
  .toast{ position:fixed; bottom:85px; left:50%; transform:translateX(-50%); background:var(--negro); color:white; padding:11px 20px; border-radius:28px; opacity:0; transition:0.3s; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div class="page-title">Explorar</div>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="Buscar productos...">
  </div>
</header>

<div class="filtros-scroll">
  <div class="filtro active" data-cat="todos">Todos</div>
  <div class="filtro" data-cat="textiles">Textiles</div>
  <div class="filtro" data-cat="tecnologia">Tecnología</div>
  <div class="filtro" data-cat="otros">Otros</div>
</div>

<div class="orden-bar">
  <span id="total-count">Cargando...</span>
  <select class="orden-select" id="orden-select" onchange="renderizar()">
    <option value="recientes">Más recientes</option>
    <option value="precio-asc">Menor precio</option>
    <option value="precio-desc">Mayor precio</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><span>Inicio</span></a>
  <a class="tab active" href="explorar.html"><span>Explorar</span></a>
  <a class="tab" href="carrito.html"><span>Carrito</span></a>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain: "proveed-8cb7c.firebaseapp.com",
  projectId: "proveed-8cb7c",
  storageBucket: "proveed-8cb7c.firebasestorage.app",
  messagingSenderId: "235073250367",
  appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
});

const auth = getAuth(app);
const db = getFirestore(app);
let todosProductos = [], catActiva = 'todos', busqueda = '';

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'login.html'; return; }
  cargar();
});

async function cargar() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Cargando productos...</div>';
  try {
    const snap = await getDocs(collection(db, 'productos'));
    todosProductos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    todosProductos.sort((a, b) => (b.creadoEn?.seconds || 0) - (a.creadoEn?.seconds || 0));
    renderizar();
  } catch (e) {
    grid.innerHTML = `<p>Error: ${e.message}</p>`;
  }
}

function renderizar() {
  const grid = document.getElementById('grid');
  let lista = [...todosProductos];

  if (catActiva !== 'todos') {
    lista = lista.filter(p => (p.categoria || '').toLowerCase() === catActiva);
  }
  if (busqueda) {
    lista = lista.filter(p => (p.nombre || '').toLowerCase().includes(busqueda));
  }

  grid.innerHTML = lista.length ? '' : '<div class="empty">No hay productos aquí</div>';
  
  lista.forEach(p => {
    // AQUÍ ESTÁ LA FUNCIÓN DE LA TARJETA INTEGRADA
    const div = document.createElement('div');
    div.className = 'prod-card';
    const img = p.imagenes?.[0] || p.imagen || p.foto || '';
    
    div.innerHTML = `
      <div class="prod-img">
        ${img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover;">` : '<div style="width:100%;height:100%;background:#eee;"></div>'}
        <div class="cat-tag" style="position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);color:white;padding:2px 8px;border-radius:6px;font-size:0.6rem;">${p.categoria || 'otros'}</div>
      </div>
      <div class="prod-body" style="padding:12px;">
        <div class="prod-nombre" style="font-weight:700;font-size:0.9rem;">${p.nombre || 'Producto'}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
          <div>
            <div style="color:#32CD32;font-weight:800;font-size:1.1rem;">$${Number(p.precio || 0).toFixed(2)}</div>
            <div style="font-size:0.65rem;color:#888;">Mín: ${p.minimo || 1} und.</div>
          </div>
          <button onclick="agregarAlCarrito(event, '${p.id}', '${(p.nombre||'').replace(/'/g,"\\'")}', ${p.precio||0}, '${img}')" 
            style="width:36px;height:36px;background:#0E0E0E;border:none;border-radius:10px;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
      </div>`;
    grid.appendChild(div);
  });
}

// FUNCIÓN PARA EL CARRITO
window.agregarAlCarrito = function(e, id, nombre, precio, imagen) {
  e.stopPropagation();
  let carrito = JSON.parse(localStorage.getItem('carrito_proveed') || '[]');
  const idx = carrito.findIndex(item => item.id === id);
  
  if (idx >= 0) {
    carrito[idx].cantidad += 1;
  } else {
    carrito.push({ id, nombre, precio, imagen, cantidad: 1 });
  }
  
  localStorage.setItem('carrito_proveed', JSON.stringify(carrito));
  
  // Mostrar aviso de éxito
  const toast = document.getElementById('toast');
  if(toast) {
    toast.textContent = `✓ ${nombre} añadido`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  } else {
    alert("Producto añadido al carrito");
  }
};

// Eventos de filtros y búsqueda
document.querySelectorAll('.filtro').forEach(f => {
  f.addEventListener('click', () => {
    document.querySelectorAll('.filtro').forEach(x => x.classList.remove('active'));
    f.classList.add('active');
    catActiva = f.dataset.cat;
    renderizar();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  busqueda = e.target.value.toLowerCase().trim();
  renderizar();
});
</script>
</script>
</body>
</html>
