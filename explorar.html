<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --verde: #32CD32; --negro: #0E0E0E; --blanco: #F8F8F5; --gris: #F2F3F0; }
        
        body { background: var(--gris); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { background: var(--negro); color: white; padding: 55px 20px 25px; border-radius: 0 0 30px 30px; z-index: 100; }
        .header h1 { font-family: 'Syne'; font-size: 1.8rem; margin-bottom: 10px; }
        .search-wrap { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 1rem; }

        /* GRID: IMAGEN PREDOMINANTE */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; overflow-y: auto; padding-bottom: 100px; }
        
        .prod-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; border: 1px solid #eee; }
        
        .prod-img { width: 100%; height: 210px; background: #f9f9f9; position: relative; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .tag-cat { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); color: var(--negro); padding: 4px 10px; border-radius: 10px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .prod-body { padding: 12px; text-align: center; }
        .prod-nombre { font-size: 0.85rem; font-weight: 700; color: var(--negro); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .prod-precio { color: var(--verde); font-weight: 800; font-size: 1rem; }

        /* MODAL: LA IMAGEN ES LA REINA */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: flex-end; }
        
        .modal-cont { 
            background: white; 
            width: 100%; 
            border-radius: 35px 35px 0 0; 
            max-height: 95vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #m-img-box { width: 100%; height: 55vh; /* Ocupa más de la mitad de la pantalla */ background: #000; position: relative; }
        #m-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .m-info { padding: 25px; background: white; flex: 1; overflow-y: auto; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 5; }
        
        #m-nombre { font-family: 'Syne'; font-size: 1.8rem; line-height: 1.1; margin-bottom: 5px; }
        #m-precio { font-size: 1.8rem; font-weight: 800; color: var(--verde); margin-bottom: 15px; }
        
        #m-desc { color: #777; font-size: 0.95rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #m-desc.expandido { -webkit-line-clamp: unset; }
        
        .leer-mas-btn { color: var(--negro); font-weight: 800; font-size: 0.8rem; cursor: pointer; display: inline-block; margin-top: 10px; opacity: 0.6; }

        /* BOTONES SUTILES */
        .modal-footer { display: flex; gap: 10px; margin-top: 30px; }
        .btn-m { flex: 1; padding: 15px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; font-family: 'DM Sans'; transition: 0.2s; }
        
        .btn-negro { background: var(--negro); color: white; }
        /* Botón sutil transparente/gris */
        .btn-sutil { background: var(--gris); color: #555; border: 1px solid #ddd; }
        
        .btn-m:active { transform: scale(0.96); opacity: 0.8; }

        .close-modal { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(0,0,0,0.3); color: white; border: none; border-radius: 50%; z-index: 20; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        .safe-area { height: 40px; width: 100%; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--negro); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="¿Qué estás buscando?" oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle" onclick="cerrarModal()">
    <div class="modal-cont" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="cerrarModal()">×</button>
        
        <div id="m-img-box"></div>
        
        <div class="m-info">
            <h2 id="m-nombre"></h2>
            <div id="m-precio"></div>
            
            <p id="m-desc"></p>
            <span id="btn-leer" class="leer-mas-btn" onclick="toggleDetalles()">+ Leer más detalles</span>

            <div class="modal-footer">
                <button id="btn-add" class="btn-m btn-negro">Añadir al Carrito</button>
                <button id="btn-chat" class="btn-m btn-sutil">Chat Proveedor</button>
            </div>

            <div class="safe-area"></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizar();
    }

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';

        productos.filter(p => (p.nombre || '').toLowerCase().includes(search)).forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.onclick = () => verDetalle(p);
            card.innerHTML = `
                <div class="prod-img">
                    <img src="${img}">
                    <div class="tag-cat">${p.categoria || 'Gral'}</div>
                </div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.verDetalle = function(p) {
        const img = p.imagenes?.[0] || p.imagen || '';
        document.getElementById('m-img-box').innerHTML = `<img src="${img}">`;
        document.getElementById('m-nombre').textContent = p.nombre;
        document.getElementById('m-precio').textContent = `$${Number(p.precio).toFixed(2)}`;
        const desc = document.getElementById('m-desc');
        desc.textContent = p.descripcion || 'Sin descripción disponible.';
        desc.classList.remove('expandido');
        document.getElementById('btn-leer').textContent = "+ Leer más detalles";

        document.getElementById('btn-add').onclick = () => {
            lanzarToast(`✓ Añadido`);
            cerrarModal();
        };

        document.getElementById('btn-chat').onclick = () => {
            window.location.href = `chat.html?proveedorId=${p.proveedorId || 'admin'}`;
        };

        document.getElementById('modal-detalle').style.display = 'flex';
    }

    window.toggleDetalles = function() {
        const d = document.getElementById('m-desc');
        d.classList.toggle('expandido');
        document.getElementById('btn-leer').textContent = d.classList.contains('expandido') ? "- Ver menos" : "+ Leer más detalles";
    }

    window.cerrarModal = () => document.getElementById('modal-detalle').style.display = 'none';

    function lanzarToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    cargar();
</script>
</body>
</html>
