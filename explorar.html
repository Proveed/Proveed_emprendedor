<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Full</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --verde: #32CD32; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #E5DDD5; --bubble-v: #DCF8C6; }
        
        body { background: #F2F3F0; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--negro); color: white; padding: 55px 20px 20px; border-radius: 0 0 30px 30px; z-index: 10; }
        .header h1 { font-family: 'Syne'; font-size: 1.8rem; margin-bottom: 12px; }
        .search-wrap { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 1rem; }

        /* GRID: IMÁGENES GRANDES (280px) */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 100px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; display: flex; flex-direction: column; }
        
        .prod-img { width: 100%; height: 280px; background: #fafafa; cursor: pointer; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }

        .prod-body { padding: 12px; }
        .prod-prov { font-size: 0.65rem; color: #999; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .prod-nombre { font-size: 0.85rem; font-weight: 700; color: var(--negro); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .prod-footer { display: flex; justify-content: space-between; align-items: center; }
        .prod-precio { color: var(--verde); font-weight: 800; font-size: 1.1rem; }

        /* BOTONES DE ACCIÓN RÁPIDA */
        .prod-actions { display: flex; gap: 6px; }
        .btn-act { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #eee; background: white; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .btn-act:active { background: #f0f0f0; transform: scale(0.9); }

        /* MODAL IMAGEN COMPLETA */
        #modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        #modal-full img { max-width: 95%; max-height: 80%; border-radius: 10px; object-fit: contain; }
        .cerrar-full { position: absolute; top: 40px; right: 20px; color: white; font-size: 2.5rem; background: none; border: none; }

        /* MODAL CHAT COMPACTO */
        #modal-chat { display: none; position: fixed; bottom: 0; width: 100%; height: 85vh; background: var(--gris-f); z-index: 2000; border-radius: 30px 30px 0 0; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .chat-h { background: var(--negro); color: white; padding: 20px; border-radius: 30px 30px 0 0; display: flex; justify-content: space-between; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bub { padding: 8px 12px; border-radius: 15px; font-size: 0.9rem; width: fit-content; max-width: 80%; }
        .mio { align-self: flex-end; background: var(--bubble-v); }
        .otro { align-self: flex-start; background: white; }
        .chat-i { background: #f0f0f0; padding: 10px 15px 40px; display: flex; gap: 10px; }
        .chat-i input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="Buscar productos..." oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-full" onclick="this.style.display='none'">
    <button class="cerrar-full">×</button>
    <img id="img-target" src="">
</div>

<div id="modal-chat">
    <div class="chat-h">
        <h2 id="chat-t">Proveedor</h2>
        <button onclick="cerrarChat()" style="color:white; background:none; border:none; font-size:1.5rem;">×</button>
    </div>
    <div id="msgs"></div>
    <div class="chat-i">
        <input type="text" id="msg-in" placeholder="Escribe mensaje...">
        <button onclick="enviar()" style="background:var(--negro); color:white; border:none; border-radius:50%; width:45px;">></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];
    const miID = "usuario_demo";

    async function cargar() {
        try {
            const snap = await getDocs(collection(db, "productos"));
            productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar();
        } catch(e) { console.error("Error:", e); }
    }

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';

        productos.filter(p => (p.nombre || '').toLowerCase().includes(term)).forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.innerHTML = `
                <div class="prod-img" onclick="abrirImg('${img}')">
                    <img src="${img}">
                </div>
                <div class="prod-body">
                    <div class="prod-prov">👤 ${p.nombreProveedor || 'Proveedor'}</div>
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-footer">
                        <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                        <div class="prod-actions">
                            <button class="btn-act" onclick="lanzarToast()">+</button>
                            <button class="btn-act" onclick="abrirChat('${p.nombreProveedor}','${p.proveedorId}')">💬</button>
                            <button class="btn-act" onclick="alert('Detalles de: ${p.nombre}')">ℹ️</button>
                        </div>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.abrirImg = (url) => {
        document.getElementById('img-target').src = url;
        document.getElementById('modal-full').style.display = 'flex';
    };

    let chatID = "";
    let unsub = null;
    window.abrirChat = (nom, id) => {
        document.getElementById('chat-t').innerText = nom;
        document.getElementById('modal-chat').style.display = 'flex';
        chatID = `${miID}_${id}`;
        if(unsub) unsub();
        const q = query(collection(db, "chats", chatID, "mensajes"), orderBy("fecha", "asc"));
        unsub = onSnapshot(q, (s) => {
            const b = document.getElementById('msgs');
            b.innerHTML = '';
            s.forEach(d => {
                const m = d.data();
                const dv = document.createElement('div');
                dv.className = `bub ${m.remitente === miID ? 'mio' : 'otro'}`;
                dv.innerText = m.texto;
                b.appendChild(dv);
            });
            b.scrollTop = b.scrollHeight;
        });
    };

    window.enviar = async () => {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "chats", chatID, "mensajes"), {
            texto: i.value, remitente: miID, fecha: serverTimestamp()
        });
        i.value = '';
    };

    window.cerrarChat = () => document.getElementById('modal-chat').style.display = 'none';
    window.lanzarToast = () => alert("Añadido al carrito");

    cargar();
</script>
</body>
</html>
