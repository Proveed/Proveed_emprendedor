<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --verde: #32CD32; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #E5DDD5; --bubble-v: #DCF8C6; }
        
        body { background: #F2F3F0; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--negro); color: white; padding: 55px 20px 20px; border-radius: 0 0 30px 30px; z-index: 10; }
        .header h1 { font-family: 'Syne'; font-size: 1.8rem; margin-bottom: 12px; }
        .search-wrap { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 1rem; }

        /* GRID: IMÁGENES PREDOMINANTES Y GRANDES */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 100px; }
        
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; position: relative; }
        
        .prod-img { width: 100%; height: 280px; /* IMAGEN PREDOMINANTE */ background: #fafafa; position: relative; cursor: zoom-in; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .tag-cat { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

        .prod-body { padding: 12px; text-align: left; }
        .prod-prov { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .prod-nombre { font-size: 0.85rem; font-weight: 700; color: var(--negro); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .prod-footer { display: flex; justify-content: space-between; align-items: center; }
        .prod-precio { color: var(--verde); font-weight: 800; font-size: 1.1rem; }
        
        /* BOTONES DE ACCIÓN RÁPIDA (CON ÍCONOS) */
        .prod-actions { display: flex; gap: 8px; }
        .act-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #555; }
        .act-btn:hover { color: var(--negro); }
        .act-add { color: var(--verde); font-weight: 700; }

        /* MODAL DE IMAGEN A PANTALLA COMPLETA */
        #modal-img-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        #modal-img-full img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-img-modal { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        /* MODALES DE DETALLE Y CHAT MANTENIDOS */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .det-cont { background: white; width: 100%; border-radius: 30px 30px 0 0; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease; padding: 25px; padding-bottom: 60px; }
        
        #modal-chat { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; justify-content: flex-end; }
        .chat-container { background: var(--gris-f); background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); width: 100%; height: 85vh; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease; }
        .burbuja { padding: 10px 15px; border-radius: 18px; font-size: 0.92rem; width: fit-content; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .enviado { align-self: flex-end; background: var(--bubble-v); border-bottom-right-radius: 4px; color: #111; }
        .recibido { align-self: flex-start; background: white; border-bottom-left-radius: 4px; color: #111; }
        .chat-input-area { background: #F0F0F0; padding: 12px 15px 45px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 10px 18px; border: 1px solid #ccc; }
        .input-box input { width: 100%; border: none; outline: none; font-size: 1rem; background: transparent; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="Buscar productos..." oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-img-full" onclick="this.style.display='none'">
    <button class="close-img-modal" onclick="cerrarImgFull()">×</button>
    <div id="img-full-content"></div>
</div>

<div id="modal-detalle" onclick="this.style.display='none'">
    <div class="det-cont" onclick="event.stopPropagation()">
        <h2 id="det-nombre" style="font-family:'Syne'; margin-bottom:10px;">Cargando...</h2>
        <div id="det-precio" style="font-size:1.5rem; font-weight:800; color:var(--verde); margin-bottom:15px;"></div>
        <p id="det-desc" style="color:#666; font-size:0.95rem; line-height:1.5;"></p>
        <button class="act-btn det-chat" onclick="cerrarDetalle();abrirChatDesdeDetalle();">💬 Chat Proveedor</button>
    </div>
</div>

<div id="modal-chat">
    <div class="chat-container">
        <header class="chat-header" style="background:var(--negro); color:white; padding: 20px; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="chat-nombre">Chat</h2>
            <button onclick="cerrarChat()" style="background:none; border:none; color:white; font-size:1.5rem;">×</button>
        </header>
        <div id="mensajes" style="flex:1; overflow-y:auto; padding: 20px 15px; display:flex; flex-direction:column; gap:8px;"></div>
        <div class="chat-input-area">
            <div class="input-box"><input type="text" id="msg-input" placeholder="Escribe un mensaje..."></div>
            <button onclick="enviarMensaje()" style="width:45px; height:45px; background:var(--negro); border-radius:50%; border:none; color:white;">></button>
        </div>
    </div>
</div>

<script type="module">
    // ... tu lógica de Firebase aquí (Mantén la misma que tenías arriba) ...
    const miID = "usuario_demo"; // Mantengo el ID demo
    let prodActualParaChat = {}; // Variable para guardar el producto seleccionado

    // ... la función cargar() que tenías ...

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        productos.forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            
            // Imagen predominantemente grande
            card.innerHTML = `
                <div class="prod-img" onclick="abrirImgFull('${img}')">
                    <img src="${img}">
                    <div class="tag-cat">${p.categoria || 'Gral'}</div>
                </div>
                <div class="prod-body">
                    <div class="prod-prov">👤 ${p.nombreProveedor || 'Verificado'}</div> <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-footer">
                        <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                        <div class="prod-actions">
                            <button class="act-btn act-add" onclick="event.stopPropagation(); lanzarToast('✓ Añadido');">+</button>
                            <button class="act-btn act-chat" onclick="event.stopPropagation(); abrirChatDesdeGrid('${p.nombreProveedor}', '${p.proveedorId}')">💬</button>
                            <button class="act-btn act-det" onclick="event.stopPropagation(); verDetalleDesdeGrid('${p.id}')">ℹ️</button>
                        </div>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    // --- FUNCIONES NUEVAS Y CORREGIDAS ---

    // 1. Abrir imagen a pantalla completa
    window.abrirImgFull = function(imgUrl) {
        document.getElementById('img-full-content').innerHTML = `<img src="${imgUrl}">`;
        document.getElementById('modal-img-full').style.display = 'flex';
    }
    window.cerrarImgFull = () => document.getElementById('modal-img-full').style.display = 'none';

    // 2. Ver Detalle desde Grid
    window.verDetalleDesdeGrid = function(pId) {
        const p = productos.find(x => x.id === pId);
        document.getElementById('det-nombre').textContent = p.nombre;
        document.getElementById('det-precio').textContent = `$${Number(p.precio).toFixed(2)}`;
        document.getElementById('det-desc').textContent = p.descripcion || 'Sin descripción.';
        document.getElementById('modal-detalle').style.display = 'flex';
        // Guardamos el producto para usarlo en el chat del modal
        prodActualParaChat = p;
    }
    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';

    // 3. Abrir Chat desde Detalle
    window.abrirChatDesdeDetalle = function() {
        abrirChat(prodActualParaChat.nombreProveedor, prodActualParaChat.proveedorId);
    }

    // 4. Abrir Chat desde Grid
    window.abrirChatDesdeGrid = function(nombreProv, provId) {
        abrirChat(nombreProv, provId);
    }

    // --- LÓGICA DE CHAT MANTENIDA (Mantén la misma que tenías arriba) ---
    // ... abrirChat(), escucharMensajes(), enviarMensaje(), cerrarChat() que tenías ...

    cargar(); // Iniciar carga
</script>
</body>
</html>
