<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 30px 30px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-family: 'Syne'; font-size: 1.3rem; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
        .search-wrap { background: rgba(0,0,0,0.07); border-radius: 15px; padding: 12px 18px; display: flex; align-items: center; border: 1px solid rgba(0,0,0,0.03); }
        .search-wrap input { background: transparent; border: none; color: var(--negro); outline: none; width: 100%; font-size: 0.95rem; font-weight: 600; }

        /* GRID CATALOGO */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; overflow-y: auto; padding-bottom: 110px; }
        .prod-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; position: relative; }
        
        /* Imagen cliqueable */
        .prod-img { width: 100%; height: 260px; background: #fdfdfd; position: relative; cursor: pointer; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Tag de proveedor */
        .tag-prov { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); color: var(--negro); padding: 5px 12px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; z-index: 5; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(0,0,0,0.05); }

        /* Cuerpo de la tarjeta */
        .prod-body { padding: 14px; text-align: center; }
        .prod-nombre { font-size: 0.9rem; font-weight: 700; color: var(--negro); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-precio { color: #2bb12b; font-weight: 800; font-size: 1.15rem; margin-bottom: 14px; }

        /* BOTONES DE ACCIÓN RÁPIDA (FUNCIONALES) */
        .prod-actions { display: flex; justify-content: center; gap: 8px; position: relative; z-index: 10; padding-bottom: 15px; }
        .act-btn { background: #f2f3f0; border: none; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .act-btn svg { width: 18px; height: 18px; fill: #444; }
        .act-btn:active { transform: scale(0.85); background: #e0e0e0; }
        
        /* Botón de añadir con estilo preferido */
        .act-add { background: var(--negro); }
        .act-add svg { fill: var(--lima); }

        /* MODAL DETALLE */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .btn-atras { position: absolute; top: 40px; left: 20px; background: rgba(0,0,0,0.3); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        
        .carrusel-container { width: 100%; height: 55vh; position: relative; overflow: hidden; background: #000; }
        .carrusel-track { display: flex; height: 100%; transition: transform 0.3s ease-out; }
        .carrusel-item { min-width: 100%; height: 100%; }
        .carrusel-item img { width: 100%; height: 100%; object-fit: cover; }
        .punto.activo { background: var(--lima); width: 18px; border-radius: 10px; }

        .detalle-body { padding: 25px; background: white; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 5; }
        .opciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .opcion-item select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #eee; background: #f9f9f9; font-weight: 600; }
        .btn-qty { background: white; border: 1.5px solid #eee; width: 38px; height: 38px; border-radius: 12px; font-weight: 800; }

        .btn-style { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; margin-bottom: 12px; }
        .btn-negro { background: var(--negro); color: white; }
        .btn-borde { background: white; border: 2px solid var(--negro); color: var(--negro); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="Buscar productos para stock..." oninput="renderizarGridPrincipal()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle">
    <button class="btn-atras" onclick="cerrarDetalle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
    
    <div class="carrusel-container" id="track-box"></div> <div class="detalle-body">
        <h2 class="det-titulo" id="det-nom"></h2>
        <p class="det-precio" id="det-pre"></p>

        <div class="opciones-grid">
            <div class="opcion-item"><label>Talla</label><select id="sel-talla"><option>S</option><option>M</option></select></div>
            <div class="opcion-item"><label>Color</label><select id="sel-color"><option>Negro</option><option>Blanco</option></select></div>
        </div>

        <div class="contador-wrap">
            <div style="font-size: 0.7rem;">📦 Mínimo: <b id="min-qty">12</b> und.<br>🚚 Entrega: <b>3-5 días</b></div>
            <div class="controles"><button class="btn-qty" onclick="changeQty(-1)">-</button><span id="qty-val">12</span><button class="btn-qty" onclick="changeQty(1)">+</button></div>
        </div>
        
        <button class="btn-style btn-negro" onclick="lanzarToast()">Añadir al pedido</button>
        <button class="btn-style btn-borde" onclick="abrirChatNegociacionDirecta()">Chat con proveedor</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizarGridPrincipal();
    }

    window.renderizarGridPrincipal = function() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        productos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'prod-card';
            
            // Estructura HTML independiente para imagen y botones
            card.innerHTML = `
                <div class="prod-img" onclick="abrirDetalle(p)">
                    <img src="${p.imagenes?.[0] || p.imagen}">
                    <div class="tag-prov"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.43c-.16.09-.33.14-.5.14s-.34-.05-.5-.14l-7.97-4.43c-.32-.17-.53-.5-.53-.88v-9c0-.38.21-.71.53-.88l7.97-4.43c.16-.09.33-.14.5-.14s.34.05.5.14l7.97 4.43c.32.17.53.5.53.88v9z"/></svg> ${p.nombreProveedor || 'SOW'}</div>
                </div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                    
                    <div class="prod-actions">
                        <button class="act-btn act-add" onclick="event.stopPropagation(); lanzarToast()">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <button class="act-btn act-chat" onclick="event.stopPropagation(); abrirChatNegociacionDirecta(p)">
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
                        </button>
                        <button class="act-btn act-det" onclick="event.stopPropagation(); abrirDetalle(p)">
                            <svg viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
                        </button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    // Funciones de navegación nativa (back button) y chat de negociación mantenidas
    // ... (abrirDetalle, abrirChatNegociacionDirecta, changeQty, cerrarDetalle) ...

    cargar();
</script>
</body>
</html>
