<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; --bubble-v: #DCF8C6; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER SLIM LIMA */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 25px 25px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-family: 'Syne'; font-size: 1.3rem; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }
        .search-wrap { background: rgba(0,0,0,0.06); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .search-wrap input { background: transparent; border: none; color: var(--negro); outline: none; width: 100%; font-size: 0.95rem; font-weight: 500; }

        /* GRID PRINCIPAL */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 100px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.04); border: 1px solid #eee; display: flex; flex-direction: column; position: relative; }
        .prod-img-min { width: 100%; height: 200px; background: #fafafa; }
        .prod-img-min img { width: 100%; height: 100%; object-fit: cover; }
        .prod-info-min { padding: 10px; text-align: center; }
        .prod-info-min h3 { font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; }
        .prod-info-min p { color: #2bb12b; font-weight: 800; font-size: 1rem; }

        /* MODAL DE DETALLE (PÁGINA DE PRODUCTO) */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        .btn-atras { position: absolute; top: 40px; left: 20px; background: var(--negro); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; z-index: 10; }
        
        .detalle-img { width: 100%; height: 45vh; background: #eee; }
        .detalle-img img { width: 100%; height: 100%; object-fit: cover; }

        .detalle-body { padding: 25px; }
        .detalle-prov { color: #888; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .detalle-nombre { font-family: 'Syne'; font-size: 1.6rem; margin-bottom: 5px; color: var(--negro); }
        .detalle-precio { color: #2bb12b; font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; }
        .detalle-desc { color: #555; line-height: 1.5; font-size: 0.95rem; margin-bottom: 25px; }

        /* BOTONES ESTILO USER PREFERENCE */
        .acciones-fix { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
        .btn-style { padding: 15px; border-radius: 12px; font-weight: 800; font-family: 'DM Sans'; text-transform: uppercase; font-size: 0.9rem; border: none; cursor: pointer; }
        .btn-negro { background: var(--negro); color: white; }
        .btn-borde { background: white; color: var(--negro); border: 2px solid var(--negro); }

        /* RECOMENDACIONES HORIZONTALES */
        .reco-section { padding: 0 25px 50px; }
        .reco-section h4 { font-family: 'Syne'; margin-bottom: 15px; }
        .reco-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .reco-scroll::-webkit-scrollbar { display: none; }
        .reco-card { min-width: 140px; background: #f9f9f9; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .reco-card img { width: 100%; height: 140px; object-fit: cover; }
        .reco-info { padding: 8px; font-size: 0.75rem; text-align: center; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="¿Qué buscas?" oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle">
    <button class="btn-atras" onclick="cerrarDetalle()">←</button>
    <div class="detalle-img" id="det-img-box"></div>
    
    <div class="detalle-body">
        <p class="detalle-prov" id="det-prov"></p>
        <h2 class="detalle-nombre" id="det-nom"></h2>
        <p class="detalle-precio" id="det-pre"></p>
        <p class="detalle-desc" id="det-desc">Este es un producto de alta calidad verificado por PROVEED. Ideal para emprendedores que buscan stock premium.</p>
        
        <div class="acciones-fix">
            <button class="btn-style btn-negro" onclick="alert('Añadido')">Añadir al carrito</button>
            <button class="btn-style btn-borde" id="btn-chat-det">Chat con proveedor</button>
        </div>
    </div>

    <div class="reco-section">
        <h4>También te puede interesar</h4>
        <div class="reco-scroll" id="reco-box"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizar();
    }

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';

        productos.filter(p => (p.nombre || '').toLowerCase().includes(term)).forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.onclick = () => abrirDetalle(p);
            card.innerHTML = `
                <div class="prod-img-min"><img src="${img}"></div>
                <div class="prod-info-min">
                    <h3>${p.nombre}</h3>
                    <p>$${Number(p.precio).toFixed(2)}</p>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        const img = p.imagenes?.[0] || p.imagen || '';
        
        document.getElementById('det-img-box').innerHTML = `<img src="${img}">`;
        document.getElementById('det-prov').innerText = `📦 ${p.nombreProveedor || 'SOW'}`;
        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = `$${Number(p.precio).toFixed(2)}`;
        
        // Botón de chat dinámico
        document.getElementById('btn-chat-det').onclick = () => alert('Abriendo chat con ' + p.nombreProveedor);

        // Renderizar Recomendaciones (otros productos que no sean el actual)
        const recoBox = document.getElementById('reco-box');
        recoBox.innerHTML = '';
        productos.filter(item => item.id !== p.id).slice(0, 5).forEach(r => {
            const rImg = r.imagenes?.[0] || r.imagen || '';
            const rCard = document.createElement('div');
            rCard.className = 'reco-card';
            rCard.onclick = (e) => { e.stopPropagation(); abrirDetalle(r); modal.scrollTop = 0; };
            rCard.innerHTML = `
                <img src="${rImg}">
                <div class="reco-info"><strong>${r.nombre}</strong><br>$${r.precio}</div>`;
            recoBox.appendChild(rCard);
        });

        modal.style.display = 'flex';
    }

    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';

    cargar();
</script>
</body>
</html>
