<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; --bubble-v: #DCF8C6; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER SLIM VERDE LIMA */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 25px 25px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-family: 'Syne'; font-size: 1.3rem; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }
        .search-wrap { background: rgba(0,0,0,0.06); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .search-wrap input { background: transparent; border: none; color: var(--negro); outline: none; width: 100%; font-size: 0.95rem; font-weight: 500; }

        /* GRID: IMÁGENES GRANDES (280px) */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 100px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.04); border: 1px solid #eee; display: flex; flex-direction: column; position: relative; }
        
        .prod-img { width: 100%; height: 280px; background: #fafafa; position: relative; cursor: zoom-in; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ETIQUETA PROVEEDOR PREMIUM */
        .tag-prov { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); color: var(--negro); padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .prod-body { padding: 10px 12px 14px; text-align: center; }
        .prod-nombre { font-size: 0.85rem; font-weight: 700; color: var(--negro); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-precio { color: #2bb12b; font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; }

        /* BOTONES DE ACCIÓN SVG */
        .prod-actions { display: flex; justify-content: center; gap: 10px; }
        .act-btn { background: #f1f1f1; border: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .act-btn svg { width: 18px; height: 18px; fill: #444; }
        .act-add { background: var(--negro); }
        .act-add svg { fill: var(--lima); }
        .act-btn:active { transform: scale(0.9); }

        /* MODAL IMAGEN COMPLETA */
        #modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #modal-full img { max-width: 95%; max-height: 85%; border-radius: 12px; object-fit: contain; }

        /* MODAL CHAT */
        #modal-chat { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; justify-content: flex-end; }
        .chat-container { background: white; width: 100%; height: 85vh; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease-out; }
        .chat-h { background: var(--negro); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .bub { padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; max-width: 75%; width: fit-content; }
        .mio { align-self: flex-end; background: var(--bubble-v); border-bottom-right-radius: 2px; }
        .otro { align-self: flex-start; background: white; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .chat-i { padding: 12px 15px 40px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; }
        .chat-i input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="¿Qué buscas hoy?" oninput="renderizar()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-full" onclick="this.style.display='none'">
    <img id="img-target" src="">
</div>

<div id="modal-chat">
    <div class="chat-container">
        <header class="chat-h">
            <h2 id="chat-t" style="font-family:'Syne';">Proveedor</h2>
            <button onclick="cerrarChat()" style="background:none; border:none; color:white; font-size:1.8rem;">×</button>
        </header>
        <div id="msgs"></div>
        <div class="chat-i">
            <input type="text" id="msg-in" placeholder="Escribe un mensaje...">
            <button onclick="enviar()" style="background:var(--negro); border:none; border-radius:50%; width:45px; height:45px; display:flex; align-items:center; justify-content:center;">
                <svg style="width:18px; fill:white; margin-left:3px;" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];
    const miID = "usuario_demo";

    async function cargar() {
        try {
            const snap = await getDocs(collection(db, "productos"));
            productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar();
        } catch(e) { console.error("Error:", e); }
    }

    window.renderizar = function() {
        const grid = document.getElementById('grid');
        const term = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';

        productos.filter(p => (p.nombre || '').toLowerCase().includes(term)).forEach(p => {
            const img = p.imagenes?.[0] || p.imagen || '';
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.innerHTML = `
                <div class="prod-img" onclick="abrirImg('${img}')">
                    <img src="${img}">
                    <div class="tag-prov">📦 ${p.nombreProveedor || 'SOW'}</div>
                </div>
                <div class="prod-body">
                    <div class="prod-nombre">${p.nombre}</div>
                    <div class="prod-precio">$${Number(p.precio).toFixed(2)}</div>
                    <div class="prod-actions">
                        <button class="act-btn act-add" onclick="event.stopPropagation(); alert('Añadido')">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <button class="act-btn" onclick="event.stopPropagation(); abrirChat('${p.nombreProveedor}','${p.proveedorId}')">
                            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                        </button>
                        <button class="act-btn" onclick="event.stopPropagation(); alert('Detalle de ${p.nombre}')">
                            <svg viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
                        </button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.abrirImg = (url) => {
        document.getElementById('img-target').src = url;
        document.getElementById('modal-full').style.display = 'flex';
    };

    let chatID = "";
    let unsub = null;
    window.abrirChat = (nom, id) => {
        document.getElementById('chat-t').innerText = nom;
        document.getElementById('modal-chat').style.display = 'flex';
        chatID = `${miID}_${id}`;
        if(unsub) unsub();
        const q = query(collection(db, "chats", chatID, "mensajes"), orderBy("fecha", "asc"));
        unsub = onSnapshot(q, (s) => {
            const b = document.getElementById('msgs');
            b.innerHTML = '';
            s.forEach(d => {
                const m = d.data();
                const dv = document.createElement('div');
                dv.className = `bub ${m.remitente === miID ? 'mio' : 'otro'}`;
                dv.innerText = m.texto;
                b.appendChild(dv);
            });
            b.scrollTop = b.scrollHeight;
        });
    };

    window.enviar = async () => {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "chats", chatID, "mensajes"), {
            texto: i.value, remitente: miID, fecha: serverTimestamp()
        });
        i.value = '';
    };

    window.cerrarChat = () => document.getElementById('modal-chat').style.display = 'none';

    cargar();
</script>
</body>
</html>
