<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 25px 25px; z-index: 10; }
        .header h1 { font-family: 'Syne'; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; }

        /* GRID CATALOGO PRINCIPAL */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; }
        .prod-img-min { width: 100%; height: 180px; }
        .prod-img-min img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL DETALLE (PÁGINA DE PRODUCTO) */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.4s ease; }
        .btn-atras { position: absolute; top: 40px; left: 20px; background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; z-index: 100; font-size: 1.2rem; backdrop-filter: blur(5px); }
        
        /* CARRUSEL DE IMÁGENES (MÁS ESPACIO ARRIBA) */
        .carrusel-container { width: 100%; height: 55vh; position: relative; overflow: hidden; background: #000; }
        .carrusel-track { display: flex; height: 100%; transition: transform 0.3s ease-out; }
        .carrusel-item { min-width: 100%; height: 100%; }
        .carrusel-item img { width: 100%; height: 100%; object-fit: cover; }
        .indicadores { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 6px; }
        .punto { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .punto.activo { background: var(--lima); width: 20px; border-radius: 10px; }

        .detalle-body { padding: 25px; background: white; border-radius: 30px 30px 0 0; margin-top: -25px; position: relative; z-index: 5; }
        .det-titulo { font-family: 'Syne'; font-size: 1.8rem; margin-bottom: 5px; color: var(--negro); }
        .det-precio { color: #2bb12b; font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; }
        
        /* OPCIONES Y CONTADOR */
        .opciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .opcion-item label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #888; display: block; margin-bottom: 5px; }
        .opcion-item select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; }

        .contador-wrap { background: #f4f4f4; border-radius: 15px; padding: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .controles { display: flex; align-items: center; gap: 15px; }
        .btn-qty { background: white; border: 1px solid #ddd; width: 35px; height: 35px; border-radius: 10px; font-weight: 800; }

        .btn-style { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; }
        .btn-negro { background: var(--negro); color: white; margin-bottom: 40px; }

        /* RECOMENDACIONES INFINITAS (GRID VERTICAL) */
        .reco-header { font-family: 'Syne'; font-size: 1.2rem; padding: 0 25px 15px; text-transform: uppercase; }
        #reco-infinito { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px 100px; }

        /* CHAT FLOTANTE MÁS PEQUEÑO */
        .chat-float { position: fixed; bottom: 30px; right: 20px; background: var(--negro); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 3000; border: 1.5px solid var(--lima); }
        .chat-float svg { width: 22px; fill: var(--lima); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
</header>

<div id="grid"></div>

<div id="modal-detalle">
    <button class="btn-atras" onclick="cerrarDetalle()">←</button>
    
    <div class="carrusel-container" id="carrusel">
        <div class="carrusel-track" id="track"></div>
        <div class="indicadores" id="puntos"></div>
    </div>
    
    <div class="detalle-body">
        <h2 class="det-titulo" id="det-nom"></h2>
        <p class="det-precio" id="det-pre"></p>

        <div class="opciones-grid">
            <div class="opcion-item"><label>Talla</label><select><option>S</option><option>M</option></select></div>
            <div class="opcion-item"><label>Color</label><select><option>Negro</option><option>Blanco</option></select></div>
        </div>

        <div class="contador-wrap">
            <div style="font-size: 0.7rem;">📦 Mínimo: <b id="min-qty">12</b><br>🚚 Entrega: <b>3-5 días</b></div>
            <div class="controles">
                <button class="btn-qty" onclick="changeQty(-1)">-</button>
                <span id="qty-val" style="font-weight:800">12</span>
                <button class="btn-qty" onclick="changeQty(1)">+</button>
            </div>
        </div>
        
        <button class="btn-style btn-negro" onclick="alert('Añadido')">Añadir al pedido</button>

        <h3 class="reco-header">Sigue explorando</h3>
        <div id="reco-infinito"></div>
    </div>

    <div class="chat-float" onclick="alert('Abriendo chat...')">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizarGridPrincipal();
    }

    function renderizarGridPrincipal() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        productos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.onclick = () => abrirDetalle(p);
            card.innerHTML = `<div class="prod-img-min"><img src="${p.imagenes?.[0] || p.imagen}"></div>
                <div style="padding:10px; text-align:center;"><h3 style="font-size:0.8rem">${p.nombre}</h3><p style="color:#2bb12b; font-weight:800">$${p.precio}</p></div>`;
            grid.appendChild(card);
        });
    }

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        const track = document.getElementById('track');
        const puntos = document.getElementById('puntos');
        
        // Cargar Carrusel (si hay 1 o 1056 fotos)
        const fotos = p.imagenes || [p.imagen];
        track.innerHTML = fotos.map(f => `<div class="carrusel-item"><img src="${f}"></div>`).join('');
        puntos.innerHTML = fotos.map((_, i) => `<div class="punto ${i===0?'activo':''}"></div>`).join('');
        
        // Lógica de deslizar carrusel
        let index = 0;
        track.style.transform = `translateX(0)`;
        track.onmousedown = track.ontouchstart = (e) => {
            let startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            track.ontouchend = (ev) => {
                let endX = ev.changedTouches[0].clientX;
                if(startX - endX > 50 && index < fotos.length - 1) index++;
                if(startX - endX < -50 && index > 0) index--;
                track.style.transform = `translateX(-${index * 100}%)`;
                Array.from(puntos.children).forEach((p, i) => p.className = `punto ${i===index?'activo':''}`);
            }
        };

        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = `$${p.precio}`;
        
        // Recomendaciones Infinitas (Grid Vertical)
        const recoGrid = document.getElementById('reco-infinito');
        recoGrid.innerHTML = '';
        // Simulamos "miles" de productos repitiendo la lista para el efecto infinito
        [...productos, ...productos, ...productos].forEach(r => {
            const item = document.createElement('div');
            item.className = 'prod-card';
            item.style.boxShadow = 'none';
            item.innerHTML = `<div class="prod-img-min" style="height:140px"><img src="${r.imagenes?.[0] || r.imagen}"></div>
                <div style="padding:8px; font-size:0.7rem; text-align:center;"><b>${r.nombre}</b><br>$${r.precio}</div>`;
            recoGrid.appendChild(item);
        });

        modal.style.display = 'flex';
        modal.scrollTop = 0;
    }

    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';
    window.changeQty = (val) => {
        let el = document.getElementById('qty-val');
        let current = parseInt(el.innerText);
        if(current + val >= 1) el.innerText = current + val;
    }

    cargar();
</script>
</body>
</html>
