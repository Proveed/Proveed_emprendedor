<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Explorar Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* HEADER PRINCIPAL */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 25px 25px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-family: 'Syne'; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .search-wrap { background: rgba(0,0,0,0.06); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .search-wrap input { background: transparent; border: none; outline: none; width: 100%; font-size: 0.9rem; font-weight: 500; }

        /* GRID CATALOGO PRINCIPAL */
        #grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; overflow-y: auto; padding-bottom: 80px; }
        .prod-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.2s; position: relative; }
        .prod-img-min { width: 100%; height: 180px; background: #fafafa; }
        .prod-img-min img { width: 100%; height: 100%; object-fit: cover; }
        .prod-info-min { padding: 10px; text-align: center; }
        .prod-info-min h3 { font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; color: var(--negro); }
        .prod-info-min p { color: #2bb12b; font-weight: 800; font-size: 1rem; }

        /* MODAL DETALLE (PÁGINA DE PRODUCTO COMPLETA) */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        .btn-atras { position: absolute; top: 40px; left: 20px; background: rgba(0,0,0,0.4); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; z-index: 100; font-size: 1.2rem; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
        
        /* CARRUSEL PRO */
        .carrusel-container { width: 100%; height: 55vh; position: relative; overflow: hidden; background: #000; }
        .carrusel-track { display: flex; height: 100%; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .carrusel-item { min-width: 100%; height: 100%; }
        .carrusel-item img { width: 100%; height: 100%; object-fit: cover; }
        .indicadores { position: absolute; bottom: 35px; width: 100%; display: flex; justify-content: center; gap: 6px; }
        .punto { width: 7px; height: 7px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .punto.activo { background: var(--lima); width: 18px; border-radius: 10px; }

        /* CUERPO DEL DETALLE */
        .detalle-body { padding: 25px; background: white; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 5; }
        .det-titulo { font-family: 'Syne'; font-size: 1.7rem; margin-bottom: 5px; color: var(--negro); }
        .det-precio { color: #2bb12b; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }
        
        /* SELECTORES DINÁMICOS */
        .opciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .opcion-item label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #999; display: block; margin-bottom: 6px; }
        .opcion-item select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #eee; background: #f9f9f9; font-family: 'DM Sans'; font-weight: 600; font-size: 0.85rem; outline: none; }

        /* CONTADOR Y LOGÍSTICA */
        .contador-wrap { background: #f7f7f7; border-radius: 18px; padding: 18px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .info-envio { font-size: 0.7rem; color: #666; line-height: 1.4; }
        .info-envio b { color: var(--negro); }
        .controles { display: flex; align-items: center; gap: 15px; }
        .btn-qty { background: white; border: 1.5px solid #eee; width: 38px; height: 38px; border-radius: 12px; font-weight: 800; font-size: 1.2rem; cursor: pointer; color: var(--negro); }
        #qty-val { font-weight: 800; font-size: 1.1rem; min-width: 25px; text-align: center; }

        /* BOTONES DE ACCIÓN */
        .btn-style { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; font-size: 0.95rem; border: none; cursor: pointer; transition: 0.2s; }
        .btn-negro { background: var(--negro); color: white; margin-bottom: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-negro:active { transform: scale(0.98); }

        /* RECOMENDACIONES INFINITAS */
        .reco-header { font-family: 'Syne'; font-size: 1.1rem; padding: 0 25px 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        #reco-infinito { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px 100px; }

        /* CHAT FLOTANTE GHOST */
        .chat-float { position: fixed; bottom: 30px; right: 20px; background: var(--negro); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 3000; border: 2px solid var(--lima); }
        .chat-float svg { width: 24px; fill: var(--lima); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <h1>Explorar</h1>
    <div class="search-wrap">
        <input type="text" id="busqueda" placeholder="¿Qué buscas para tu negocio?" oninput="renderizarGridPrincipal()">
    </div>
</header>

<div id="grid"></div>

<div id="modal-detalle">
    <button class="btn-atras" onclick="cerrarDetalle()">←</button>
    
    <div class="carrusel-container" id="carrusel">
        <div class="carrusel-track" id="track"></div>
        <div class="indicadores" id="puntos"></div>
    </div>
    
    <div class="detalle-body">
        <h2 class="det-titulo" id="det-nom"></h2>
        <p class="det-precio" id="det-pre"></p>

        <div class="opciones-grid">
            <div class="opcion-item">
                <label>Talla / Tamaño</label>
                <select id="sel-talla"><option>S</option><option>M</option><option>L</option><option>XL</option><option>Única</option></select>
            </div>
            <div class="opcion-item">
                <label>Color</label>
                <select id="sel-color"><option>Negro</option><option>Blanco</option><option>Rojo</option><option>Azul</option></select>
            </div>
            <div class="opcion-item" style="grid-column: span 2;">
                <label>Tipo de Textil / Material</label>
                <select id="sel-textil"><option>Algodón Premium</option><option>Poliéster G5</option><option>Seda Fría</option></select>
            </div>
        </div>

        <div class="contador-wrap">
            <div class="info-envio">
                📦 Mínimo: <b id="min-qty">12</b> und.<br>
                🚚 Entrega: <b>3-5 días hábiles</b>
            </div>
            <div class="controles">
                <button class="btn-qty" onclick="changeQty(-1)">-</button>
                <span id="qty-val">12</span>
                <button class="btn-qty" onclick="changeQty(1)">+</button>
            </div>
        </div>
        
        <button class="btn-style btn-negro" onclick="alert('Pedido añadido al carrito')">Añadir al pedido</button>

        <h3 class="reco-header">Sigue explorando productos</h3>
        <div id="reco-infinito"></div>
    </div>

    <div class="chat-float" onclick="alert('Iniciando chat con el proveedor...')">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productos = [];
    let minActual = 12;

    async function cargar() {
        const snap = await getDocs(collection(db, "productos"));
        productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizarGridPrincipal();
    }

    window.renderizarGridPrincipal = function() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';
        
        productos.filter(p => (p.nombre || '').toLowerCase().includes(search)).forEach(p => {
            const card = document.createElement('div');
            card.className = 'prod-card';
            card.onclick = () => abrirDetalle(p);
            card.innerHTML = `
                <div class="prod-img-min"><img src="${p.imagenes?.[0] || p.imagen}"></div>
                <div class="prod-info-min">
                    <h3>${p.nombre}</h3>
                    <p>$${Number(p.precio).toFixed(2)}</p>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        
        // --- LÓGICA DE NAVEGACIÓN NATIVA (BOTÓN ATRÁS DEL TELÉFONO) ---
        history.pushState({ modalAbierto: true }, "");
        window.onpopstate = () => cerrarDetalle(false);
        // ---------------------------------------------------------------------------------

        // Reset Carrusel
        const track = document.getElementById('track');
        const puntos = document.getElementById('puntos');
        const fotos = p.imagenes || [p.imagen];
        
        track.innerHTML = fotos.map(f => `<div class="carrusel-item"><img src="${f}"></div>`).join('');
        puntos.innerHTML = fotos.map((_, i) => `<div class="punto ${i===0?'activo':''}"></div>`).join('');
        
        let index = 0;
        track.style.transform = `translateX(0)`;
        
        // Control Carrusel Touch
        track.ontouchstart = (e) => {
            let startX = e.touches[0].clientX;
            track.ontouchend = (ev) => {
                let endX = ev.changedTouches[0].clientX;
                if(startX - endX > 50 && index < fotos.length - 1) index++;
                if(startX - endX < -50 && index > 0) index--;
                track.style.transform = `translateX(-${index * 100}%)`;
                Array.from(puntos.children).forEach((pt, i) => pt.className = `punto ${i===index?'activo':''}`);
            }
        };

        // Datos del Producto
        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = `$${Number(p.precio).toFixed(2)}`;
        minActual = p.cantidadMinima || 12;
        document.getElementById('qty-val').innerText = minActual;
        document.getElementById('min-qty').innerText = minActual;

        // Grid Infinito de Recomendaciones
        const recoGrid = document.getElementById('reco-infinito');
        recoGrid.innerHTML = '';
        
        // Simulamos miles de productos aleatorizando la lista cargada
        [...productos].sort(() => Math.random() - 0.5).forEach(r => {
            const item = document.createElement('div');
            item.className = 'prod-card';
            item.onclick = (e) => { 
                e.stopPropagation(); 
                abrirDetalle(r); 
                modal.scrollTo({ top: 0, behavior: 'smooth' }); 
            };
            item.innerHTML = `
                <div class="prod-img-min" style="height:140px"><img src="${r.imagenes?.[0] || r.imagen}"></div>
                <div style="padding:10px; font-size:0.75rem; text-align:center;">
                    <b>${r.nombre}</b><br><span style="color:#2bb12b; font-weight:800">$${Number(r.precio).toFixed(2)}</span>
                </div>`;
            recoGrid.appendChild(item);
        });

        modal.style.display = 'flex';
        modal.scrollTop = 0;
    }

    window.cerrarDetalle = (debeIrAtras = true) => {
        document.getElementById('modal-detalle').style.display = 'none';
        if (debeIrAtras && window.history.state?.modalAbierto) history.back();
    }

    window.changeQty = (val) => {
        let el = document.getElementById('qty-val');
        let current = parseInt(el.innerText);
        if(current + val >= minActual) el.innerText = current + val;
    }

    cargar();
</script>
</body>
</html>
