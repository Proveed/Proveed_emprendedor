<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Vista Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --naranja: #ff6a00; --verde-ok: #00a650; --gris-borde: #f0f0f0; --gris-f: #f5f5f5; }
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

        /* GRID PRINCIPAL */
        #grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; padding-top: 100px; }
        .prod-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--gris-borde); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .prod-img-min { width: 100%; height: 160px; background: #eee; }
        .prod-img-min img { width: 100%; height: 100%; object-fit: cover; }
        .prod-info-min { padding: 10px; text-align: left; }
        .prod-info-min h3 { font-size: 0.75rem; color: #444; height: 32px; overflow: hidden; margin-bottom: 5px; font-weight: 500; }
        .prod-info-min p { color: var(--negro); font-weight: 800; font-size: 1rem; }

        /* HEADER EXPLORAR */
        .main-header { position: fixed; top: 0; width: 100%; background: var(--lima); padding: 40px 20px 15px; z-index: 1000; border-radius: 0 0 20px 20px; }
        .main-header h1 { font-family: 'Syne'; font-size: 1.2rem; text-transform: uppercase; }

        /* MODAL ESTILO MARKETPLACE (COMO TU IMAGEN) */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease; }
        
        .modal-header-actions { position: fixed; top: 0; left: 0; width: 100%; padding: 45px 15px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn-action { background: rgba(0,0,0,0.3); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .btn-chat-top { background: var(--lima); color: var(--negro); }

        .carrusel-full { width: 100%; height: 55vh; background: #f2f2f2; position: relative; }
        .carrusel-full img { width: 100%; height: 100%; object-fit: cover; }

        .info-container { padding: 20px; padding-bottom: 120px; }
        .status-row { display: flex; gap: 8px; margin-bottom: 10px; font-size: 0.75rem; font-weight: 700; color: var(--verde-ok); }
        .prod-title { font-size: 1.1rem; font-weight: 500; color: #333; margin-bottom: 15px; line-height: 1.4; }
        
        .price-section { margin-bottom: 25px; }
        .old-price { font-size: 0.9rem; text-decoration: line-through; color: #999; }
        .main-price-row { display: flex; align-items: baseline; gap: 5px; margin-top: 2px; }
        .currency { font-size: 1.2rem; font-weight: 800; }
        .price-amount { font-size: 2.2rem; font-weight: 800; }
        .promo-tag { background: #fff5ed; color: var(--naranja); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; margin-left: 10px; }

        .option-section { border-top: 1px solid #eee; padding-top: 20px; }
        .qty-selector { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; padding: 15px; border-radius: 15px; margin-top: 10px; }
        .btn-qty { background: white; border: 1px solid #ddd; width: 40px; height: 40px; border-radius: 10px; font-size: 1.5rem; font-weight: 300; }

        /* BARRA FIJA INFERIOR */
        .fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px 35px; border-top: 1px solid #eee; z-index: 150; }
        .btn-buy { background: var(--naranja); color: white; width: 100%; padding: 18px; border-radius: 35px; border: none; font-size: 1.1rem; font-weight: 700; box-shadow: 0 5px 15px rgba(255,106,0,0.3); }
        .btn-buy span { display: block; font-size: 0.7rem; font-weight: 400; opacity: 0.8; margin-top: 2px; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header class="main-header">
    <h1>Explorar</h1>
</header>

<div id="grid"></div>

<div id="modal-detalle">
    <div class="modal-header-actions">
        <button class="btn-action" onclick="cerrarDetalle()">✕</button>
        <button class="btn-action btn-chat-top" id="btn-chat-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        </button>
    </div>

    <div class="carrusel-full"><img id="main-img" src=""></div>

    <div class="info-container">
        <div class="status-row"><span>✓ Envío gratis</span><span style="color:var(--naranja)">⚡ OFERTA</span></div>
        <h2 class="prod-title" id="det-nom"></h2>
        
        <div class="price-section">
            <span class="old-price" id="old-p"></span>
            <div class="main-price-row">
                <span class="currency">$</span>
                <span class="price-amount" id="det-pre"></span>
                <span class="promo-tag">-30% OFF</span>
            </div>
        </div>

        <div class="option-section">
            <p style="font-size:0.8rem; font-weight:700; color:#666;">CANTIDAD MÍNIMA</p>
            <div class="qty-selector">
                <button class="btn-qty" onclick="changeQty(-1)">−</button>
                <span id="qty-val" style="font-weight:800; font-size:1.2rem;">12</span>
                <button class="btn-qty" onclick="changeQty(1)">+</button>
            </div>
        </div>
    </div>

    <div class="fixed-bottom">
        <button class="btn-buy">Añadir al pedido <span>Llega en 3-5 días hábiles</span></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    async function cargar() {
        const grid = document.getElementById('grid');
        try {
            const snap = await getDocs(collection(db, "productos"));
            const productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            grid.innerHTML = productos.map(p => `
                <div class="prod-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="prod-img-min"><img src="${p.imagenes?.[0] || p.imagen}"></div>
                    <div class="prod-info-min"><h3>${p.nombre}</h3><p>$${Number(p.precio).toFixed(2)}</p></div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        const img = p.imagenes?.[0] || p.imagen;
        document.getElementById('main-img').src = img;
        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = Number(p.precio).toFixed(2);
        document.getElementById('old-p').innerText = `$${(Number(p.precio) * 1.3).toFixed(2)}`;
        document.getElementById('qty-val').innerText = p.cantidadMinima || 12;

        document.getElementById('btn-chat-header').onclick = async () => {
            const user = auth.currentUser;
            if(!user) return alert("Inicia sesión");
            const q = query(collection(db, "chats"), where("emprendedorId", "==", user.uid), where("proveedorId", "==", p.proveedorId || "SISTEMA"));
            const snap = await getDocs(q);
            let chatId = snap.empty ? (await addDoc(collection(db, "chats"), {
                emprendedorId: user.uid,
                proveedorId: p.proveedorId || "SISTEMA",
                proveedorNombre: p.proveedorNombre || "Proveedor",
                ultimoMensaje: "Referencia: " + p.nombre,
                ultimoMensajeEn: serverTimestamp()
            })).id : snap.docs[0].id;

            window.location.href = `chat.html?chatId=${chatId}&refImg=${encodeURIComponent(img)}&refMsg=Hola, me interesa: ${p.nombre}`;
        };

        modal.style.display = 'flex';
    };

    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';
    window.changeQty = (v) => {
        let q = document.getElementById('qty-val');
        let val = parseInt(q.innerText) + v;
        if(val >= 1) q.innerText = val;
    };

    // Esto activa la carga apenas abre el archivo
    cargar();
</script>
</body>
</html>
