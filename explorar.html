<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Vista Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --naranja: #ff6a00; --verde-ok: #00a650; --gris-borde: #f0f0f0; }
        body { background: #fff; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

        /* GRID CATALOGO (Se mantiene igual para no romper el flujo) */
        #grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .prod-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--gris-borde); }
        .prod-img-min { width: 100%; height: 160px; background: #f9f9f9; }
        .prod-img-min img { width: 100%; height: 100%; object-fit: cover; }

        /* --- MODAL ESTILO MARKETPLACE (COMO LA IMAGEN) --- */
        #modal-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        
        /* Header Flotante sobre imagen */
        .modal-header-actions { position: fixed; top: 0; left: 0; width: 100%; padding: 45px 15px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none; }
        .btn-action { background: rgba(0,0,0,0.3); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); pointer-events: auto; }
        .btn-action svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2.5; }

        /* Carrusel Principal */
        .carrusel-full { width: 100%; height: 60vh; background: #f2f2f2; position: relative; }
        .carrusel-full img { width: 100%; height: 100%; object-fit: cover; }
        .img-counter { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.4); color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; }

        /* Información del Producto */
        .info-container { padding: 15px; padding-bottom: 120px; }
        
        /* Tags superiores */
        .status-row { display: flex; gap: 10px; margin-bottom: 12px; font-size: 0.75rem; color: var(--verde-ok); font-weight: 700; }
        .tag-green { display: flex; align-items: center; gap: 4px; }

        .prod-title { font-size: 1.1rem; font-weight: 500; color: #333; line-height: 1.4; margin-bottom: 10px; }
        
        /* Precios Estilo Imagen */
        .price-section { margin-bottom: 20px; }
        .old-price { font-size: 0.9rem; text-decoration: line-through; color: #999; margin-bottom: 4px; display: block; }
        .main-price-row { display: flex; align-items: baseline; gap: 8px; }
        .currency { font-size: 1.1rem; font-weight: 800; color: var(--negro); }
        .price-amount { font-size: 1.8rem; font-weight: 800; color: var(--negro); }
        .promo-tag { background: #fff5ed; color: var(--naranja); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; border: 1px solid #ffe6d5; }

        /* Selectores de Cantidad y Opciones */
        .option-section { border-top: 1px solid var(--gris-borde); padding-top: 20px; margin-top: 10px; }
        .option-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; color: #666; }
        
        .qty-selector { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; padding: 12px 18px; border-radius: 12px; }
        .btn-qty { background: transparent; border: none; font-size: 1.4rem; width: 40px; height: 40px; color: var(--negro); font-weight: 700; }

        /* --- BARRA FIJA INFERIOR (COMPRAR) --- */
        .fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px 35px; border-top: 1px solid var(--gris-borde); z-index: 150; }
        .btn-buy { background: var(--naranja); color: white; width: 100%; padding: 16px; border-radius: 30px; border: none; font-size: 1rem; font-weight: 700; text-transform: none; }
        .btn-buy span { display: block; font-size: 0.65rem; font-weight: 400; opacity: 0.9; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div id="grid"></div>

<div id="modal-detalle">
    <div class="modal-header-actions">
        <button class="btn-action" onclick="cerrarDetalle()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div style="display: flex; gap: 10px;">
            <button class="btn-action" id="btn-chat-header" style="background: var(--lima);">
                <svg viewBox="0 0 24 24" style="stroke: var(--negro);"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="btn-action">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8m-16 0l8-8 8 8m-8-8v16"/></svg>
            </button>
        </div>
    </div>

    <div class="carrusel-full">
        <img id="main-img" src="" alt="">
        <div class="img-counter">1/8</div>
    </div>

    <div class="info-container">
        <div class="status-row">
            <span class="tag-green">✓ Envío gratis</span>
            <span style="color: #999;">|</span>
            <span style="color: var(--naranja);">⚡ ÚLTIMO DÍA</span>
        </div>

        <h2 class="prod-title" id="det-nom">Cargando...</h2>

        <div class="price-section">
            <span class="old-price" id="old-p">$0.00</span>
            <div class="main-price-row">
                <span class="currency">$</span>
                <span class="price-amount" id="det-pre">0.00</span>
                <span class="promo-tag" id="discount">-50% OFF</span>
            </div>
        </div>

        <div class="option-section">
            <p class="option-title">Cantidad mínima requerida</p>
            <div class="qty-selector">
                <button class="btn-qty" onclick="changeQty(-1)">−</button>
                <span id="qty-val" style="font-weight: 800; font-size: 1.1rem;">12</span>
                <button class="btn-qty" onclick="changeQty(1)">+</button>
            </div>
        </div>

        <h3 style="font-size: 0.9rem; margin-top: 30px; margin-bottom: 15px; color: #666;">También te puede interesar</h3>
        <div id="reco-infinito" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div class="fixed-bottom">
        <button class="btn-buy" onclick="alert('Añadido al pedido')">
            Añadir al pedido
            <span>Llega a EC en 3-5 DÍAS HÁBILES</span>
        </button>
    </div>
</div>

<script type="module">
    // (Mantén tus importaciones de Firebase y lógica de cargarDB igual)
    // ... lógica anterior ...

    window.abrirDetalle = (p) => {
        const modal = document.getElementById('modal-detalle');
        const img = p.imagenes?.[0] || p.imagen;
        
        document.getElementById('main-img').src = img;
        document.getElementById('det-nom').innerText = p.nombre;
        document.getElementById('det-pre').innerText = Number(p.precio).toFixed(2);
        
        // Simulación de precio anterior (estilo marketing)
        document.getElementById('old-p').innerText = `$${(Number(p.precio) * 1.5).toFixed(2)}`;
        
        document.getElementById('qty-val').innerText = p.cantidadMinima || 12;
        
        // Chat con imagen de referencia
        document.getElementById('btn-chat-header').onclick = () => {
             window.location.href = `chat.html?nombre=${p.proveedorNombre}&refImg=${encodeURIComponent(img)}&refMsg=Referencia: ${p.nombre}`;
        };

        modal.style.display = 'flex';
        modal.scrollTop = 0;
    };

    window.cerrarDetalle = () => document.getElementById('modal-detalle').style.display = 'none';
    window.changeQty = (v) => {
        let q = document.getElementById('qty-val');
        let val = parseInt(q.innerText) + v;
        if(val >= 1) q.innerText = val;
    };
    
    // cargarDB(); // Iniciar carga
</script>
</body>
</html>
