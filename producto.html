<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Producto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:100px; -webkit-font-smoothing:antialiased; }

  /* GALERÍA */
  .galeria-wrap{ position:relative; width:100%; height:300px; background:#111; overflow:hidden; }
  .galeria-scroll{ display:flex; height:100%; overflow-x:auto; scroll-snap-type:x mandatory; scrollbar-width:none; }
  .galeria-scroll::-webkit-scrollbar{ display:none; }
  .galeria-item{ min-width:100%; height:100%; scroll-snap-align:start; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:#111; position:relative; }
  .galeria-item img{ width:100%; height:100%; object-fit:cover; }
  .galeria-item video{ width:100%; height:100%; object-fit:cover; }
  .galeria-placeholder{ display:flex; align-items:center; justify-content:center; width:100%; height:100%; background:#1a1a1a; }
  .galeria-placeholder svg{ width:60px; height:60px; stroke:#333; fill:none; stroke-width:1.2; }
  .galeria-dots{ position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:5px; z-index:10; }
  .galeria-dot{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.4); transition:0.3s; }
  .galeria-dot.active{ background:white; width:16px; border-radius:3px; }
  .galeria-back{ position:absolute; top:48px; left:16px; width:36px; height:36px; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; z-index:10; }
  .galeria-back svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .galeria-fav{ position:absolute; top:48px; right:16px; width:36px; height:36px; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; z-index:10; }
  .galeria-fav svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2; }
  .galeria-fav.activo svg{ stroke:var(--rojo); fill:var(--rojo); }

  /* CONTENIDO */
  .content{ padding:20px 16px 0; }
  .prod-cat-tag{ background:var(--naranja); color:white; font-size:0.65rem; font-weight:700; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:8px; text-transform:uppercase; }
  .prod-nombre{ font-size:1.3rem; font-weight:800; color:var(--negro); line-height:1.3; margin-bottom:6px; }
  .prod-precio-wrap{ display:flex; align-items:baseline; gap:8px; margin-bottom:6px; }
  .prod-precio{ font-size:1.6rem; font-weight:800; color:var(--naranja); }
  .prod-unidad{ font-size:0.82rem; color:#aaa; }
  .prod-minimo{ font-size:0.78rem; color:#aaa; margin-bottom:14px; }
  .prod-minimo span{ color:var(--negro); font-weight:700; }

  /* PROVEEDOR */
  .proveedor-card{ background:white; border-radius:16px; padding:14px; margin-bottom:16px; display:flex; align-items:center; gap:12px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .prov-avatar{ width:48px; height:48px; border-radius:14px; background:var(--naranja); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:800; color:white; flex-shrink:0; overflow:hidden; }
  .prov-avatar img{ width:100%; height:100%; object-fit:cover; }
  .prov-info{ flex:1; }
  .prov-nombre{ font-size:0.92rem; font-weight:700; color:var(--negro); }
  .prov-ciudad{ font-size:0.72rem; color:#aaa; margin-top:2px; }
  .prov-verificado{ font-size:0.62rem; color:var(--verde); font-weight:700; margin-top:3px; }
  .prov-arrow{ width:16px; height:16px; stroke:#ddd; fill:none; stroke-width:2.5; }

  /* DESCRIPCIÓN */
  .section-title{ font-size:0.82rem; font-weight:700; color:var(--negro); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .prod-desc{ font-size:0.88rem; color:#666; line-height:1.6; margin-bottom:16px; }
  .prod-desc.collapsed{ display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .ver-mas-btn{ font-size:0.82rem; color:var(--naranja); font-weight:600; cursor:pointer; margin-top:-8px; margin-bottom:16px; display:inline-block; }

  /* DETALLES */
  .detalles-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .detalle-item{ background:white; border-radius:12px; padding:12px; box-shadow:0 2px 6px rgba(0,0,0,0.04); }
  .detalle-label{ font-size:0.62rem; color:#aaa; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
  .detalle-val{ font-size:0.88rem; font-weight:700; color:var(--negro); }

  /* RESEÑAS */
  .resenas-wrap{ margin-bottom:16px; }
  .resena-item{ background:white; border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.04); }
  .resena-header{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .resena-avatar{ width:34px; height:34px; border-radius:10px; background:var(--gris); display:flex; align-items:center; justify-content:center; font-size:0.82rem; font-weight:700; color:var(--negro); flex-shrink:0; }
  .resena-nombre{ font-size:0.82rem; font-weight:700; color:var(--negro); }
  .resena-fecha{ font-size:0.68rem; color:#aaa; }
  .resena-estrellas{ display:flex; gap:2px; margin-left:auto; }
  .estrella{ font-size:0.85rem; }
  .resena-texto{ font-size:0.82rem; color:#666; line-height:1.5; }
  .sin-resenas{ text-align:center; padding:24px; color:#bbb; font-size:0.82rem; background:white; border-radius:14px; }

  /* CANTIDAD */
  .cantidad-wrap{ background:white; border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .cantidad-label{ font-size:0.72rem; font-weight:700; color:#aaa; text-transform:uppercase; margin-bottom:10px; }
  .cantidad-controls{ display:flex; align-items:center; gap:16px; }
  .cant-btn{ width:40px; height:40px; border-radius:12px; background:var(--gris); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:700; transition:0.2s; }
  .cant-btn:active{ transform:scale(0.88); }
  .cant-num{ font-size:1.3rem; font-weight:800; color:var(--negro); flex:1; text-align:center; }
  .cant-total{ font-size:0.82rem; color:#aaa; margin-left:auto; }
  .cant-total span{ color:var(--naranja); font-weight:700; }

  /* BOTTOM BAR */
  .bottom-bar{ position:fixed; bottom:0; left:0; right:0; background:white; padding:14px 16px; border-top:1px solid #eee; display:flex; gap:10px; box-shadow:0 -4px 20px rgba(0,0,0,0.08); z-index:200; }
  .btn-chat{ width:48px; height:48px; border-radius:14px; background:var(--gris); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .btn-chat svg{ width:20px; height:20px; stroke:var(--negro); fill:none; stroke-width:2; }
  .btn-agregar{ flex:1; padding:14px; background:var(--negro); color:white; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; transition:0.2s; }
  .btn-agregar:active{ transform:scale(0.98); }

  .skeleton{ background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
  @keyframes shimmer{ from{background-position:200% 0;} to{background-position:-200% 0;} }
  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--negro); color:white; padding:10px 20px; border-radius:24px; font-size:0.82rem; font-weight:600; opacity:0; transition:0.3s; pointer-events:none; z-index:400; white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="galeria-wrap" id="galeria-wrap">
  <div class="galeria-scroll" id="galeria-scroll">
    <div class="galeria-item"><div class="galeria-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div></div>
  </div>
  <div class="galeria-dots" id="galeria-dots"></div>
  <button class="galeria-back" onclick="window.history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <button class="galeria-fav" id="btn-fav" onclick="toggleFav()"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
</div>

<div class="content">
  <div class="prod-cat-tag" id="prod-cat">Cargando...</div>
  <div class="prod-nombre" id="prod-nombre"><div class="skeleton" style="height:24px;width:80%;margin-bottom:6px;"></div></div>
  <div class="prod-precio-wrap">
    <div class="prod-precio" id="prod-precio">—</div>
    <div class="prod-unidad" id="prod-unidad"></div>
  </div>
  <div class="prod-minimo" id="prod-minimo">Pedido mínimo: <span id="prod-min-num">—</span> unidades</div>

  <!-- PROVEEDOR -->
  <div class="proveedor-card" id="prov-card" onclick="verProveedor()">
    <div class="prov-avatar" id="prov-avatar">P</div>
    <div class="prov-info">
      <div class="prov-nombre" id="prov-nombre">Cargando proveedor...</div>
      <div class="prov-ciudad" id="prov-ciudad">—</div>
      <div class="prov-verificado" id="prov-verificado"></div>
    </div>
    <svg class="prov-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <!-- DESCRIPCIÓN -->
  <div class="section-title">Descripción</div>
  <div class="prod-desc collapsed" id="prod-desc">Cargando...</div>
  <div class="ver-mas-btn" id="ver-mas-btn" onclick="expandirDesc()">Ver más →</div>

  <!-- DETALLES -->
  <div class="section-title">Detalles del producto</div>
  <div class="detalles-grid">
    <div class="detalle-item"><div class="detalle-label">Stock disponible</div><div class="detalle-val" id="det-stock">—</div></div>
    <div class="detalle-item"><div class="detalle-label">Tiempo de entrega</div><div class="detalle-val" id="det-entrega">—</div></div>
    <div class="detalle-item"><div class="detalle-label">Unidad de venta</div><div class="detalle-val" id="det-unidad">—</div></div>
    <div class="detalle-item"><div class="detalle-label">Pedido mínimo</div><div class="detalle-val" id="det-minimo">—</div></div>
  </div>

  <!-- CANTIDAD -->
  <div class="cantidad-wrap">
    <div class="cantidad-label">Cantidad a pedir</div>
    <div class="cantidad-controls">
      <button class="cant-btn" onclick="cambiarCant(-1)">−</button>
      <div class="cant-num" id="cant-num">1</div>
      <button class="cant-btn" onclick="cambiarCant(1)">+</button>
      <div class="cant-total">Total: <span id="cant-total">$0.00</span></div>
    </div>
  </div>

  <!-- RESEÑAS -->
  <div class="section-title">Reseñas</div>
  <div class="resenas-wrap" id="resenas-wrap">
    <div class="sin-resenas">Cargando reseñas...</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-chat" onclick="irAlChat()"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
  <button class="btn-agregar" onclick="agregarCarrito()">Agregar al carrito →</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');

const params = new URLSearchParams(window.location.search);
const prodId = params.get('id');
let producto = null, proveedor = null, cantidad = 1, userId = '';
let favs = JSON.parse(localStorage.getItem('proveed_favs') || '[]');

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;
  if (!prodId) { window.history.back(); return; }
  cargarProducto();
})();

async function cargarProducto() {
  const { data: p, error } = await sb.from('productos').select('*').eq('id', prodId).single();
  if (error || !p) { window.history.back(); return; }
  producto = p;
  cantidad = p.minimo || 1;

  // GALERÍA
  const medias = [];
  const imgs = p.imagenes || (p.imagen ? [p.imagen] : []);
  imgs.forEach(img => medias.push({ tipo: 'imagen', src: img }));
  if (p.video_url) medias.push({ tipo: 'video', src: p.video_url });

  const scroll = document.getElementById('galeria-scroll');
  const dots = document.getElementById('galeria-dots');
  if (medias.length) {
    scroll.innerHTML = '';
    dots.innerHTML = '';
    medias.forEach((m, i) => {
      const item = document.createElement('div');
      item.className = 'galeria-item';
      if (m.tipo === 'imagen') {
        item.innerHTML = `<img src="${m.src}" alt="" loading="lazy">`;
      } else {
        item.innerHTML = `<video src="${m.src}" controls playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;"></video>`;
      }
      scroll.appendChild(item);
      const dot = document.createElement('div');
      dot.className = 'galeria-dot' + (i === 0 ? ' active' : '');
      dots.appendChild(dot);
    });
    scroll.addEventListener('scroll', () => {
      const idx = Math.round(scroll.scrollLeft / scroll.offsetWidth);
      document.querySelectorAll('.galeria-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    });
  }

  // INFO
  document.getElementById('prod-cat').textContent = p.categoria || 'Producto';
  document.getElementById('prod-nombre').textContent = p.nombre || 'Producto';
  document.getElementById('prod-precio').textContent = '$' + Number(p.precio || 0).toFixed(2);
  document.getElementById('prod-unidad').textContent = 'por ' + (p.unidad || 'unidad');
  document.getElementById('prod-min-num').textContent = p.minimo || 1;
  document.getElementById('prod-desc').textContent = p.descripcion || 'Sin descripción disponible.';
  document.getElementById('det-stock').textContent = (p.stock || 0) + ' und.';
  document.getElementById('det-entrega').textContent = p.tiempo_entrega || '2-5 días';
  document.getElementById('det-unidad').textContent = p.unidad || 'Unidad';
  document.getElementById('det-minimo').textContent = (p.minimo || 1) + ' und.';
  document.getElementById('cant-num').textContent = cantidad;
  document.getElementById('cant-total').textContent = '$' + (cantidad * p.precio).toFixed(2);

  // FAV
  if (favs.includes(prodId)) document.getElementById('btn-fav').classList.add('activo');

  // ACTUALIZAR VISTAS
  sb.from('productos').update({ vistas: (p.vistas || 0) + 1 }).eq('id', prodId);

  // PROVEEDOR
  cargarProveedor(p.proveedor_id, p.nombre_proveedor);

  // RESEÑAS
  cargarResenas();
}

async function cargarProveedor(provId, nombreFallback) {
  document.getElementById('prov-nombre').textContent = nombreFallback || 'Proveedor';
  document.getElementById('prov-avatar').textContent = (nombreFallback || 'P')[0].toUpperCase();

  if (!provId) return;
  const { data: u } = await sb.from('usuarios').select('nombre,empresa,ciudad,foto_perfil,logo_empresa,verificado').eq('id', provId).single();
  if (!u) return;
  proveedor = u;
  const nombre = u.empresa || u.nombre || nombreFallback || 'Proveedor';
  document.getElementById('prov-nombre').textContent = nombre;
  document.getElementById('prov-ciudad').textContent = u.ciudad || '—';
  document.getElementById('prov-verificado').textContent = u.verificado ? '✓ Verificado' : '';
  const logo = u.logo_empresa || u.foto_perfil || '';
  const avatar = document.getElementById('prov-avatar');
  if (logo) {
    avatar.innerHTML = `<img src="${logo}" alt="">`;
  } else {
    avatar.textContent = nombre[0].toUpperCase();
  }
}

async function cargarResenas() {
  const { data } = await sb.from('reseñas').select('*').eq('producto_id', prodId).order('created_at', { ascending: false });
  const wrap = document.getElementById('resenas-wrap');
  if (!data?.length) { wrap.innerHTML = '<div class="sin-resenas">Sin reseñas aún. ¡Sé el primero!</div>'; return; }
  wrap.innerHTML = '';
  data.forEach(r => {
    const div = document.createElement('div'); div.className = 'resena-item';
    const fecha = new Date(r.created_at).toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: 'numeric' });
    const estrellas = '⭐'.repeat(r.rating || 5);
    div.innerHTML = `
      <div class="resena-header">
        <div class="resena-avatar">${(r.user_name || 'U')[0].toUpperCase()}</div>
        <div><div class="resena-nombre">${r.user_name || 'Usuario'}</div><div class="resena-fecha">${fecha}</div></div>
        <div class="resena-estrellas">${estrellas}</div>
      </div>
      <div class="resena-texto">${r.texto || ''}</div>`;
    wrap.appendChild(div);
  });
}

window.cambiarCant = function(delta) {
  if (!producto) return;
  const min = producto.minimo || 1;
  cantidad = Math.max(min, cantidad + (delta * min));
  document.getElementById('cant-num').textContent = cantidad;
  document.getElementById('cant-total').textContent = '$' + (cantidad * producto.precio).toFixed(2);
};

window.expandirDesc = function() {
  document.getElementById('prod-desc').classList.remove('collapsed');
  document.getElementById('ver-mas-btn').style.display = 'none';
};

window.toggleFav = function() {
  const btn = document.getElementById('btn-fav');
  const idx = favs.indexOf(prodId);
  if (idx >= 0) { favs.splice(idx, 1); btn.classList.remove('activo'); }
  else { favs.push(prodId); btn.classList.add('activo'); }
  localStorage.setItem('proveed_favs', JSON.stringify(favs));
};

window.verProveedor = function() {
  if (producto?.proveedor_id) window.location.href = `proveedor.html?id=${producto.proveedor_id}`;
};

window.agregarCarrito = function() {
  if (!producto) return;
  let carrito = JSON.parse(localStorage.getItem('carrito_proveed') || '[]');
  const idx = carrito.findIndex(i => i.id === prodId);
  if (idx >= 0) carrito[idx].cantidad += cantidad;
  else carrito.push({ id: prodId, nombre: producto.nombre, precio: producto.precio, cantidad, minimo: producto.minimo || 1, imagen: producto.imagenes?.[0] || producto.imagen || '', proveedor: producto.nombre_proveedor || '' });
  localStorage.setItem('carrito_proveed', JSON.stringify(carrito));
  const t = document.getElementById('toast');
  t.textContent = `✓ ${producto.nombre} añadido al carrito`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
};

window.irAlChat = async function() {
  if (!producto?.proveedor_id) return;
  const { data: chats } = await sb.from('chats').select('id').eq('emprendedor_id', userId).eq('proveedor_id', producto.proveedor_id);
  if (!chats?.length) {
    await sb.from('chats').insert({ emprendedor_id: userId, proveedor_id: producto.proveedor_id, proveedor_nombre: producto.nombre_proveedor || 'Proveedor', ultimo_mensaje: '', no_leidos: 0 });
  }
  window.location.href = 'chat.html';
};
</script>
</body>
</html>
