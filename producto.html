<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Producto</title>

<meta property="og:type" content="website">
<meta property="og:title" id="og-title" content="Producto en PROVEED">
<meta property="og:description" id="og-desc" content="Encuentra los mejores precios al por mayor en Ecuador.">
<meta property="og:image" id="og-image" content="">
<meta property="og:url" id="og-url" content="">
<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --blanco:#FFFFFF; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:120px; -webkit-font-smoothing:antialiased; }

  /* HEADER */
  .header{ position:fixed; top:0; width:100%; z-index:200; padding:44px 16px 12px; display:flex; align-items:center; justify-content:space-between; transition: 0.3s; }
  .header.solid{ background:var(--negro); }
  .header-btns{ display:flex; gap:8px; }
  .icon-btn{ width:40px; height:40px; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); border-radius:12px; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; }
  .icon-btn svg{ width:20px; height:20px; stroke:white; fill:none; stroke-width:2.5; }

  /* GALERÍA */
  .gallery-container{ width:100%; height:380px; background:#e8e8e8; position:relative; overflow-x: scroll; display: flex; scroll-snap-type: x mandatory; scrollbar-width: none; }
  .gallery-container::-webkit-scrollbar { display: none; }
  .slide{ min-width:100%; height:100%; scroll-snap-align: start; display:flex; align-items:center; justify-content:center; cursor: zoom-in; }
  .slide img{ width:100%; height:100%; object-fit:cover; }
  .dots{ position:absolute; bottom:15px; left:50%; transform:translateX(-50%); display:flex; gap:6px; pointer-events: none; }
  .dot{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.4); transition: 0.3s; }
  .dot.active{ width:18px; background:var(--verde); border-radius:10px; }

  /* INFO PRINCIPAL */
  .main-info{ background:white; padding:20px; border-radius: 0 0 24px 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
  .prod-cat{ font-size:0.7rem; font-weight:800; color:var(--naranja); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
  .prod-name{ font-family:'Syne', sans-serif; font-size:1.4rem; font-weight:800; color:var(--negro); line-height:1.2; margin-bottom:12px; }
  .price-tag{ display:flex; align-items:baseline; gap:6px; }
  .price-val{ font-size:1.8rem; font-weight:900; color:var(--negro); letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .price-unit{ font-size:0.85rem; color:#999; font-weight:500; }

  .badges-row{ display:flex; gap:8px; margin-top:16px; overflow-x: auto; scrollbar-width: none; }
  .badge{ background:var(--gris); padding:8px 12px; border-radius:12px; display:flex; align-items:center; gap:6px; font-size:0.75rem; font-weight:700; color:#555; white-space:nowrap; }

  /* ACCIONES & COTIZACIÓN */
  .action-card{ background:white; margin-top:10px; padding:20px; border-radius:24px; }
  .qty-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
  .qty-ctrl{ display:flex; align-items:center; background:var(--gris); border-radius:14px; padding:4px; }
  .qty-btn{ width:36px; height:36px; border:none; background:transparent; font-size:1.2rem; font-weight:700; cursor:pointer; }
  .qty-num{ min-width:40px; text-align:center; font-weight:800; font-size:1rem; }

  .cot-box{ background:rgba(168, 230, 61, 0.08); border:1.5px dashed var(--verde); border-radius:18px; padding:16px; margin-top:10px; }
  .cot-input{ width:100%; border:none; background:white; border-radius:12px; padding:12px; font-family:'Inter'; font-size:0.85rem; outline:none; margin-bottom:10px; resize:none; min-height:80px; }

  /* RECOMENDACIONES */
  .recommendations{ padding:20px; background:white; margin-top:10px; border-radius:24px; }
  .rec-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-top:15px; }
  .rec-item{ background:var(--gris); border-radius:18px; overflow:hidden; text-decoration:none; color:inherit; transition: 0.2s; }
  .rec-img{ width:100%; aspect-ratio:1/1; object-fit:cover; }
  .rec-info{ padding:10px; }
  .rec-price{ font-weight:800; color:var(--naranja); font-size:0.9rem; font-variant-numeric: tabular-nums; }

  /* LIGHTBOX */
  .lightbox{ position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
  .lightbox.show{ display:flex; }
  .lightbox img{ max-width:95%; max-height:85%; border-radius:12px; object-fit: contain; }

  /* FOOTER */
  .footer-fixed{ position:fixed; bottom:0; width:100%; background:white; padding:16px 20px 30px; border-top:1px solid #eee; display:flex; gap:12px; z-index:300; }
  .btn-primary{ flex:2; padding:16px; border:none; border-radius:16px; background:var(--negro); color:white; font-weight:800; font-size:0.9rem; cursor:pointer; }
  .btn-secondary{ flex:1; padding:16px; border:2px solid var(--negro); border-radius:16px; background:transparent; font-weight:800; font-size:0.9rem; cursor:pointer; }

  .toast{ position:fixed; top:50px; left:50%; transform:translateX(-50%); background:var(--negro); color:white; padding:12px 24px; border-radius:50px; font-size:0.85rem; font-weight:600; opacity:0; transition:0.4s; z-index:1100; pointer-events:none; }
  .toast.show{ opacity:1; top:100px; }
</style>
</head>
<body>

<div class="header" id="navbar">
  <button class="icon-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <div class="header-btns">
    <button class="icon-btn" onclick="compartirProducto()"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
    <button class="icon-btn" onclick="showToast('Guardado en favoritos')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
  </div>
</div>

<div class="gallery-container" id="gallery">
  <div class="gallery-slides" id="slides-wrapper" style="display: contents;">
    </div>
  <div class="dots" id="dots-wrapper"></div>
</div>

<div class="main-info">
  <div class="prod-cat" id="cat-label">...</div>
  <h1 class="prod-name" id="prod-title">Cargando...</h1>
  <div class="price-tag">
    <span class="price-val" id="prod-price">$0.00</span>
    <span class="price-unit" id="prod-unit">/ unidad</span>
  </div>
  
  <div class="badges-row">
    <div class="badge">Mínimo: <strong id="min-qty">1</strong></div>
    <div class="badge">Entrega: <strong id="delivery-time">...</strong></div>
  </div>
</div>

<div class="action-card">
  <div class="qty-row">
    <span style="font-weight:700; font-size:0.85rem;">Cantidad deseada</span>
    <div class="qty-ctrl">
      <button class="qty-btn" onclick="updateQty(-1)">−</button>
      <div class="qty-num" id="qty-val">1</div>
      <button class="qty-btn" onclick="updateQty(1)">+</button>
    </div>
  </div>

  <div class="cot-box">
    <div style="font-weight:800; font-size:0.85rem; margin-bottom:8px;">Solicitar cotización personalizada</div>
    <textarea class="cot-input" id="cot-msg" placeholder="Ej: Necesito un mejor precio por volumen..."></textarea>
    <button class="btn-primary" style="width:100%; font-size:0.8rem; padding:12px; background:var(--negro);" onclick="enviarCotizacion()">ENVIAR SOLICITUD</button>
  </div>
</div>

<div class="main-info" style="margin-top:10px; border-radius:24px;">
    <div style="font-weight:800; font-size:0.9rem; margin-bottom:10px;">Descripción detallada</div>
    <p id="prod-desc" style="font-size:0.85rem; color:#666; line-height:1.6;">...</p>
</div>

<div class="recommendations">
  <div style="font-weight:800; font-size:0.9rem;">Más para tu negocio</div>
  <div class="rec-grid" id="rec-wrapper"></div>
</div>

<div class="footer-fixed">
  <button class="btn-secondary" onclick="irAlChat()">CHAT</button>
  <button class="btn-primary" onclick="agregarAlCarrito()">AÑADIR AL CARRITO</button>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img src="" id="lightbox-img">
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

const params = new URLSearchParams(window.location.search);
const prodId = params.get('id');
let currentProduct = null;
let currentQty = 1;

async function init() {
  if(!prodId) return;

  const { data: prod, error } = await supabase
    .from('productos')
    .select('*, usuarios(nombre, empresa)')
    .eq('id', prodId)
    .single();

  if(error) { console.error(error); return; }
  currentProduct = prod;
  currentQty = prod.minimo || 1;

  // Renderizar Textos
  document.getElementById('prod-title').innerText = prod.nombre;
  document.getElementById('prod-price').innerText = `$${prod.precio.toFixed(2)}`;
  document.getElementById('cat-label').innerText = prod.categoria || 'GENERAL';
  document.getElementById('min-qty').innerText = prod.minimo || 1;
  document.getElementById('delivery-time').innerText = prod.tiempo_entrega || '3-5 días';
  document.getElementById('prod-desc').innerText = prod.descripcion || 'Sin descripción.';
  document.getElementById('qty-val').innerText = currentQty;

  // Configurar Meta Tags dinámicamente para compartir
  document.getElementById('og-title').content = prod.nombre;
  document.getElementById('og-desc').content = `Precio: $${prod.precio.toFixed(2)} - Compra mínima: ${prod.minimo} unidades.`;
  document.getElementById('og-image').content = prod.imagen_url;
  document.getElementById('og-url').content = window.location.href;

  // Render Galería
  const images = prod.imagenes || [prod.imagen_url];
  const wrapper = document.getElementById('slides-wrapper');
  const dots = document.getElementById('dots-wrapper');
  
  images.forEach((img, idx) => {
    wrapper.innerHTML += `<div class="slide" onclick="abrirLightbox('${img}')"><img src="${img}"></div>`;
    dots.innerHTML += `<div class="dot ${idx === 0 ? 'active' : ''}"></div>`;
  });

  initGalleryScroll();
  cargarRecomendaciones(prod.categoria, prod.id);
}

function initGalleryScroll() {
  const container = document.getElementById('gallery');
  const dots = document.querySelectorAll('.dot');
  container.onscroll = () => {
    const idx = Math.round(container.scrollLeft / window.innerWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  };
}

window.abrirLightbox = (src) => {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('show');
};

async function cargarRecomendaciones(cat, id) {
  const { data: recs } = await supabase.from('productos').select('*').eq('categoria', cat).neq('id', id).limit(4);
  const wrapper = document.getElementById('rec-wrapper');
  if(!recs || recs.length === 0) {
    const { data: rand } = await supabase.from('productos').select('*').limit(4);
    renderRecs(rand);
  } else {
    renderRecs(recs);
  }
}

function renderRecs(items) {
  const wrapper = document.getElementById('rec-wrapper');
  items.forEach(r => {
    wrapper.innerHTML += `
      <a href="producto.html?id=${r.id}" class="rec-item">
        <img src="${r.imagen_url}" class="rec-img">
        <div class="rec-info">
          <div style="font-size:0.75rem; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${r.nombre}</div>
          <div class="rec-price">$${r.precio.toFixed(2)}</div>
        </div>
      </a>`;
  });
}

window.updateQty = (v) => {
  const min = currentProduct.minimo || 1;
  currentQty = Math.max(min, currentQty + (v * min));
  document.getElementById('qty-val').innerText = currentQty;
};

window.compartirProducto = async () => {
  if (navigator.share) {
    try {
      await navigator.share({
        title: currentProduct.nombre,
        text: `Mira este producto en PROVEED: ${currentProduct.nombre}`,
        url: window.location.href,
      });
    } catch (err) { console.warn(err); }
  } else {
    navigator.clipboard.writeText(window.location.href);
    showToast('Enlace copiado al portapapeles');
  }
};

window.agregarAlCarrito = () => {
    let cart = JSON.parse(localStorage.getItem('proveed_cart') || '[]');
    cart.push({...currentProduct, cantidad_final: currentQty});
    localStorage.setItem('proveed_cart', JSON.stringify(cart));
    showToast('Añadido al carrito con éxito');
}

window.enviarCotizacion = () => {
    const msg = document.getElementById('cot-msg').value;
    if(!msg) { showToast('Escribe un mensaje'); return; }
    showToast('Enviando solicitud...');
    // Aquí iría el insert a la tabla mensajes de Supabase
}

window.irAlChat = () => {
    window.location.href = `chat.html?receptor=${currentProduct.proveedor_id}`;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.onscroll = () => {
  document.getElementById('navbar').classList.toggle('solid', window.scrollY > 150);
};

init();
</script>
</body>
</html>
