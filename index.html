<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Seguro — PROVEED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; padding: 20px; font-family: 'DM Sans', sans-serif; }
        .reg-container { max-width: 450px; margin: 0 auto; padding-bottom: 50px; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        
        .card-auth { background: #111; padding: 25px; border-radius: 24px; border: 1px solid #222; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }
        
        input, select { 
            width: 100%; background: #000; border: 1px solid #333; padding: 14px; 
            border-radius: 12px; color: white; font-size: 0.95rem; outline: none;
        }
        input:focus { border-color: #32D74B; }

        /* TARJETA DE PRIVACIDAD */
        .privacy-info { 
            background: rgba(50, 215, 75, 0.05); border: 1px dashed #32D74B; 
            padding: 15px; border-radius: 15px; margin-bottom: 25px; 
        }
        .privacy-info p { font-size: 0.75rem; color: #32D74B; margin: 0; line-height: 1.4; }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .photo-btn { 
            background: #222; border: 1px solid #333; padding: 15px; border-radius: 12px; 
            text-align: center; cursor: pointer; font-size: 0.7rem; color: #ccc;
        }
        .photo-btn:active { background: #333; }

        .btn-register { 
            background: #32D74B; color: #000; border: none; width: 100%; 
            padding: 18px; border-radius: 15px; font-weight: 800; font-family: 'Syne'; 
            font-size: 1rem; margin-top: 20px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="reg-container">
        <div class="logo-section">
            <h1 style="font-family: 'Syne'; font-size: 2rem; margin: 0;">PROVEED</h1>
            <p style="color: #666; font-size: 0.8rem;">Registro Único de Emprendedores</p>
        </div>

        <div class="privacy-info">
            <p><b>SEGURIDAD PROVEED:</b> Tus fotos de cédula y rostro son estrictamente privadas para validación interna. Los proveedores solo verán tu nombre, cédula y dirección para logística de envío.</p>
        </div>

        <div class="card-auth">
            <div class="input-group">
                <label>Nombres Completos</label>
                <input type="text" id="nombres" placeholder="Ej: Luis Alejandro">
            </div>
            <div class="input-group">
                <label>Apellidos Completos</label>
                <input type="text" id="apellidos" placeholder="Ej: Angulo Delgado">
            </div>
            <div class="input-group">
                <label>Número de Cédula (Ecuador)</label>
                <input type="number" id="cedula" placeholder="080xxxxxxx">
            </div>
            <div class="input-group">
                <label>WhatsApp / Teléfono</label>
                <input type="tel" id="telefono" placeholder="09xxxxxxxx">
            </div>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com">
            </div>
        </div>

        <div class="card-auth">
            <label>Dirección de Envío (Línea 1)</label>
            <input type="text" id="dir1" placeholder="Calle principal y secundaria" style="margin-bottom: 15px;">
            
            <label>Dirección de Envío (Línea 2)</label>
            <input type="text" id="dir2" placeholder="Barrio / Edificio / Referencia">
            
            <label style="margin-top: 15px;">Ciudad</label>
            <select id="ciudad">
                <option value="Esmeraldas">Esmeraldas</option>
                <option value="Guayaquil">Guayaquil</option>
                <option value="Quito">Quito</option>
                <option value="Manta">Manta</option>
            </select>
        </div>

        <div class="card-auth">
            <label>Documentación Visual</label>
            <div class="photo-grid">
                <div class="photo-btn" onclick="alert('Cargar Cédula Frontal')">Cédula (Frente)</div>
                <div class="photo-btn" onclick="alert('Cargar Cédula Posterior')">Cédula (Detrás)</div>
            </div>
            <div class="photo-btn" style="margin-top: 10px;" onclick="alert('Cargar Selfie')">Foto del Rostro (Selfie)</div>
        </div>

        <button class="btn-register" id="btn-crear">Crear Cuenta Segura</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btn-crear').onclick = async () => {
            const btn = document.getElementById('btn-crear');
            btn.innerText = "VALIDANDO DATOS...";
            btn.disabled = true;

            const datos = {
                nombres: document.getElementById('nombres').value,
                apellidos: document.getElementById('apellidos').value,
                cedula: document.getElementById('cedula').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('email').value,
                direccion: document.getElementById('dir1').value + " - " + document.getElementById('dir2').value,
                ciudad: document.getElementById('ciudad').value,
                verificado: false, // Tú los verificarás después
                fechaRegistro: serverTimestamp()
            };

            try {
                // Guardamos al usuario en tu base de datos central
                await addDoc(collection(db, "usuarios"), datos);
                
                // Guardamos sesión local para que la app lo reconozca
                localStorage.setItem('userEmail', datos.email);
                localStorage.setItem('userCiudad', datos.ciudad);
                localStorage.setItem('userName', datos.nombres + " " + datos.apellidos);

                alert("Cuenta creada con éxito. Bienvenido a PROVEED.");
                location.href = "dashboard.html";
            } catch (e) {
                alert("Error al registrar: " + e.message);
                btn.disabled = false;
                btn.innerText = "Crear Cuenta Segura";
            }
        };
    </script>
</body>
</html>
