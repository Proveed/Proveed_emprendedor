<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Emprendedor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; }
  html{ height:100%; }
  body{
    background:var(--negro);
    font-family:'DM Sans',sans-serif;
    height:100vh;
    width:100vw;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(168,230,61,0.12) 0%, transparent 65%);
    pointer-events:none;
  }
  .wrap{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }
  .logo-hex{
    width:70px;
    height:70px;
    animation:pulse 3s ease-in-out infinite 1.4s;
  }
  .logo-hex svg{ width:100%; height:100%; display:block; }
  .brand{
    font-family:'Syne',sans-serif;
    font-size:1.8rem;
    font-weight:800;
    color:white;
    letter-spacing:-0.5px;
    line-height:1;
    white-space:nowrap;
  }
  .brand span{ color:var(--verde); }
  .tagline{
    font-size:0.6rem;
    color:#555;
    letter-spacing:2.5px;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .loader-track{
    width:110px;
    height:2px;
    background:rgba(255,255,255,0.08);
    border-radius:2px;
    overflow:hidden;
    margin-top:28px;
  }
  .loader-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--verde),var(--naranja));
    border-radius:2px;
    animation:loadFill 2.4s cubic-bezier(0.4,0,0.2,1) forwards 0.6s;
  }
  .status{
    font-size:0.62rem;
    color:#444;
    letter-spacing:1px;
    margin-top:8px;
    white-space:nowrap;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translate(-50%,calc(-50% + 24px));}
    to{opacity:1;transform:translate(-50%,-50%);}
  }
  @keyframes pulse{
    0%,100%{filter:drop-shadow(0 0 0px rgba(168,230,61,0));}
    50%{filter:drop-shadow(0 0 16px rgba(168,230,61,0.4));}
  }
  @keyframes loadFill{
    0%{width:0%;}
    60%{width:70%;}
    85%{width:88%;}
    100%{width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-hex">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#A8E63D"/>
          <stop offset="100%" style="stop-color:#7BC820"/>
        </linearGradient>
      </defs>
      <path d="M50 4 L93 28 V72 L50 96 L7 72 V28 Z" fill="url(#g1)"/>
      <path d="M30 52 L44 66 L70 36" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
  <div class="brand">PRO<span>VEED</span></div>
  <div class="tagline">Mercado Mayorista Ecuador</div>
  <div class="loader-track"><div class="loader-bar"></div></div>
  <div class="status">Conectando con proveedores...</div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  const app=initializeApp({
    apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
    authDomain:"proveed-8cb7c.firebaseapp.com",
    projectId:"proveed-8cb7c",
    storageBucket:"proveed-8cb7c.firebasestorage.app",
    messagingSenderId:"235073250367",
    appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
  });
  const auth=getAuth(app);
  setTimeout(()=>{
    onAuthStateChanged(auth,user=>{
      window.location.href=user?'dashboard.html':'login.html';
    });
  },2600);
</script>
</body>
</html>
