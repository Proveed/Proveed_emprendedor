<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Emprendedor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --verde:#32CD32; --negro:#0E0E0E; --blanco:#F8F8F5; }
  body{ background:var(--negro); color:var(--blanco); font-family:'DM Sans',sans-serif; height:100vh; width:100vw; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  body::before{ content:''; position:fixed; inset:0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(50,205,50,0.12) 0%, transparent 70%); pointer-events:none; }
  .logo-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; animation:emergeUp 1s cubic-bezier(0.16,1,0.3,1) both; }
  .logo-hex{ width:90px; height:90px; animation:pulse 3s ease-in-out infinite 1.2s; }
  .logo-hex svg{ width:100%; height:100%; }
  .brand{ font-family:'Syne',sans-serif; font-size:2.8rem; font-weight:900; letter-spacing:-2px; color:var(--blanco); }
  .brand span{ color:var(--verde); }
  .tagline{ font-size:0.8rem; font-weight:300; color:#888; letter-spacing:3px; text-transform:uppercase; margin-top:-8px; animation:fadeIn 1s ease both 0.6s; }
  .loader-track{ width:140px; height:2px; background:rgba(255,255,255,0.08); border-radius:2px; margin-top:40px; overflow:hidden; animation:fadeIn 0.5s ease both 0.8s; }
  .loader-bar{ height:100%; width:0%; background:var(--verde); border-radius:2px; animation:loadFill 2.2s cubic-bezier(0.4,0,0.2,1) forwards 1s; }
  .status-text{ font-size:0.7rem; color:#555; margin-top:12px; letter-spacing:1px; animation:fadeIn 0.5s ease both 1s; }
  @keyframes emergeUp{ from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes pulse{ 0%,100%{filter:drop-shadow(0 0 0px rgba(50,205,50,0));} 50%{filter:drop-shadow(0 0 20px rgba(50,205,50,0.4));} }
  @keyframes loadFill{ 0%{width:0%;} 60%{width:70%;} 80%{width:85%;} 100%{width:100%;} }
</style>
</head>
<body>
<div class="logo-wrap">
  <div class="logo-hex">
    <svg viewBox="0 0 100 100"><path d="M50 4 L93 28 V72 L50 96 L7 72 V28 Z" fill="#32CD32"/><path d="M30 52 L44 66 L70 36" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  </div>
  <div>
    <div class="brand">PRO<span>VEED</span></div>
    <div class="tagline">Portal Emprendedor</div>
  </div>
</div>
<div class="loader-track"><div class="loader-bar"></div></div>
<div class="status-text">Preparando tu espacio...</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  const app = initializeApp({
    apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
    authDomain:"proveed-8cb7c.firebaseapp.com",
    projectId:"proveed-8cb7c",
    storageBucket:"proveed-8cb7c.firebasestorage.app",
    messagingSenderId:"235073250367",
    appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
  });
  const auth = getAuth(app);
  setTimeout(() => {
    onAuthStateChanged(auth, (user) => {
      window.location.href = user ? "dashboard.html" : "login.html";
    });
  }, 2800);
</script>
</body>
</html>
