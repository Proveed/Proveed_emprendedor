<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Bienvenido</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para la bienvenida */
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            background: radial-gradient(circle at top right, #1a1a1a, #0d0d0d);
        }

        .logo-big {
            font-family: var(--fuente-titulo);
            font-size: 4rem;
            color: var(--lima);
            letter-spacing: -3px;
            line-height: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-dot {
            color: var(--naranja);
        }

        .tagline {
            font-size: 1rem;
            color: #777;
            margin-bottom: 60px;
            font-weight: 500;
        }

        .loader-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--lima);
            box-shadow: 0 0 15px var(--lima);
            transition: width 2s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <h1 class="logo-big">PROVEED<span class="brand-dot">.</span></h1>
        <p class="tagline">Importaciones inteligentes para Ecuador</p>

        <div class="loader-bar">
            <div class="loader-progress" id="progress"></div>
        </div>

        <button class="btn-primary" onclick="startApp()" style="opacity: 0; transform: translateY(20px); transition: 0.5s;" id="btn-entrar">
            Empezar Negocio
        </button>
    </div>

    <script>
        // Animación de carga automática
        window.onload = () => {
            const bar = document.getElementById('progress');
            const btn = document.getElementById('btn-entrar');
            
            setTimeout(() => {
                bar.style.width = '100%';
            }, 500);

            setTimeout(() => {
                btn.style.opacity = '1';
                btn.style.transform = 'translateY(0)';
            }, 2500);
        };

        function startApp() {
            // Nos lleva al siguiente archivo: dashboard.html
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
