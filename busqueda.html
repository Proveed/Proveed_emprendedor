<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Búsqueda</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; position:sticky; top:0; z-index:100; }
  .search-row{ display:flex; align-items:center; gap:10px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; flex-shrink:0; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .search-input-wrap{ flex:1; background:rgba(255,255,255,0.08); border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:8px; }
  .search-input-wrap input{ flex:1; background:transparent; border:none; outline:none; color:white; font-family:'Inter',sans-serif; font-size:0.9rem; }
  .search-input-wrap input::placeholder{ color:#555; }
  .search-input-wrap svg{ width:16px; height:16px; stroke:#555; fill:none; stroke-width:2.5; flex-shrink:0; }
  .recientes-section{ padding:14px 16px; }
  .section-label{ font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; display:flex; justify-content:space-between; }
  .section-label span{ color:var(--naranja); cursor:pointer; font-weight:600; text-transform:none; letter-spacing:0; font-size:0.78rem; }
  .reciente-item{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f0f0f0; cursor:pointer; }
  .reciente-item:last-child{ border-bottom:none; }
  .reciente-item svg{ width:16px; height:16px; stroke:#ccc; fill:none; stroke-width:2; flex-shrink:0; }
  .reciente-texto{ flex:1; font-size:0.88rem; color:#666; }
  .reciente-flecha{ width:14px; height:14px; stroke:#ddd; fill:none; stroke-width:2.5; }
  .results-section{ padding:0 16px; }
  .products-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .prod-card{ background:white; border-radius:14px; overflow:hidden; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
  .prod-card:active{ transform:scale(0.97); }
  .prod-img{ width:100%; height:140px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .no-img{ width:36px; height:36px; stroke:#ddd; fill:none; }
  .prod-cat-tag{ position:absolute; top:8px; left:8px; background:var(--naranja); color:white; font-size:0.56rem; font-weight:700; padding:2px 7px; border-radius:6px; text-transform:uppercase; }
  .prod-body{ padding:10px 12px 12px; }
  .prod-nombre{ font-size:0.82rem; font-weight:600; color:var(--negro); line-height:1.3; margin-bottom:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .prod-prov{ font-size:0.68rem; color:#bbb; margin-bottom:4px; }
  .prod-precio{ font-size:0.92rem; font-weight:700; color:var(--naranja); }
  .empty-search{ text-align:center; padding:48px 20px; color:#bbb; }
  .empty-search svg{ width:52px; height:52px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty-search p{ font-size:0.85rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
  .tab-dot{ width:4px; height:4px; background:var(--verde); border-radius:50%; display:none; }
  .tab.active .tab-dot{ display:block; }
</style>
</head>
<body>
<div class="header">
  <div class="search-row">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Buscar productos, proveedores..." autofocus oninput="buscar(this.value)">
    </div>
  </div>
</div>

<div id="recientes-section" class="recientes-section">
  <div class="section-label">Búsquedas recientes <span onclick="limpiarRecientes()">Limpiar</span></div>
  <div id="recientes-lista"></div>
</div>

<div class="results-section" id="results-section" style="display:none;">
  <div class="products-grid" id="results-grid"></div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span><div class="tab-dot"></div></a>
  <a class="tab active" href="explorar.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span><div class="tab-dot"></div></a>
  <a class="tab" href="tips.html"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><span>Tips</span><div class="tab-dot"></div></a>
  <a class="tab" href="carrito.html"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span><div class="tab-dot"></div></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><span>Pedidos</span><div class="tab-dot"></div></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let recientes=JSON.parse(localStorage.getItem('proveed_recientes')||'[]');
let searchTimeout=null;

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  renderRecientes();
})();

function renderRecientes(){
  const lista=document.getElementById('recientes-lista');
  if(!recientes.length){ lista.innerHTML='<div style="color:#ccc;font-size:0.82rem;padding:8px 0;">Sin búsquedas recientes</div>'; return; }
  lista.innerHTML=recientes.slice(0,6).map(r=>`<div class="reciente-item" onclick="usarReciente('${r}')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div class="reciente-texto">${r}</div><svg class="reciente-flecha" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>`).join('');
}

window.usarReciente=function(texto){ document.getElementById('search-input').value=texto; buscar(texto); };
window.limpiarRecientes=function(){ recientes=[]; localStorage.setItem('proveed_recientes',JSON.stringify(recientes)); renderRecientes(); };

window.buscar=function(v){
  clearTimeout(searchTimeout);
  const q=v.trim();
  if(!q){ document.getElementById('recientes-section').style.display='block'; document.getElementById('results-section').style.display='none'; return; }
  document.getElementById('recientes-section').style.display='none';
  document.getElementById('results-section').style.display='block';
  document.getElementById('results-grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#bbb;font-size:0.85rem;">Buscando...</div>';
  searchTimeout=setTimeout(async()=>{
    const { data } = await sb.from('productos').select('*').eq('activo',true).or(`nombre.ilike.%${q}%,nombre_proveedor.ilike.%${q}%,descripcion.ilike.%${q}%,categoria.ilike.%${q}%`).limit(20);
    if(!recientes.includes(q)){ recientes.unshift(q); if(recientes.length>10) recientes.pop(); localStorage.setItem('proveed_recientes',JSON.stringify(recientes)); }
    const grid=document.getElementById('results-grid');
    if(!data?.length){ grid.innerHTML='<div class="empty-search" style="grid-column:1/-1"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><p>Sin resultados para "'+q+'"</p></div>'; return; }
    grid.innerHTML='';
    data.forEach(p=>{
      const img=p.imagenes?.[0]||p.imagen||'';
      const div=document.createElement('div'); div.className='prod-card';
      div.onclick=()=>window.location.href=`producto.html?id=${p.id}`;
      div.innerHTML=`<div class="prod-img">${img?`<img src="${img}" alt="" loading="lazy">`:`<svg class="no-img" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`}${p.categoria?`<div class="prod-cat-tag">${p.categoria}</div>`:''}</div><div class="prod-body"><div class="prod-nombre">${p.nombre||'Producto'}</div><div class="prod-prov">${p.nombre_proveedor||'Proveedor'}</div><div class="prod-precio">$${Number(p.precio||0).toFixed(2)}</div></div>`;
      grid.appendChild(div);
    });
  },400);
};
</script>
</body>
</html>
