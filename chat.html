<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PROVEED — Mensajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris: #F2F3F0; --rojo: #FF4D4D; }
        body { background: var(--gris); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .chat-header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
        .back-btn { width: 36px; height: 36px; border-radius: 12px; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; }
        .chat-title { font-family: 'Syne'; font-size: 1.1rem; font-weight: 800; }

        #lista-view { display: flex; flex-direction: column; height: 100%; }
        #lista-chats { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-item { display: flex; align-items: center; gap: 14px; background: white; border-radius: 18px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        .chat-avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--negro); color: var(--lima); display: flex; align-items: center; justify-content: center; font-family: 'Syne'; font-weight: 800; }

        #vista-chat { display: none; position: fixed; inset: 0; background: var(--gris); flex-direction: column; z-index: 200; }
        .conv-header { background: var(--negro); color: white; padding: 45px 20px 15px; display: flex; align-items: center; gap: 15px; }
        #mensajes { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .burbuja { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.88rem; line-height: 1.4; }
        .burbuja.enviado { background: var(--lima); color: black; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .burbuja.recibido { background: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #eee; }

        .input-area { background: white; padding: 15px 20px 35px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; background: var(--gris); border: none; padding: 14px; border-radius: 15px; outline: none; }
        .send-btn { width: 48px; height: 48px; border-radius: 15px; background: var(--negro); border: none; color: white; display: flex; align-items: center; justify-content: center; }
        .bloqueo-aviso { background: rgba(255,77,77,0.1); color: var(--rojo); padding: 8px; font-size: 0.7rem; font-weight: 700; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="lista-view">
    <div class="chat-header">
        <div class="back-btn" onclick="location.href='dashboard.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="chat-title">Mensajes</div>
    </div>
    <div id="lista-chats"></div>
</div>

<div id="vista-chat">
    <div class="conv-header">
        <div class="back-btn" style="background:rgba(255,255,255,0.1); color:white;" onclick="cerrar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="chat-title" id="nom-header">Proveedor</div>
    </div>
    <div id="mensajes"></div>
    <div id="bloqueo-aviso" class="bloqueo-aviso">🔒 PROVEED SEG: No compartas datos externos.</div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje seguro...">
        <button class="send-btn" onclick="enviar()">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let chatID = null;

    onAuthStateChanged(auth, (user) => {
        if(!user) return;
        cargarBandeja(user.uid);
        
        const p = new URLSearchParams(window.location.search);
        if(p.get('chatId')) {
            abrir(p.get('chatId'), p.get('nombre'));
            if(p.get('refMsg')) document.getElementById('msg-input').value = p.get('refMsg');
        }
    });

    function cargarBandeja(uid) {
        const q = query(collection(db, "chats"), where("emprendedorId", "==", uid), orderBy("ultimoMensajeEn", "desc"));
        onSnapshot(q, (snap) => {
            document.getElementById('lista-chats').innerHTML = snap.docs.map(d => `
                <div class="chat-item" onclick="abrir('${d.id}', '${d.data().proveedorNombre}')">
                    <div class="chat-avatar">${d.data().proveedorNombre[0]}</div>
                    <div class="chat-info"><div style="font-weight:700">${d.data().proveedorNombre}</div><div style="font-size:0.75rem; color:#aaa">${d.data().ultimoMensaje || 'Toca para chatear'}</div></div>
                </div>
            `).join('');
        });
    }

    window.abrir = (id, nombre) => {
        chatID = id;
        document.getElementById('nom-header').innerText = nombre;
        document.getElementById('vista-chat').style.display = 'flex';
        
        const qM = query(collection(db, "chats", id, "mensajes"), orderBy("enviadoEn", "asc"));
        onSnapshot(qM, (snap) => {
            const box = document.getElementById('mensajes');
            box.innerHTML = snap.docs.map(m => `<div class="burbuja ${m.data().remitenteId === auth.currentUser.uid ? 'enviado' : 'recibido'}">${m.data().texto}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        });
    };

    window.cerrar = () => document.getElementById('vista-chat').style.display = 'none';

    window.enviar = async () => {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if(!txt || !chatID) return;

        if(/whatsapp|09\d|instagram|facebook|@/i.test(txt)) {
            document.getElementById('bloqueo-aviso').style.display = 'block';
            setTimeout(() => document.getElementById('bloqueo-aviso').style.display = 'none', 3000);
            return;
        }

        input.value = '';
        await addDoc(collection(db, "chats", chatID, "mensajes"), { texto: txt, remitenteId: auth.currentUser.uid, enviadoEn: serverTimestamp() });
        await updateDoc(doc(db, "chats", chatID), { ultimoMensaje: txt, ultimoMensajeEn: serverTimestamp() });
    };
</script>
</body>
</html>
