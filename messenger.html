<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Messenger Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris: #F7F8F5; }
        body { background: white; font-family: 'DM Sans', sans-serif; padding-bottom: 100px; }

        header { background: var(--lima); padding: 50px 20px 15px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Syne'; font-size: 1.1rem; text-transform: uppercase; }

        /* LISTA DE CHATS DINÁMICA */
        #chats-container { min-height: 200px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 18px 20px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.2s; }
        .chat-item:active { background: #f9f9f9; transform: scale(0.98); }
        
        .avatar { width: 55px; height: 55px; border-radius: 18px; object-fit: cover; background: #eee; border: 1px solid #eee; }
        
        .chat-info { flex: 1; }
        .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-weight: 800; font-size: 0.95rem; color: var(--negro); }
        .chat-time { font-size: 0.65rem; color: #aaa; font-weight: 500; }
        
        .chat-msg { font-size: 0.8rem; color: #666; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        
        /* ESTADO DE CARGA */
        .loader { padding: 40px; text-align: center; color: #ccc; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* NAVEGACIÓN INFERIOR */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; border-top: 1px solid #eee; padding-bottom: 25px; z-index: 1000; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; text-decoration: none; }
        .tab-btn.active { color: var(--negro); }
        .tab-btn span { font-size: 0.55rem; font-weight: 800; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>Mis Negociaciones</h1>
    </header>

    <div id="chats-container">
        <div class="loader">Buscando mensajes...</div>
    </div>

    <nav class="tab-bar">
        <a href="dashboard.html" class="tab-btn"><span>Explorar</span></a>
        <a href="#" class="tab-btn"><span>Tips</span></a>
        <a href="messenger.html" class="tab-btn active"><span>Messenger</span></a>
        <a href="#" class="tab-btn"><span>Carrito</span></a>
        <a href="perfil.html" class="tab-btn"><span>Mi Centro</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // Tu Configuración de Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", 
            projectId: "proveed-8cb7c" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const container = document.getElementById('chats-container');

        // ESCUCHA EN TIEMPO REAL (Como WhatsApp/Alibaba)
        // Buscamos en la colección "chats" u "ordenes" donde se generan mensajes
        function cargarChats() {
            const q = query(collection(db, "chats"), orderBy("ultimoMensajeFecha", "desc"));

            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML = '<div class="loader" style="color:#999;">No tienes chats activos aún.</div>';
                    return;
                }

                container.innerHTML = ''; // Limpiamos cargador

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const fecha = data.ultimoMensajeFecha ? new Date(data.ultimoMensajeFecha.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    
                    const chatHTML = `
                        <div class="chat-item" onclick="abrirChat('${doc.id}')">
                            <img src="${data.proveedorImg || 'https://via.placeholder.com/100?text=P'}" class="avatar">
                            <div class="chat-info">
                                <div class="chat-top">
                                    <span class="chat-name">${data.proveedorNombre || 'Proveedor Proveed'}</span>
                                    <span class="chat-time">${fecha}</span>
                                </div>
                                <p class="chat-msg">${data.ultimoMensaje || 'Haz clic para ver la negociación...'}</p>
                            </div>
                            ${data.leido === false ? '<div style="width:10px; height:10px; background:var(--lima); border-radius:50%;"></div>' : ''}
                        </div>
                    `;
                    container.innerHTML += chatHTML;
                });
            }, (error) => {
                console.error("Error al leer chats:", error);
                container.innerHTML = '<div class="loader" style="color:red;">Error de conexión.</div>';
            });
        }

        window.abrirChat = (chatId) => {
            // Aquí rediriges a la pantalla del chat individual
            // location.href = `chat_privado.html?id=${chatId}`;
            alert("Abriendo negociación ID: " + chatId);
        };

        cargarChats();
    </script>
</body>
</html>
