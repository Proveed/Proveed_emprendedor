<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Real — PROVEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde-pro: #32D74B; --negro: #000; }
        body { background: white; height: 100vh; display: flex; flex-direction: column; margin: 0; font-family: 'DM Sans', sans-serif; }
        
        .chat-header { 
            padding: 15px 20px; border-bottom: 1px solid #eee; 
            display: flex; align-items: center; gap: 12px; background: white; 
        }
        .status-dot { width: 8px; height: 8px; background: var(--verde-pro); border-radius: 50%; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #F8F9FA; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--negro); color: white; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: white; color: #333; border: 1px solid #ddd; border-bottom-left-radius: 4px; }
        
        .label-name { font-size: 0.6rem; font-weight: 800; display: block; margin-bottom: 4px; opacity: 0.6; text-transform: uppercase; }

        .input-area { padding: 15px 20px 35px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #message-input { flex: 1; background: #f2f2f2; border: none; padding: 14px 18px; border-radius: 25px; outline: none; }
        .btn-send { background: var(--negro); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <header class="chat-header">
        <a href="dashboard.html" style="color:black; text-decoration:none;">
            <svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
        <div style="flex:1;">
            <h2 id="display-proveedor-name" style="font-size: 1rem; margin: 0; font-family: 'Syne'; text-transform: uppercase;">Cargando...</h2>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div class="status-dot"></div>
                <span id="display-proveedor-status" style="font-size: 0.7rem; color: #888;">Verificando proveedor...</span>
            </div>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
        <button class="btn-send" id="send-btn">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const nameHeader = document.getElementById('display-proveedor-name');

        const userEmail = localStorage.getItem('userEmail');
        // Este ID lo debemos recibir desde el Dashboard o Detalle
        const proveedorEmail = localStorage.getItem('currentProveedor'); 

        // --- FUNCIÓN PARA TRAER EL NOMBRE REAL DEL ÚNICO PROVEEDOR ---
        async function cargarDatosProveedor() {
            if (!proveedorEmail) {
                nameHeader.innerText = "PROVEEDOR GENERAL";
                return;
            }

            const q = query(collection(db, "usuarios"), where("email", "==", proveedorEmail));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                const data = querySnapshot.docs[0].data();
                // Usamos el campo 'nombres' que creamos en el registro robusto
                nameHeader.innerText = data.nombres + " " + data.apellidos;
                document.getElementById('display-proveedor-status').innerText = "Proveedor Verificado de " + data.ciudad;
            } else {
                nameHeader.innerText = "PROVEEDOR NO IDENTIFICADO";
            }
        }
        cargarDatosProveedor();

        // --- ESCUCHAR CHAT EN TIEMPO REAL ---
        const qChat = query(collection(db, "chats"), orderBy("timestamp", "asc"));
        onSnapshot(qChat, (snapshot) => {
            chatContainer.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                // Solo mostrar la conversación correcta
                if ((data.remitente === userEmail && data.destinatario === proveedorEmail) || 
                    (data.remitente === proveedorEmail && data.destinatario === userEmail)) {
                    
                    const isMine = data.remitente === userEmail;
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isMine ? 'sent' : 'received'}`;
                    msgDiv.innerHTML = `<span class="label-name">${isMine ? 'Tú' : nameHeader.innerText}</span>${data.text}`;
                    chatContainer.appendChild(msgDiv);
                }
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        // --- ENVIAR ---
        window.sendMessage = async () => {
            const text = messageInput.value.trim();
            if (!text || !userEmail || !proveedorEmail) return;

            await addDoc(collection(db, "chats"), {
                text: text,
                remitente: userEmail,
                destinatario: proveedorEmail,
                timestamp: serverTimestamp()
            });
            messageInput.value = "";
        };

        document.getElementById('send-btn').onclick = window.sendMessage;
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') window.sendMessage(); });
    </script>
</body>
</html>
