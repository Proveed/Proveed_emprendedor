<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED — Mensajes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: white; padding-bottom: 100px; }
        .chat-item {
            display: flex; align-items: center; padding: 20px;
            border-bottom: 1px solid #f5f5f5; text-decoration: none; color: black;
        }
        .chat-avatar {
            width: 55px; height: 55px; border-radius: 18px;
            background: var(--lima); margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne'; font-weight: 800; font-size: 1.2rem;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 800; font-size: 1rem; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .chat-preview { font-size: 0.85rem; color: #888; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .chat-time { font-size: 0.7rem; color: #bbb; font-weight: 400; }
        .unread-dot { width: 8px; height: 8px; background: var(--naranja); border-radius: 50%; }

        /* Iconos de Navegación */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; padding: 12px 0 25px; border-top: 1px solid #eee; 
            justify-content: space-around; z-index: 1000;
        }
        .nav-item { text-align: center; flex: 1; cursor: pointer; text-decoration: none; color: #999; }
        .nav-item.active { color: #000; }
        .nav-item p { font-size: 0.55rem; font-weight: 800; margin-top: 4px; text-transform: uppercase; }
        .icon-svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <header style="padding: 30px 20px 10px; background: white; position: sticky; top:0; z-index:100;">
        <h1 style="font-family: 'Syne'; font-size: 1.8rem; letter-spacing: -1px;">Mensajes</h1>
    </header>

    <main>
        <a href="https://wa.me/593987654321" class="chat-item">
            <div class="chat-avatar" style="background: var(--naranja); color: white;">U</div>
            <div class="chat-info">
                <div class="chat-name">Ulises (Asesor Proveed) <span class="chat-time">Ahora</span></div>
                <p class="chat-preview">Hola Luis, tu pedido de Esmeraldas ya está en aduana...</p>
            </div>
            <div class="unread-dot"></div>
        </a>

        <div class="chat-item">
            <div class="chat-avatar">G</div>
            <div class="chat-info">
                <div class="chat-name">Global Tech China <span class="chat-time">10:45 AM</span></div>
                <p class="chat-preview">The MOQ for the smartwatches is 50 pieces.</p>
            </div>
        </div>

        <div class="chat-item">
            <div class="chat-avatar" style="background: #eee;">L</div>
            <div class="chat-info">
                <div class="chat-name">Logística Puerto <span class="chat-time">Ayer</span></div>
                <p class="chat-preview">Contenedor #4456 liberado con éxito.</p>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <p>Inicio</p>
        </a>
        <a href="tips.html" class="nav-item">
            <svg class="icon-svg" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            <p>Tips</p>
        </a>
        <a href="messenger.html" class="nav-item active">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"></path></svg>
            <p>Chats</p>
        </a>
        <a href="carrito.html" class="nav-item">
            <svg class="icon-svg" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <p>Pedidos</p>
        </a>
        <a href="perfil.html" class="nav-item">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <p>Perfil</p>
        </a>
    </nav>

</body>
</html>
