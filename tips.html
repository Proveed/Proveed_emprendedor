<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --blanco:#FFFFFF; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:80px; -webkit-font-smoothing:antialiased; }

  .header{ background:var(--negro); padding:44px 20px 16px; position:sticky; top:0; z-index:100; }
  .header-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .logo-row{ display:flex; align-items:center; gap:8px; }
  .logo-row svg{ width:28px; height:28px; }
  .logo-text{ font-size:1.1rem; font-weight:800; color:white; letter-spacing:-0.3px; }
  .logo-text span{ color:var(--verde); }
  .header-icons{ display:flex; gap:10px; align-items:center; }
  .h-icon{ position:relative; cursor:pointer; width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .h-icon svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2; }
  .badge{ position:absolute; top:-4px; right:-4px; background:var(--rojo); color:white; font-size:0.55rem; font-weight:800; padding:2px 5px; border-radius:8px; border:2px solid var(--negro); display:none; }
  .search-bar{ background:rgba(255,255,255,0.08); border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; }
  .search-bar svg{ width:16px; height:16px; stroke:#888; fill:none; stroke-width:2.5; flex-shrink:0; }
  .search-bar span{ font-size:0.88rem; color:#666; }

  /* BANNER */
  .banner{ margin:14px 16px; background:linear-gradient(135deg,#111 0%,#1a2a0a 100%); border-radius:20px; padding:20px; position:relative; overflow:hidden; }
  .banner::before{ content:''; position:absolute; right:-20px; top:-20px; width:130px; height:130px; background:radial-gradient(circle,rgba(168,230,61,0.18) 0%,transparent 70%); }
  .banner-tag{ background:var(--verde); color:var(--negro); font-size:0.62rem; font-weight:700; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .banner-title{ font-size:1.2rem; font-weight:700; color:white; line-height:1.3; margin-bottom:5px; }
  .banner-sub{ font-size:0.78rem; color:#888; margin-bottom:14px; }
  .banner-btn{ background:var(--verde); color:var(--negro); border:none; padding:10px 18px; border-radius:10px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }

  /* SECCIÓN */
  .section-head{ display:flex; justify-content:space-between; align-items:center; padding:16px 16px 10px; }
  .section-head h3{ font-size:0.95rem; font-weight:700; color:var(--negro); }
  .section-head a{ font-size:0.8rem; color:var(--naranja); text-decoration:none; font-weight:600; }

  /* CATEGORÍAS */
  .cats-scroll{ display:flex; gap:10px; padding:0 16px 4px; overflow-x:auto; scrollbar-width:none; }
  .cats-scroll::-webkit-scrollbar{ display:none; }
  .cat-chip{ display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; flex-shrink:0; min-width:60px; }
  .cat-icon{ width:52px; height:52px; border-radius:14px; background:white; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); transition:0.2s; border:2px solid transparent; }
  .cat-chip.active .cat-icon{ border-color:var(--verde); background:rgba(168,230,61,0.1); }
  .cat-icon svg{ width:22px; height:22px; stroke:var(--negro); fill:none; stroke-width:2; }
  .cat-label{ font-size:0.6rem; font-weight:600; color:#888; text-align:center; }
  .cat-chip.active .cat-label{ color:var(--negro); font-weight:700; }

  /* TIPS PREVIEW */
  .tips-scroll{ display:flex; gap:10px; padding:0 16px 4px; overflow-x:auto; scrollbar-width:none; }
  .tips-scroll::-webkit-scrollbar{ display:none; }
  .tip-thumb{ width:110px; flex-shrink:0; border-radius:14px; overflow:hidden; cursor:pointer; position:relative; height:170px; background:#111; transition:0.2s; }
  .tip-thumb:active{ transform:scale(0.96); }
  .tip-thumb video{ width:100%; height:100%; object-fit:cover; }
  .tip-thumb-placeholder{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1a1a,#2a2a2a); }
  .tip-thumb-placeholder svg{ width:28px; height:28px; stroke:#444; fill:none; stroke-width:1.5; }
  .tip-thumb-overlay{ position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%); }
  .tip-thumb-info{ position:absolute; bottom:8px; left:8px; right:8px; }
  .tip-thumb-prov{ font-size:0.62rem; font-weight:700; color:rgba(255,255,255,0.8); }
  .tip-thumb-desc{ font-size:0.6rem; color:rgba(255,255,255,0.6); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-top:2px; }
  .tip-play-icon{ position:absolute; top:8px; right:8px; width:24px; height:24px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .tip-play-icon svg{ width:10px; height:10px; fill:white; margin-left:1px; }

  /* PRODUCTOS GRID */
  .products-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:4px 16px; }
  .prod-card{ background:white; border-radius:14px; overflow:hidden; cursor:pointer; transition:0.2s; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
  .prod-card:active{ transform:scale(0.97); }
  .prod-img{ width:100%; height:155px; background:#f5f5f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .no-img{ width:40px; height:40px; stroke:#ddd; fill:none; stroke-width:1.5; }
  .prod-cat-tag{ position:absolute; top:8px; left:8px; background:var(--naranja); color:white; font-size:0.56rem; font-weight:700; padding:2px 7px; border-radius:6px; text-transform:uppercase; }
  .prod-video-tag{ position:absolute; top:8px; right:8px; background:rgba(168,230,61,0.9); color:var(--negro); font-size:0.56rem; font-weight:700; padding:2px 6px; border-radius:6px; }
  .prod-body{ padding:10px 12px 12px; }
  .prod-nombre{ font-size:0.82rem; font-weight:600; color:var(--negro); line-height:1.3; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .prod-proveedor{ font-size:0.68rem; color:#bbb; margin-bottom:6px; }
  .prod-precio{ font-size:0.95rem; font-weight:700; color:var(--naranja); }
  .prod-min{ font-size:0.62rem; color:#ccc; }
  .prod-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
  .add-btn{ width:30px; height:30px; border-radius:9px; background:var(--negro); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; flex-shrink:0; }
  .add-btn:active{ transform:scale(0.85); }
  .add-btn svg{ width:14px; height:14px; stroke:white; fill:none; stroke-width:2.5; }

  /* SKELETON */
  .skeleton{ background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
  @keyframes shimmer{ from{background-position:200% 0;} to{background-position:-200% 0;} }
  .skel-card{ background:white; border-radius:14px; overflow:hidden; }
  .skel-img{ height:155px; }
  .skel-line{ height:10px; margin:10px 12px 5px; border-radius:6px; }
  .skel-line.s{ width:55%; height:8px; margin:0 12px 12px; }

  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--negro); color:white; padding:10px 20px; border-radius:24px; font-size:0.82rem; font-weight:600; opacity:0; transition:0.3s; pointer-events:none; z-index:400; white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* TAB BAR */
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; box-shadow:0 -4px 20px rgba(0,0,0,0.06); z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; transition:0.2s; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  .tab-dot{ width:4px; height:4px; background:var(--verde); border-radius:50%; display:none; }
  .tab.active .tab-dot{ display:block; }
</style>
</head>
<body>
