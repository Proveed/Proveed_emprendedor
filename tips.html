<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Tips</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; }
  html,body{ height:100%; overflow:hidden; background:#000; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  
  /* FEED CORE */
  .feed{ height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
  .feed::-webkit-scrollbar{ display:none; }
  .tip-slide{ height:100vh; width:100vw; scroll-snap-align:start; position:relative; overflow:hidden; background:#000; display:flex; align-items:center; justify-content:center; }
  
  /* VIDEO & OVERLAY */
  .tip-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .tip-overlay{ position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.4) 100%); }
  
  /* HEADER */
  .feed-header{ position:fixed; top:0; left:0; right:0; z-index:200; padding:44px 16px 14px; display:flex; align-items:center; justify-content:space-between; pointer-events:none; }
  .feed-header * { pointer-events:auto; }
  .feed-title{ font-family:'Syne', sans-serif; font-size:1.2rem; color:white; text-transform:uppercase; letter-spacing:1px; }
  .feed-title span{ color:var(--verde); }
  .header-back{ width:40px; height:40px; background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); border-radius:12px; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; }
  .header-back svg{ width:20px; height:20px; stroke:white; fill:none; stroke-width:2.5; }

  /* INFO SECTION */
  .tip-info{ position:absolute; bottom:0; left:0; right:80px; padding:20px 16px 40px; z-index:10; }
  .tip-proveedor{ display:flex; align-items:center; gap:10px; margin-bottom:12px; cursor:pointer; }
  .prov-ava{ width:42px; height:42px; border-radius:14px; background:var(--negro); border:2px solid var(--verde); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--verde); flex-shrink:0; overflow:hidden;}
  .prov-ava img { width:100%; height:100%; object-fit:cover; }
  .prov-name{ font-size:0.95rem; font-weight:800; color:white; text-shadow:0 2px 4px rgba(0,0,0,0.5); }
  .tip-desc{ font-size:0.9rem; color:rgba(255,255,255,0.9); line-height:1.4; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  
  /* PRODUCT CHIP */
  .tip-prod-link{ display:inline-flex; align-items:center; gap:8px; background:white; border-radius:12px; padding:6px 12px 6px 6px; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
  .tip-prod-link img{ width:32px; height:32px; border-radius:8px; object-fit:cover; }
  .tip-prod-link span{ font-size:0.8rem; font-weight:700; color:var(--negro); }

  /* FLOATING ACTIONS */
  .tip-actions{ position:absolute; bottom:40px; right:12px; display:flex; flex-direction:column; gap:18px; align-items:center; z-index:100; }
  .action-btn{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .action-circle{ width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.15); backdrop-filter:blur(15px); display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:0.2s; }
  .action-circle:active{ transform:scale(0.85); }
  .action-circle svg{ width:22px; height:22px; stroke:white; fill:none; stroke-width:2; transition:0.3s; }
  
  /* ESTADOS ACTIVOS */
  .action-circle.liked svg{ fill:var(--rojo); stroke:var(--rojo); }
  .action-circle.saved svg{ fill:var(--verde); stroke:var(--verde); }
  .action-label{ font-size:0.65rem; color:white; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.5); }

  /* PROGRESS BAR */
  .progress-bar{ position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(255,255,255,0.2); z-index:30; }
  .progress-fill{ height:100%; background:var(--verde); width:0%; }

  /* COMMENTS DRAWER */
  .drawer{ position:fixed; bottom:0; left:0; right:0; background:white; border-radius:24px 24px 0 0; transform:translateY(100%); transition:0.4s cubic-bezier(0.33, 1, 0.68, 1); z-index:500; height:70vh; display:flex; flex-direction:column; }
  .drawer.open{ transform:translateY(0); }
  .drawer-header{ padding:20px; text-align:center; font-weight:800; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
  .comments-list{ flex:1; overflow-y:auto; padding:20px; }
  .comment-item{ display:flex; gap:12px; margin-bottom:16px; }
  .comment-avatar{ width:36px; height:36px; border-radius:10px; background:var(--gris); flex-shrink:0; overflow:hidden; }
  .comment-content{ flex:1; }
  .comment-user{ font-size:0.8rem; font-weight:800; margin-bottom:2px; }
  .comment-text{ font-size:0.85rem; color:#444; line-height:1.4; }
  
  .comment-input-area{ padding:16px 20px 34px; display:flex; gap:12px; border-top:1px solid #eee; background:white; }
  .comment-input{ flex:1; background:var(--gris); border:none; padding:12px 16px; border-radius:14px; font-family:'Inter'; outline:none; font-size:0.9rem; }
  .btn-send{ background:var(--negro); color:white; border:none; padding:0 18px; border-radius:14px; font-weight:700; }

  /* TOAST */
  .toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:50px; font-size:0.8rem; font-weight:600; opacity:0; transition:0.3s; z-index:1000; pointer-events:none; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div class="feed-header">
  <button class="header-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <div class="feed-title">TIPS <span>PROVEED</span></div>
  <div style="width:40px;"></div>
</div>

<div class="feed" id="feed">
  </div>

<div class="drawer" id="comments-drawer">
  <div class="drawer-header">
    <div style="width:24px;"></div>
    <span>Comentarios</span>
    <button onclick="cerrarComentarios()" style="background:none; border:none; font-weight:800; font-size:1.2rem;">×</button>
  </div>
  <div class="comments-list" id="comments-list">
    </div>
  <div class="comment-input-area">
    <input type="text" id="com-input" class="comment-input" placeholder="Añadir comentario...">
    <button class="btn-send" onclick="enviarComentario()">POST</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

let tips = [];
let currentTipId = null;
let misLikes = JSON.parse(localStorage.getItem('p_likes') || '[]');
let misGuardados = JSON.parse(localStorage.getItem('p_saves') || '[]');

async function init() {
  const { data } = await supabase
    .from('tips')
    .select('*, usuarios(empresa, foto_url), productos(nombre, precio, imagen_url)')
    .eq('activo', true)
    .order('created_at', { ascending: false });

  if(data) {
    tips = data;
    renderFeed();
  }
}

function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = tips.map((tip, i) => {
    const isLiked = misLikes.includes(tip.id);
    const isSaved = misGuardados.includes(tip.id);
    const prov = tip.usuarios || { empresa: 'Proveedor' };
    const prod = tip.productos;
    
    return `
      <div class="tip-slide" data-idx="${i}" id="slide-${tip.id}">
        <video class="tip-video" src="${tip.video_url}" loop playsinline></video>
        <div class="tip-overlay"></div>
        
        <div class="tip-info">
          <div class="tip-proveedor" onclick="location.href='proveedor.html?id=${tip.usuario_id}'">
            <div class="prov-ava">
              ${prov.foto_url ? `<img src="${prov.foto_url}">` : `<span>${prov.empresa[0]}</span>`}
            </div>
            <div class="prov-name">${prov.empresa}</div>
          </div>
          <div class="tip-desc">${tip.descripcion}</div>
          
          ${prod ? `
            <div class="tip-prod-link" onclick="location.href='producto.html?id=${tip.producto_id}'">
              <img src="${prod.imagen_url}">
              <span>${prod.nombre} · $${prod.precio.toFixed(2)}</span>
            </div>
          ` : ''}
        </div>

        <div class="tip-actions">
          <div class="action-btn" onclick="toggleLike('${tip.id}', ${i})">
            <button class="action-circle ${isLiked ? 'liked' : ''}" id="like-btn-${i}">
              <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
            <span class="action-label" id="like-cnt-${i}">${tip.likes_count || 0}</span>
          </div>

          <div class="action-btn" onclick="abrirComentarios('${tip.id}')">
            <button class="action-circle">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <span class="action-label">${tip.comments_count || 0}</span>
          </div>

          <div class="action-btn" onclick="toggleSave('${tip.id}', ${i})">
            <button class="action-circle ${isSaved ? 'saved' : ''}" id="save-btn-${i}">
              <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
            <span class="action-label">Guardar</span>
          </div>

          <div class="action-btn" onclick="compartirTip('${tip.id}', '${tip.descripcion}')">
            <button class="action-circle">
              <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
            <span class="action-label">Enviar</span>
          </div>
        </div>

        <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
      </div>
    `;
  }).join('');

  setupObserver();
}

function setupObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      const idx = entry.target.dataset.idx;
      if (entry.isIntersecting) {
        video.play();
        video.ontimeupdate = () => {
          const fill = document.getElementById(`prog-${idx}`);
          if(fill) fill.style.width = (video.currentTime / video.duration * 100) + '%';
        };
      } else {
        video.pause();
        video.currentTime = 0;
      }
    });
  }, { threshold: 0.8 });
  document.querySelectorAll('.tip-slide').forEach(s => observer.observe(s));
}

window.toggleLike = async (id, idx) => {
  const btn = document.getElementById(`like-btn-${idx}`);
  const label = document.getElementById(`like-cnt-${idx}`);
  const isLiked = misLikes.includes(id);
  
  if(isLiked) {
    misLikes = misLikes.filter(item => item !== id);
    btn.classList.remove('liked');
    label.innerText = Math.max(0, parseInt(label.innerText) - 1);
  } else {
    misLikes.push(id);
    btn.classList.add('liked');
    label.innerText = parseInt(label.innerText) + 1;
  }
  localStorage.setItem('p_likes', JSON.stringify(misLikes));
  await supabase.rpc('update_tip_stats', { tip_id: id, field: 'likes_count', val: isLiked ? -1 : 1 });
}

window.toggleSave = (id, idx) => {
  const btn = document.getElementById(`save-btn-${idx}`);
  const isSaved = misGuardados.includes(id);
  
  if(isSaved) {
    misGuardados = misGuardados.filter(item => item !== id);
    btn.classList.remove('saved');
    showToast("Eliminado de guardados");
  } else {
    misGuardados.push(id);
    btn.classList.add('saved');
    showToast("Guardado en tu perfil");
  }
  localStorage.setItem('p_saves', JSON.stringify(misGuardados));
}

window.compartirTip = async (id, desc) => {
  const url = window.location.origin + '/tips.html?id=' + id;
  if(navigator.share) {
    await navigator.share({ title: 'Tip PROVEED', text: desc, url });
  } else {
    navigator.clipboard.writeText(url);
    showToast("Enlace copiado");
  }
}

window.abrirComentarios = async (id) => {
  currentTipId = id;
  const drawer = document.getElementById('comments-drawer');
  drawer.classList.add('open');
  cargarComentarios(id);
}

window.cerrarComentarios = () => {
  document.getElementById('comments-drawer').classList.remove('open');
}

async function cargarComentarios(id) {
  const list = document.getElementById('comments-list');
  list.innerHTML = '<div style="text-align:center; padding:40px; color:#999; font-size:0.8rem;">Cargando comentarios...</div>';
  
  const { data } = await supabase
    .from('comentarios_tips')
    .select('*, usuarios(nombre, foto_url)')
    .eq('tip_id', id)
    .order('created_at', { ascending: false });

  if(data && data.length > 0) {
    list.innerHTML = data.map(c => `
      <div class="comment-item">
        <div class="comment-avatar">
          ${c.usuarios.foto_url ? `<img src="${c.usuarios.foto_url}" style="width:100%; height:100%; object-fit:cover;">` : ''}
        </div>
        <div class="comment-content">
          <div class="comment-user">${c.usuarios.nombre}</div>
          <div class="comment-text">${c.texto}</div>
        </div>
      </div>
    `).join('');
  } else {
    list.innerHTML = '<div style="text-align:center; padding:40px; color:#999; font-size:0.8rem;">Sé el primero en comentar</div>';
  }
}

window.enviarComentario = async () => {
  const input = document.getElementById('com-input');
  const texto = input.value.trim();
  if(!texto || !currentTipId) return;

  // Supongamos que tienes el ID del usuario en una variable global o localStorage
  const userId = localStorage.getItem('user_id'); 
  
  const { error } = await supabase
    .from('comentarios_tips')
    .insert([{ tip_id: currentTipId, usuario_id: userId, texto: texto }]);

  if(!error) {
    input.value = '';
    cargarComentarios(currentTipId);
    await supabase.rpc('update_tip_stats', { tip_id: currentTipId, field: 'comments_count', val: 1 });
  }
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
