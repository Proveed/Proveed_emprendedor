<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedidos — PROVEED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #F8F9FA; padding-bottom: 120px; margin: 0; }
        
        /* CABECERA PROVEED */
        .header-main {
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #eee;
            position: sticky; top: 0; background: white; z-index: 100;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 8px; }
        .hex-icon {
            width: 22px; height: 26px; background: #32D74B; 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; margin: 0; color: #000; }

        /* LISTA DE PRODUCTOS EN CARRITO */
        .cart-item {
            background: white; margin: 12px 20px; padding: 15px;
            border-radius: 15px; border: 1px solid #eee;
            display: flex; gap: 15px; align-items: center;
        }
        .cart-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; background: #f9f9f9; }
        .cart-details { flex: 1; }
        .cart-title { font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; }
        .cart-price { font-weight: 800; color: #000; font-size: 1.1rem; }
        
        /* RESUMEN DE PAGO */
        .checkout-bar {
            position: fixed; bottom: 85px; width: 90%; left: 5%;
            background: #000; border-radius: 15px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; z-index: 1001;
        }
        .btn-pay { background: #32D74B; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }

        /* NAVEGACIÓN INFERIOR ARREGLADA */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px 0 28px; border-top: 1px solid #eee; justify-content: space-around; z-index: 1000; }
        .nav-item { text-align: center; flex: 1; text-decoration: none; color: #AAA; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #000; }
        .icon-pro { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item p { font-size: 0.55rem; font-weight: 800; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="header-main">
        <div class="logo-wrapper">
            <div class="hex-icon"><svg width="10" viewBox="0 0 24 24" style="stroke:white; stroke-width:4; fill:none;"><path d="M20 6L9 17l-5-5"/></svg></div>
            <h1 class="logo-text">PROVEED</h1>
        </div>
        <p style="font-size: 0.7rem; font-weight: 800; color: #32D74B;">MIS PEDIDOS</p>
    </header>

    <main>
        <div class="cart-item">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?fit=crop&w=150" class="cart-img">
            <div class="cart-details">
                <p class="cart-title">Smartwatch Ultra Gen 2</p>
                <p style="font-size: 0.7rem; color: #888;">MOQ: 50 unidades</p>
                <p class="cart-price">$750.00</p>
            </div>
            <svg class="icon-pro" style="color:#FF3B30; width:18px;" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </div>

        <div style="margin: 20px; padding: 12px; background: #e8f5e9; border-radius: 10px; font-size: 0.7rem; color: #2e7d32; text-align: center;">
            🛡️ <b>Compra Segura:</b> Tu dinero está protegido por Proveed Seg hasta que recibas el producto.
        </div>
    </main>

    <div class="checkout-bar">
        <div>
            <p style="font-size: 0.6rem; color: #aaa; margin: 0;">TOTAL ESTIMADO</p>
            <p style="font-size: 1.2rem; font-weight: 800; margin: 0;">$750.00</p>
        </div>
        <button class="btn-pay" onclick="alert('Iniciando proceso seguro...')">Siguiente</button>
    </div>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <p>Inicio</p>
        </a>
        <a href="tips.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            <p>Tips</p>
        </a>
        <a href="messenger.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"></path></svg>
            <p>Chats</p>
        </a>
        <a href="carrito.html" class="nav-item active">
            <svg class="icon-pro" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <p>Pedidos</p>
        </a>
        <a href="perfil.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <p>Perfil</p>
        </a>
    </nav>

</body>
</html>
