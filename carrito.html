<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Carrito</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:160px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .header-title{ font-size:1.1rem; font-weight:700; color:white; flex:1; }
  .header-count{ font-size:0.8rem; color:#555; }
  .grupo-proveedor{ margin:14px 16px; background:white; border-radius:18px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .grupo-header{ padding:14px 16px; background:var(--gris); border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:8px; }
  .grupo-avatar{ width:32px; height:32px; border-radius:10px; background:var(--negro); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:800; color:var(--verde); flex-shrink:0; }
  .grupo-nombre{ font-size:0.85rem; font-weight:700; color:var(--negro); flex:1; }
  .grupo-subtotal{ font-size:0.82rem; color:var(--naranja); font-weight:700; }
  .item-row{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #f8f8f8; }
  .item-row:last-child{ border-bottom:none; }
  .item-img{ width:56px; height:56px; border-radius:12px; background:#f5f5f5; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .item-img img{ width:100%; height:100%; object-fit:cover; }
  .item-img svg{ width:20px; height:20px; stroke:#ddd; fill:none; }
  .item-info{ flex:1; min-width:0; }
  .item-nombre{ font-size:0.85rem; font-weight:600; color:var(--negro); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .item-precio{ font-size:0.75rem; color:#aaa; margin-top:2px; }
  .item-controls{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .ctrl-btn{ width:28px; height:28px; border-radius:8px; background:var(--gris); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:700; color:var(--negro); }
  .ctrl-qty{ font-size:0.88rem; font-weight:700; color:var(--negro); min-width:24px; text-align:center; }
  .item-total{ font-size:0.88rem; font-weight:700; color:var(--naranja); min-width:52px; text-align:right; flex-shrink:0; }
  .empty-cart{ text-align:center; padding:80px 32px; }
  .empty-cart svg{ width:64px; height:64px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 16px; display:block; }
  .empty-cart h3{ font-size:1.1rem; font-weight:700; color:#bbb; margin-bottom:6px; }
  .empty-cart p{ font-size:0.85rem; color:#ccc; margin-bottom:20px; }
  .btn-explorar{ background:var(--negro); color:white; border:none; padding:13px 28px; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; }
  .bottom-bar{ position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #eee; padding:16px 20px; box-shadow:0 -4px 20px rgba(0,0,0,0.08); z-index:200; }
  .total-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .total-label{ font-size:0.85rem; color:#aaa; font-weight:600; }
  .total-val{ font-size:1.4rem; font-weight:800; color:var(--negro); }
  .btn-pagar{ width:100%; padding:15px; background:var(--negro); color:white; border:none; border-radius:16px; font-family:'Inter',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; }
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <div class="header-title">Mi Carrito</div>
  <div class="header-count" id="header-count">0 items</div>
</div>
<div id="carrito-content"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let carrito = JSON.parse(localStorage.getItem('carrito_proveed')||'[]');

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  renderCarrito();
})();

function renderCarrito(){
  const cont = document.getElementById('carrito-content');
  const total = carrito.reduce((s,i)=>s+i.cantidad,0);
  document.getElementById('header-count').textContent=`${total} item${total!==1?'s':''}`;
  if(!carrito.length){
    cont.innerHTML=`<div class="empty-cart"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><h3>Carrito vacío</h3><p>Agrega productos para continuar</p><button class="btn-explorar" onclick="window.location.href='explorar.html'">Explorar productos →</button></div>`;
    return;
  }
  const grupos={};
  carrito.forEach(i=>{ if(!grupos[i.proveedor]) grupos[i.proveedor]=[]; grupos[i.proveedor].push(i); });
  let html='';
  Object.entries(grupos).forEach(([prov,items])=>{
    const subtotal=items.reduce((s,i)=>s+(i.precio*i.cantidad),0);
    html+=`<div class="grupo-proveedor"><div class="grupo-header"><div class="grupo-avatar">${prov[0].toUpperCase()}</div><div class="grupo-nombre">${prov}</div><div class="grupo-subtotal">$${subtotal.toFixed(2)}</div></div>`;
    items.forEach(item=>{
      html+=`<div class="item-row"><div class="item-img">${item.imagen?`<img src="${item.imagen}" alt="">`:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`}</div><div class="item-info"><div class="item-nombre">${item.nombre}</div><div class="item-precio">$${item.precio.toFixed(2)} c/u · Mín: ${item.minimo}</div></div><div class="item-controls"><button class="ctrl-btn" onclick="cambiarCant('${item.id}',-${item.minimo})">−</button><div class="ctrl-qty">${item.cantidad}</div><button class="ctrl-btn" onclick="cambiarCant('${item.id}',${item.minimo})">+</button></div><div class="item-total">$${(item.precio*item.cantidad).toFixed(2)}</div></div>`;
    });
    html+='</div>';
  });
  const totalGeneral=carrito.reduce((s,i)=>s+(i.precio*i.cantidad),0);
  html+=`<div class="bottom-bar"><div class="total-row"><div class="total-label">Total del pedido</div><div class="total-val">$${totalGeneral.toFixed(2)}</div></div><button class="btn-pagar" onclick="window.location.href='pagar.html'">Confirmar pedido →</button></div>`;
  cont.innerHTML=html;
}

window.cambiarCant=function(id,delta){
  const idx=carrito.findIndex(i=>i.id===id);
  if(idx<0) return;
  carrito[idx].cantidad+=delta;
  if(carrito[idx].cantidad<=0) carrito.splice(idx,1);
  localStorage.setItem('carrito_proveed',JSON.stringify(carrito));
  renderCarrito();
};
</script>
</body>
</html>
