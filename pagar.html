<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Confirmar Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --blanco:#FFFFFF; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:120px; -webkit-font-smoothing:antialiased; }

  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .header-title{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; color:white; }

  .section{ margin:14px 16px 0; }
  .section-label{ font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .card{ background:white; border-radius:18px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }

  .order-item{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f5f5f5; font-size:0.86rem; }
  .order-item:last-child{ border-bottom:none; }
  .order-item-name{ color:#666; flex:1; padding-right:10px; }
  .order-item-price{ font-weight:700; color:var(--naranja); white-space:nowrap; }

  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
  .field input,.field textarea{
    width:100%; padding:12px 14px; background:var(--gris); border:1.5px solid #eee;
    border-radius:12px; outline:none; font-family:'DM Sans',sans-serif; font-size:0.9rem;
    color:var(--negro); transition:0.2s;
  }
  .field input:focus,.field textarea:focus{ border-color:var(--verde); background:white; }
  .field textarea{ resize:none; height:65px; }

  .metodo-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .metodo-btn{
    padding:14px 10px; border:2px solid #eee; border-radius:14px; background:white; 
    cursor:pointer; text-align:center; font-family:'DM Sans',sans-serif; font-weight:600; 
    font-size:0.82rem; color:#888; transition:0.2s;
  }
  .metodo-btn.active{ border-color:var(--negro); color:var(--negro); background:#f8f8f8; }
  .metodo-btn svg{ width:24px; height:24px; stroke:currentColor; fill:none; stroke-width:2; display:block; margin:0 auto 6px; }

  .total-card{ background:var(--negro); border-radius:18px; padding:18px; margin:14px 16px 0; }
  .total-row{ display:flex; justify-content:space-between; font-size:0.84rem; color:#666; margin-bottom:8px; }
  .total-final{ display:flex; justify-content:space-between; font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:900; color:white; margin-top:12px; padding-top:10px; border-top:1px solid #222; }
  .total-final span:last-child{ color:var(--verde); }

  .footer-fixed{ position:fixed; bottom:0; width:100%; background:white; padding:14px 16px 28px; box-shadow:0 -6px 24px rgba(0,0,0,0.08); z-index:200; }
  .btn-confirmar{ width:100%; padding:16px; border:none; border-radius:16px; background:var(--negro); color:white; font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; }
  .btn-confirmar:disabled{ opacity:0.5; }

  .success-screen{ display:none; position:fixed; inset:0; background:var(--negro); z-index:999; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; }
  .success-screen.show{ display:flex; }
  .check-big{ width:100px; height:100px; background:var(--verde); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:28px; box-shadow:0 8px 32px rgba(168,230,61,0.35); }
  .success-title{ font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:900; color:white; margin-bottom:8px; }
  .num-pedido{ background:#1a1a1a; border-radius:14px; padding:14px 24px; font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; color:var(--verde); margin:20px 0; }
  .btn-volver{ padding:16px 36px; background:var(--verde); border-radius:16px; border:none; font-family:'Syne',sans-serif; font-weight:800; cursor:pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
  <div class="header-title">Confirmar Pedido</div>
</div>

<div class="section">
  <div class="section-label">Resumen del pedido</div>
  <div class="card"><div id="items-list"></div></div>
</div>

<div class="total-card">
  <div class="total-row"><span>Subtotal</span><span id="sub-val">$0.00</span></div>
  <div class="total-row"><span>Envío</span><span style="color:#555;">A coordinar</span></div>
  <div class="total-final"><span>Total</span><span id="tot-val">$0.00</span></div>
</div>

<div class="section">
  <div class="section-label">Datos de entrega</div>
  <div class="card">
    <div class="field"><label>Nombre completo</label><input type="text" id="nombre-entrega"></div>
    <div class="field"><label>Dirección exacta</label><input type="text" id="direccion"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div class="field"><label>Ciudad</label><input type="text" id="ciudad"></div>
      <div class="field"><label>Teléfono</label><input type="text" id="telefono"></div>
    </div>
    <div class="field"><label>Notas</label><textarea id="notas" placeholder="Tallas, colores..."></textarea></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Método de pago</div>
  <div class="metodo-grid">
    <div class="metodo-btn active" id="m-transferencia" onclick="setMetodo('transferencia')">
      <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Transferencia
    </div>
    <div class="metodo-btn" id="m-efectivo" onclick="setMetodo('efectivo')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Efectivo
    </div>
  </div>
</div>

<div class="footer-fixed">
  <button class="btn-confirmar" id="btn-confirmar" onclick="confirmar()">ENVIAR PEDIDO →</button>
</div>

<div class="success-screen" id="success-screen">
  <div class="check-big"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><path d="M20 6L9 17l-5-5"/></svg></div>
  <div class="success-title">¡Pedido enviado!</div>
  <p style="color:#666">El proveedor coordinará contigo por el chat.</p>
  <div class="num-pedido" id="num-pedido">#PV-XXXXXX</div>
  <button class="btn-volver" onclick="window.location.href='dashboard.html'">VOLVER AL INICIO</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

let userUID = null;
let metodoPago = 'transferencia';
let itemsCarrito = [];

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userUID = session.user.id;
  
  // Cargar perfil del usuario para autocompletar
  const { data: perfil } = await supabase.from('usuarios').select('*').eq('id', userUID).single();
  if(perfil) {
    document.getElementById('nombre-entrega').value = perfil.nombre || '';
    document.getElementById('ciudad').value = perfil.ciudad || '';
  }
  
  cargarResumen();
}

async function cargarResumen() {
  // Consultar carrito real de Supabase (con info del producto unida)
  const { data, error } = await supabase
    .from('carrito')
    .select(`cantidad, productos(nombre, precio)`)
    .eq('user_id', userUID);

  if (error || !data.length) {
    document.getElementById('items-list').innerHTML = '<p style="text-align:center;color:#999;padding:10px;">Carrito vacío</p>';
    return;
  }

  itemsCarrito = data;
  const lista = document.getElementById('items-list');
  let total = 0;
  lista.innerHTML = '';

  data.forEach(item => {
    const sub = item.cantidad * item.productos.precio;
    total += sub;
    const div = document.createElement('div');
    div.className = 'order-item';
    div.innerHTML = `<span class="order-item-name">${item.cantidad}× ${item.productos.nombre}</span><span class="order-item-price">$${sub.toFixed(2)}</span>`;
    lista.appendChild(div);
  });

  document.getElementById('sub-val').textContent = `$${total.toFixed(2)}`;
  document.getElementById('tot-val').textContent = `$${total.toFixed(2)}`;
}

window.setMetodo = (m) => {
  metodoPago = m;
  document.getElementById('m-transferencia').classList.toggle('active', m === 'transferencia');
  document.getElementById('m-efectivo').classList.toggle('active', m === 'efectivo');
};

window.confirmar = async () => {
  const nombre = document.getElementById('nombre-entrega').value.trim();
  const direccion = document.getElementById('direccion').value.trim();
  const ciudad = document.getElementById('ciudad').value.trim();
  
  if(!nombre || !direccion || !ciudad) return alert('Datos incompletos');
  
  const btn = document.getElementById('btn-confirmar');
  btn.disabled = true;
  btn.textContent = 'PROCESANDO...';

  try {
    // 1. Crear Pedido
    const { data: pedido, error } = await supabase
      .from('pedidos')
      .insert([{
        user_id: userUID,
        total: parseFloat(document.getElementById('tot-val').textContent.replace('$','')),
        metodo_pago: metodoPago,
        estado: 'pendiente',
        datos_entrega: { nombre, direccion, ciudad, notas: document.getElementById('notas').value },
        items: itemsCarrito // Guardamos copia de los items en el pedido
      }])
      .select()
      .single();

    if(error) throw error;

    // 2. Limpiar carrito en DB
    await supabase.from('carrito').delete().eq('user_id', userUID);

    // 3. Éxito
    document.getElementById('num-pedido').textContent = `#PV-${pedido.id.toString().slice(-6).toUpperCase()}`;
    document.getElementById('success-screen').classList.add('show');

  } catch (e) {
    alert('Error al procesar: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'ENVIAR PEDIDO →';
  }
};

init();
</script>
</body>
</html>
