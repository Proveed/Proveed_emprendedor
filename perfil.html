<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Mi Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#32CD32; --negro:#0E0E0E; --blanco:#F8F8F5; --gris:#F2F3F0; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:100px; }
  .header{ background:var(--negro); color:var(--blanco); padding:48px 20px 30px; border-radius:0 0 32px 32px; position:sticky; top:0; z-index:100; }
  .header-top{ display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .back-btn{ width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; }
  .profile-card{ display:flex; align-items:center; gap:16px; }
  .avatar{ width:64px; height:64px; border-radius:20px; background:var(--verde); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:900; color:#000; flex-shrink:0; }
  .profile-name{ font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; }
  .profile-role{ font-size:0.75rem; color:var(--verde); font-weight:600; margin-top:2px; text-transform:uppercase; letter-spacing:1px; }
  .profile-email{ font-size:0.8rem; color:#666; margin-top:4px; }
  .section{ padding:20px 20px 0; }
  .section-label{ font-size:0.7rem; font-weight:700; color:#bbb; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .menu-card{ background:white; border-radius:20px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .menu-item{ display:flex; align-items:center; gap:14px; padding:16px 18px; border-bottom:1px solid #f5f5f5; cursor:pointer; transition:0.15s; }
  .menu-item:last-child{ border-bottom:none; }
  .menu-item:active{ background:#fafafa; }
  .menu-icon{ width:40px; height:40px; border-radius:12px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .menu-icon svg{ width:20px; height:20px; stroke:var(--negro); fill:none; stroke-width:2; }
  .menu-icon.verde{ background:rgba(50,205,50,0.1); }
  .menu-icon.verde svg{ stroke:var(--verde); }
  .menu-text{ flex:1; }
  .menu-title{ font-weight:600; font-size:0.92rem; }
  .menu-sub{ font-size:0.74rem; color:#bbb; margin-top:1px; }
  .menu-arrow svg{ width:16px; height:16px; stroke:#ddd; fill:none; stroke-width:2.5; }
  .toggle-switch{ width:42px; height:24px; background:#e0e0e0; border-radius:12px; position:relative; cursor:pointer; transition:0.3s; flex-shrink:0; }
  .toggle-switch.on{ background:var(--verde); }
  .toggle-switch::after{ content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:white; transition:0.3s; }
  .toggle-switch.on::after{ left:21px; }
  .btn-logout{ margin:20px 20px 0; width:calc(100% - 40px); padding:16px; border:2px solid rgba(255,77,77,0.2); border-radius:16px; background:rgba(255,77,77,0.06); color:var(--rojo); font-family:'Syne',sans-serif; font-size:0.92rem; font-weight:800; cursor:pointer; transition:0.2s; }
  .btn-logout:active{ background:rgba(255,77,77,0.12); }
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:300; }
  .modal-overlay.show{ display:flex; align-items:flex-end; }
  .modal-sheet{ background:white; width:100%; border-radius:28px 28px 0 0; padding:28px 24px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .modal-title{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:20px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.72rem; font-weight:600; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
  .field input{ width:100%; padding:13px 14px; background:#f8f8f8; border:1.5px solid #eee; border-radius:13px; outline:none; font-family:'DM Sans',sans-serif; font-size:0.92rem; color:var(--negro); transition:border-color 0.2s; box-sizing:border-box; }
  .field input:focus{ border-color:var(--verde); }
  .btn-save{ width:100%; padding:16px; background:var(--negro); color:white; border:none; border-radius:16px; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:6px; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; box-shadow:0 -4px 20px rgba(0,0,0,0.06); z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#bbb; text-decoration:none; transition:0.2s; }
  .tab.active{ color:var(--verde); }
  .tab svg{ width:23px; height:23px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div class="page-title">Mi Perfil</div>
  </div>
  <div class="profile-card">
    <div class="avatar" id="avatar-letra">?</div>
    <div>
      <div class="profile-name" id="profile-nombre">Cargando...</div>
      <div class="profile-role">Emprendedor</div>
      <div class="profile-email" id="profile-email">—</div>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-label">Cuenta</div>
  <div class="menu-card">
    <div class="menu-item" onclick="abrirModal()">
      <div class="menu-icon verde"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="menu-text"><div class="menu-title">Información personal</div><div class="menu-sub">Nombre, ciudad, cédula</div></div>
      <div class="menu-arrow"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>
    </div>
    <div class="menu-item">
      <div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <div class="menu-text"><div class="menu-title">Seguridad</div><div class="menu-sub">Contraseña y verificación</div></div>
      <div class="menu-arrow"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>
    </div>
  </div>
</div>
<div class="section" style="margin-top:14px;">
  <div class="section-label">Preferencias</div>
  <div class="menu-card">
    <div class="menu-item">
      <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div class="menu-text"><div class="menu-title">Notificaciones</div><div class="menu-sub">Pedidos, mensajes y ofertas</div></div>
      <div class="toggle-switch on" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="menu-item" onclick="window.location.href='chat.html'">
      <div class="menu-icon verde"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div class="menu-text"><div class="menu-title">Chat con proveedores</div><div class="menu-sub">Ver todas tus conversaciones</div></div>
      <div class="menu-arrow"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>
    </div>
  </div>
</div>
<button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="modal-title">Editar información</div>
    <div class="field"><label>Nombre completo</label><input type="text" id="edit-nombre" placeholder="Tu nombre"></div>
    <div class="field"><label>Ciudad</label><input type="text" id="edit-ciudad" placeholder="Tu ciudad"></div>
    <button class="btn-save" onclick="guardarPerfil()">GUARDAR CAMBIOS</button>
  </div>
</div>
<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></a>
  <a class="tab" href="explorar.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span></a>
  <a class="tab" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
  <a class="tab" href="carrito.html"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span></a>
  <a class="tab active" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
</nav>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const app=initializeApp({
  apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain:"proveed-8cb7c.firebaseapp.com",
  projectId:"proveed-8cb7c",
  storageBucket:"proveed-8cb7c.firebasestorage.app",
  messagingSenderId:"235073250367",
  appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
});
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null;
onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='login.html';return;}
  currentUser=user;
  const snap=await getDoc(doc(db,'usuarios',user.uid));
  if(snap.exists()){
    const d=snap.data();
    const nombre=d.nombre||'Emprendedor';
    document.getElementById('profile-nombre').textContent=nombre;
    document.getElementById('profile-email').textContent=user.email;
    document.getElementById('avatar-letra').textContent=nombre[0].toUpperCase();
    document.getElementById('edit-nombre').value=nombre;
    document.getElementById('edit-ciudad').value=d.ciudad||'';
  }
});
window.cerrarSesion=async function(){
  if(!confirm('¿Seguro que quieres cerrar sesión?')) return;
  await signOut(auth);
  window.location.href='login.html';
};
window.abrirModal=function(){ document.getElementById('modal-overlay').classList.add('show'); };
window.cerrarModal=function(e){ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };
window.guardarPerfil=async function(){
  const nombre=document.getElementById('edit-nombre').value.trim();
  const ciudad=document.getElementById('edit-ciudad').value.trim();
  if(!nombre) return;
  await updateDoc(doc(db,'usuarios',currentUser.uid),{nombre,ciudad});
  document.getElementById('profile-nombre').textContent=nombre;
  document.getElementById('avatar-letra').textContent=nombre[0].toUpperCase();
  document.getElementById('modal-overlay').classList.remove('show');
};
</script>
</body>
</html>
