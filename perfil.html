<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil — PROVEED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #F8F9FA; padding-bottom: 110px; margin: 0; }
        
        /* CABECERA PROVEED */
        .header-main {
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #eee;
            position: sticky; top: 0; background: white; z-index: 100;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 8px; }
        .hex-icon {
            width: 22px; height: 26px; background: #32D74B; 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; margin: 0; color: #000; }

        /* AREA DE PERFIL */
        .user-card { background: white; padding: 30px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .user-photo { width: 80px; height: 80px; border-radius: 25px; background: #eee; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--lima); }
        .user-name { font-family: 'Syne'; font-size: 1.3rem; margin: 0; }
        
        /* MENÚ DE OPCIONES */
        .menu-section { margin-top: 20px; background: white; border-top: 1px solid #eee; }
        .menu-item {
            display: flex; align-items: center; padding: 18px 20px;
            border-bottom: 1px solid #f8f8f8; text-decoration: none; color: #333;
        }
        .menu-icon { width: 35px; height: 35px; border-radius: 10px; background: #f4f4f4; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .menu-text { flex: 1; font-weight: 700; font-size: 0.9rem; }

        /* NAVEGACIÓN INFERIOR (ICONOS LIGEROS) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px 0 28px; border-top: 1px solid #eee; justify-content: space-around; z-index: 1000; }
        .nav-item { text-align: center; flex: 1; text-decoration: none; color: #AAA; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #000; }
        .icon-pro { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item p { font-size: 0.55rem; font-weight: 800; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="header-main">
        <div class="logo-wrapper">
            <div class="hex-icon"><svg width="10" viewBox="0 0 24 24" style="stroke:white; stroke-width:4; fill:none;"><path d="M20 6L9 17l-5-5"/></svg></div>
            <h1 class="logo-text">PROVEED</h1>
        </div>
        <svg class="icon-pro" style="color:#000;" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    </header>

    <main>
        <section class="user-card">
            <div class="user-photo">
                <svg class="icon-pro" style="width:40px; height:40px; color:#32D74B;" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <h2 class="user-name">Luis Emprendedor</h2>
            <p style="color: #32D74B; font-weight: 800; font-size: 0.7rem; margin-top: 5px;">CUENTA VERIFICADA PROVEED SEG</p>
        </section>

        <section class="menu-section">
            <a href="#" class="menu-item">
                <div class="menu-icon"><svg class="icon-pro" style="width:18px; color:#444;" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
                <div class="menu-text">Seguridad y Privacidad Antifraude</div>
                <svg class="icon-pro" style="width:14px; color:#ccc;" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            <a href="#" class="menu-item">
                <div class="menu-icon"><svg class="icon-pro" style="width:18px; color:#444;" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></div>
                <div class="menu-text">Mis Métodos de Pago Seguros</div>
                <svg class="icon-pro" style="width:14px; color:#ccc;" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            <a href="#" class="menu-item">
                <div class="menu-icon"><svg class="icon-pro" style="width:18px; color:#444;" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
                <div class="menu-text">Direcciones de Entrega Protegidas</div>
                <svg class="icon-pro" style="width:14px; color:#ccc;" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            <a href="index.html" class="menu-item" style="margin-top:20px;">
                <div class="menu-icon" style="background: #FFF0F0;"><svg class="icon-pro" style="width:18px; color:#FF3B30;" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></div>
                <div class="menu-text" style="color: #FF3B30;">Cerrar Sesión</div>
            </a>
        </section>
    </main>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <p>Inicio</p>
        </a>
        <a href="tips.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            <p>Tips</p>
        </a>
        <a href="messenger.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"></path></svg>
            <p>Chats</p>
        </a>
        <a href="carrito.html" class="nav-item">
            <svg class="icon-pro" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <p>Pedidos</p>
        </a>
        <a href="perfil.html" class="nav-item active">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <p>Perfil</p>
        </a>
    </nav>

</body>
</html>
