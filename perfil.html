<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Mi Centro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris: #F7F8F5; }
        body { background: var(--gris); font-family: 'DM Sans', sans-serif; padding-bottom: 110px; }

        /* CABECERA */
        .profile-header { background: var(--lima); padding: 60px 20px 40px; border-radius: 0 0 30px 30px; text-align: center; }
        .user-avatar { width: 85px; height: 85px; border-radius: 25px; border: 4px solid white; background: #eee; margin-bottom: 10px; object-fit: cover; }
        .user-name { font-family: 'Syne'; font-size: 1.2rem; text-transform: uppercase; color: var(--negro); }

        /* ESTADOS DE PEDIDO (ESTILO ALIBABA) */
        .order-container { background: white; margin: -25px 20px 20px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-around; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .status-box { text-align: center; position: relative; flex: 1; }
        .status-box svg { width: 24px; height: 24px; margin-bottom: 5px; color: #333; }
        .status-txt { font-size: 0.6rem; font-weight: 800; color: #888; text-transform: uppercase; }
        .badge { position: absolute; top: -5px; right: 15px; background: #FF3B30; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: 800; }

        /* SECCIONES */
        .menu-group { padding: 0 20px; margin-bottom: 20px; }
        .group-title { font-family: 'Syne'; font-size: 0.7rem; color: #bbb; margin-bottom: 10px; text-transform: uppercase; }
        .menu-box { background: white; border-radius: 20px; border: 1px solid #eee; overflow: hidden; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        .item-content { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; font-weight: 600; }

        /* NAVEGACIÓN INFERIOR */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; border-top: 1px solid #eee; padding-bottom: 25px; z-index: 1000; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; text-decoration: none; }
        .tab-btn.active { color: var(--negro); }
        .tab-btn span { font-size: 0.55rem; font-weight: 800; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <img src="https://ui-avatars.com/api/?name=Luis+Alejandro&background=0D0D0D&color=CCFF00" class="user-avatar">
        <h1 class="user-name">Luis Alejandro</h1>
        <p style="font-size: 0.7rem; font-weight: 700; opacity: 0.5;">EMPRENDEDOR VERIFICADO</p>
    </div>

    <div class="order-container">
        <div class="status-box">
            <span class="badge" id="count-pagar">0</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            <div class="status-txt">Por Pagar</div>
        </div>
        <div class="status-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 17h4V5H2v12h3m15 0h2v-3.34a2 2 0 0 0-.59-1.42L17.5 9H14"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
            <div class="status-txt">En Camino</div>
        </div>
        <div class="status-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10.01-3-3"/></svg>
            <div class="status-txt">Finalizado</div>
        </div>
    </div>

    <div class="menu-group">
        <h3 class="group-title">Logística Esmeraldas</h3>
        <div class="menu-box">
            <div class="menu-item">
                <div class="item-content">📍 Mis Direcciones de Entrega</div>
                <span>&rarr;</span>
            </div>
            <div class="menu-item">
                <div class="item-content">📦 Rastreo de Carga (SRI)</div>
                <span>&rarr;</span>
            </div>
        </div>
    </div>

    <div class="menu-group">
        <h3 class="group-title">Configuración</h3>
        <div class="menu-box">
            <div class="menu-item">
                <div class="item-content">🛡️ Proveed Seg (Activo)</div>
            </div>
            <div class="menu-item" onclick="location.href='index.html'">
                <div class="item-content" style="color: #FF3B30;">🚪 Cerrar Sesión</div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="dashboard.html" class="tab-btn"><span>Explorar</span></a>
        <a href="#" class="tab-btn"><span>Tips</span></a>
        <a href="messenger.html" class="tab-btn"><span>Messenger</span></a>
        <a href="#" class="tab-btn"><span>Carrito</span></a>
        <a href="perfil.html" class="tab-btn active"><span>Mi Centro</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", 
            projectId: "proveed-8cb7c" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function updateBadges() {
            try {
                const q = query(collection(db, "pedidos"), where("estado", "==", "por_pagar"));
                const snap = await getDocs(q);
                document.getElementById('count-pagar').innerText = snap.size;
            } catch (e) {
                console.log("Firebase no configurado o vacío");
            }
        }

        updateBadges();
    </script>
</body>
</html>
