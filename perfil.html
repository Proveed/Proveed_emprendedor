<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Mi Centro de Negocios</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris: #F7F8F5; --rojo: #FF3B30; }
        body { background: var(--gris); font-family: 'DM Sans', sans-serif; padding-bottom: 110px; }

        /* CABECERA DE PERFIL */
        .profile-header { background: var(--lima); padding: 60px 20px 30px; border-radius: 0 0 30px 30px; text-align: center; }
        .user-avatar { width: 90px; height: 90px; border-radius: 30px; border: 4px solid white; object-fit: cover; background: #eee; margin-bottom: 12px; }
        .user-name { font-family: 'Syne'; font-size: 1.2rem; text-transform: uppercase; color: var(--negro); }
        .user-id { font-size: 0.7rem; color: rgba(0,0,0,0.5); font-weight: 700; margin-top: 4px; }

        /* TABLERO DE PEDIDOS (ESTILO ALIBABA) */
        .order-status-card { background: white; margin: -20px 20px 20px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .status-item { text-align: center; flex: 1; cursor: pointer; position: relative; }
        .status-item svg { width: 24px; height: 24px; color: #444; margin-bottom: 8px; }
        .status-label { font-size: 0.65rem; font-weight: 800; color: #777; }
        .badge { position: absolute; top: -5px; right: 15px; background: var(--rojo); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: 800; }

        /* SECCIONES DE GESTIÓN */
        .menu-section { padding: 0 20px; margin-bottom: 25px; }
        .section-title { font-family: 'Syne'; font-size: 0.75rem; text-transform: uppercase; color: #aaa; margin-bottom: 15px; padding-left: 5px; }
        
        .menu-list { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        .menu-link { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; font-weight: 600; color: var(--negro); text-decoration: none; }
        .menu-icon { font-size: 1.2rem; }

        /* BARRA NAVEGACIÓN */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; border-top: 1px solid #eee; padding-bottom: 25px; z-index: 100; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; text-decoration: none; }
        .tab-btn.active { color: var(--negro); }
        .tab-btn span { font-size: 0.55rem; font-weight: 800; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <img src="https://via.placeholder.com/150" class="user-avatar" alt="Avatar">
        <h1 class="user-name">Luis Alejandro</h1>
        <p class="user-id">ID: PRV-992026-EC</p>
    </div>

    <div class="order-status-card">
        <div class="status-item">
            <span class="badge" id="b-pagar">2</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            <div class="status-label">Por Pagar</div>
        </div>
        <div class="status-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 16h6M12 16h2M20 12h2M10 12h7M10 20h12"/><path d="M5 18H2v-3c0-1.1.9-2 2-2h1l3-4h6v11H5v-2z"/><circle cx="6.5" cy="17.5" r="2.5"/><circle cx="18.5" cy="17.5" r="2.5"/></svg>
            <div class="status-label">En Camino</div>
        </div>
        <div class="status-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10.01-3-3"/></svg>
            <div class="status-label">Recibido</div>
        </div>
    </div>

    <div class="menu-section">
        <h3 class="section-title">Logística y Envíos</h3>
        <div class="menu-list">
            <div class="menu-item">
                <div class="menu-link"><span class="menu-icon">📍</span> Mis Direcciones (Esmeraldas)</div>
                <span style="color:#ccc;">&rarr;</span>
            </div>
            <div class="menu-item">
                <div class="menu-link"><span class="menu-icon">📦</span> Rastreo de Guías SRI</div>
                <span style="color:#ccc;">&rarr;</span>
            </div>
        </div>
    </div>

    <div class="menu-section">
        <h3 class="section-title">Protección Proveed</h3>
        <div class="menu-list">
            <div class="menu-item">
                <div class="menu-link"><span class="menu-icon">🛡️</span> Proveed Seg (Anti-Fraude)</div>
                <span style="color:var(--verde-ok); font-size: 0.7rem; font-weight: 800;">ACTIVO</span>
            </div>
            <div class="menu-item">
                <div class="menu-link"><span class="menu-icon">⚙️</span> Configuración de Cuenta</div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="dashboard.html" class="tab-btn"><span>Explorar</span></a>
        <a href="#" class="tab-btn"><span>Tips</span></a>
        <a href="messenger.html" class="tab-btn"><span>Messenger</span></a>
        <a href="#" class="tab-btn"><span>Carrito</span></a>
        <a href="perfil.html" class="tab-btn active"><span>Mi Centro</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica para contar pedidos por pagar dinámicamente
        async function checkOrders() {
            const q = query(collection(db, "pedidos"), where("estado", "==", "por_pagar"));
            const snap = await getDocs(q);
            document.getElementById('b-pagar').innerText = snap.size;
        }

        checkOrders();
    </script>
</body>
</html>
