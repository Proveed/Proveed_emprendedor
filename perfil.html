<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mi Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 24px; }
  .header-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .header-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-editar{ background:rgba(255,255,255,0.08); color:white; border:none; padding:8px 14px; border-radius:10px; font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; }
  .perfil-hero{ display:flex; align-items:center; gap:14px; }
  .perfil-avatar{ width:64px; height:64px; border-radius:20px; background:var(--verde); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:800; color:var(--negro); flex-shrink:0; }
  .perfil-info{ flex:1; }
  .perfil-nombre{ font-size:1.2rem; font-weight:800; color:white; }
  .perfil-email{ font-size:0.78rem; color:#555; margin-top:2px; }
  .perfil-ciudad{ font-size:0.76rem; color:#666; margin-top:4px; display:flex; align-items:center; gap:4px; }
  .perfil-ciudad svg{ width:12px; height:12px; stroke:#666; fill:none; stroke-width:2; }
  .stats-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px; }
  .stat-card{ background:white; border-radius:16px; padding:14px 10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .stat-val{ font-size:1.3rem; font-weight:800; color:var(--negro); }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-lbl{ font-size:0.6rem; color:#bbb; font-weight:600; margin-top:3px; }
  .section-card{ margin:0 16px 12px; background:white; border-radius:18px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .section-title{ font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:1px; padding:14px 16px 8px; }
  .menu-item{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #f8f8f8; cursor:pointer; transition:0.15s; }
  .menu-item:last-child{ border-bottom:none; }
  .menu-item:active{ background:#f8f8f8; }
  .menu-icon{ width:36px; height:36px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .menu-icon svg{ width:18px; height:18px; fill:none; stroke-width:2; }
  .menu-label{ flex:1; font-size:0.88rem; font-weight:600; color:var(--negro); }
  .menu-arrow{ width:16px; height:16px; stroke:#ddd; fill:none; stroke-width:2.5; }
  .menu-item.danger .menu-label{ color:var(--rojo); }
  .menu-item.danger .menu-icon{ background:rgba(255,77,77,0.08); }
  .menu-item.danger .menu-icon svg{ stroke:var(--rojo); }
  .edit-modal{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:flex-end; z-index:500; }
  .edit-modal.show{ display:flex; }
  .edit-sheet{ background:white; width:100%; border-radius:24px 24px 0 0; padding:24px 20px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); max-height:85vh; overflow-y:auto; }
  .edit-modal.show .edit-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#e0e0e0; border-radius:4px; margin:0 auto 20px; }
  .edit-title{ font-size:1rem; font-weight:700; color:var(--negro); margin-bottom:18px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input{ width:100%; padding:12px 14px; background:var(--gris); border:1.5px solid #eee; border-radius:12px; font-family:'Inter',sans-serif; font-size:0.9rem; color:var(--negro); outline:none; -webkit-appearance:none; }
  .field input:focus{ border-color:var(--verde); }
  .btn-guardar{ width:100%; padding:14px; background:var(--negro); color:white; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
  .tab-dot{ width:4px; height:4px; background:var(--verde); border-radius:50%; display:none; }
  .tab.active .tab-dot{ display:block; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="header-title">Mi Perfil</div>
    <button class="btn-editar" onclick="abrirEdit()">Editar</button>
  </div>
  <div class="perfil-hero">
    <div class="perfil-avatar" id="p-avatar">U</div>
    <div class="perfil-info">
      <div class="perfil-nombre" id="p-nombre">Cargando...</div>
      <div class="perfil-email" id="p-email">—</div>
      <div class="perfil-ciudad"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span id="p-ciudad">—</span></div>
    </div>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card"><div class="stat-val" id="st-pedidos">—</div><div class="stat-lbl">Pedidos</div></div>
  <div class="stat-card"><div class="stat-val naranja" id="st-gastado">—</div><div class="stat-lbl">Gastado</div></div>
  <div class="stat-card"><div class="stat-val" id="st-chats">—</div><div class="stat-lbl">Chats</div></div>
</div>

<div class="section-card">
  <div class="section-title">Mi cuenta</div>
  <div class="menu-item" onclick="window.location.href='pedidos.html'"><div class="menu-icon" style="background:rgba(17,17,17,0.05)"><svg style="stroke:var(--negro)" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div><div class="menu-label">Mis pedidos</div><svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  <div class="menu-item" onclick="window.location.href='chat.html'"><div class="menu-icon" style="background:rgba(168,230,61,0.1)"><svg style="stroke:var(--verde)" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="menu-label">Mis chats</div><svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>

<div class="section-card">
  <div class="menu-item danger" onclick="cerrarSesion()"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div><div class="menu-label">Cerrar sesión</div></div>
</div>

<div class="edit-modal" id="edit-modal" onclick="cerrarEdit(event)">
  <div class="edit-sheet">
    <div class="drag"></div>
    <div class="edit-title">Editar perfil</div>
    <div class="field"><label>Nombre completo</label><input type="text" id="e-nombre"></div>
    <div class="field"><label>Ciudad</label><input type="text" id="e-ciudad"></div>
    <div class="field"><label>Cédula</label><input type="text" id="e-cedula"></div>
    <button class="btn-guardar" onclick="guardarPerfil()">GUARDAR CAMBIOS</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span><div class="tab-dot"></div></a>
  <a class="tab" href="explorar.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span><div class="tab-dot"></div></a>
  <a class="tab" href="tips.html"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><span>Tips</span><div class="tab-dot"></div></a>
  <a class="tab" href="carrito.html"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span><div class="tab-dot"></div></a>
  <a class="tab active" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span><div class="tab-dot"></div></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', userData={};

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  const { data:u } = await sb.from('usuarios').select('*').eq('id',userId).single();
  if(u){
    userData=u;
    document.getElementById('p-avatar').textContent=(u.nombre||'U')[0].toUpperCase();
    document.getElementById('p-nombre').textContent=u.nombre||'Sin nombre';
    document.getElementById('p-email').textContent=session.user.email||'—';
    document.getElementById('p-ciudad').textContent=u.ciudad||'—';
    document.getElementById('e-nombre').value=u.nombre||'';
    document.getElementById('e-ciudad').value=u.ciudad||'';
    document.getElementById('e-cedula').value=u.cedula||'';
  }
  const { data:pedidos } = await sb.from('pedidos').select('total').eq('emprendedor_id',userId);
  const { data:chats } = await sb.from('chats').select('id').eq('emprendedor_id',userId);
  document.getElementById('st-pedidos').textContent=(pedidos||[]).length;
  document.getElementById('st-gastado').textContent='$'+((pedidos||[]).reduce((s,p)=>s+(p.total||0),0)).toFixed(0);
  document.getElementById('st-chats').textContent=(chats||[]).length;
})();

window.abrirEdit=()=>document.getElementById('edit-modal').classList.add('show');
window.cerrarEdit=e=>{ if(e.target===document.getElementById('edit-modal')) document.getElementById('edit-modal').classList.remove('show'); };

window.guardarPerfil=async function(){
  const nombre=document.getElementById('e-nombre').value.trim();
  const ciudad=document.getElementById('e-ciudad').value.trim();
  const cedula=document.getElementById('e-cedula').value.trim();
  await sb.from('usuarios').update({nombre,ciudad,cedula}).eq('id',userId);
  document.getElementById('p-nombre').textContent=nombre;
  document.getElementById('p-avatar').textContent=(nombre||'U')[0].toUpperCase();
  document.getElementById('p-ciudad').textContent=ciudad;
  document.getElementById('edit-modal').classList.remove('show');
};

window.cerrarSesion=async function(){
  await sb.auth.signOut();
  window.location.href='login.html';
};
</script>
</body>
</html>
