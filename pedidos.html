<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mis Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .header-title{ font-size:1.1rem; font-weight:700; color:white; }
  .tabs-row{ display:flex; gap:8px; padding:14px 16px; overflow-x:auto; scrollbar-width:none; }
  .tabs-row::-webkit-scrollbar{ display:none; }
  .vtab{ padding:8px 16px; border-radius:20px; border:1.5px solid #eee; background:white; font-size:0.76rem; font-weight:600; color:#aaa; cursor:pointer; white-space:nowrap; }
  .vtab.active{ background:var(--negro); color:white; border-color:var(--negro); }
  .pedidos-lista{ padding:0 16px; }
  .pedido-card{ background:white; border-radius:18px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .ped-header{ padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #f8f8f8; }
  .ped-num{ font-size:0.88rem; font-weight:800; color:var(--negro); }
  .ped-fecha{ font-size:0.7rem; color:#bbb; margin-top:1px; }
  .est-badge{ font-size:0.65rem; font-weight:700; padding:4px 10px; border-radius:20px; }
  .est-pendiente{ background:rgba(0,122,255,0.1); color:var(--azul); }
  .est-proceso{ background:rgba(255,140,0,0.1); color:var(--naranja); }
  .est-completado{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .ped-timeline{ padding:14px 16px; display:flex; gap:0; }
  .tl-step{ flex:1; display:flex; flex-direction:column; align-items:center; position:relative; }
  .tl-step::before{ content:''; position:absolute; top:12px; left:50%; right:-50%; height:2px; background:#f0f0f0; z-index:0; }
  .tl-step:last-child::before{ display:none; }
  .tl-dot{ width:24px; height:24px; border-radius:50%; border:2px solid #eee; background:white; display:flex; align-items:center; justify-content:center; z-index:1; position:relative; margin-bottom:5px; }
  .tl-dot.done{ border-color:var(--verde); background:var(--verde); }
  .tl-dot.done svg{ width:10px; height:10px; stroke:var(--negro); fill:none; stroke-width:3; }
  .tl-dot.active{ border-color:var(--naranja); background:var(--naranja); }
  .tl-dot.active::after{ content:''; width:6px; height:6px; border-radius:50%; background:white; }
  .tl-label{ font-size:0.6rem; color:#bbb; text-align:center; font-weight:600; }
  .tl-label.done{ color:var(--negro); }
  .ped-items{ padding:0 16px 12px; }
  .ped-item-row{ display:flex; justify-content:space-between; font-size:0.8rem; padding:4px 0; color:#aaa; }
  .ped-item-row:first-child{ color:#555; font-weight:600; }
  .ped-footer{ padding:12px 16px; border-top:1px solid #f8f8f8; display:flex; justify-content:space-between; align-items:center; }
  .ped-total{ font-size:1rem; font-weight:800; color:var(--naranja); }
  .btn-repetir{ background:var(--gris); color:var(--negro); border:none; padding:8px 16px; border-radius:10px; font-family:'Inter',sans-serif; font-size:0.76rem; font-weight:700; cursor:pointer; }
  .empty{ text-align:center; padding:60px 20px; color:#bbb; }
  .empty svg{ width:52px; height:52px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty p{ font-size:0.85rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
  .tab-dot{ width:4px; height:4px; background:var(--verde); border-radius:50%; display:none; }
  .tab.active .tab-dot{ display:block; }
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <div class="header-title">Mis Pedidos</div>
</div>
<div class="tabs-row">
  <div class="vtab active" onclick="filtrar('todos',this)">Todos</div>
  <div class="vtab" onclick="filtrar('pendiente',this)">Pendientes</div>
  <div class="vtab" onclick="filtrar('proceso',this)">En proceso</div>
  <div class="vtab" onclick="filtrar('completado',this)">Completados</div>
</div>
<div class="pedidos-lista" id="pedidos-lista"><div class="empty"><p>Cargando pedidos...</p></div></div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span><div class="tab-dot"></div></a>
  <a class="tab" href="explorar.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span><div class="tab-dot"></div></a>
  <a class="tab" href="tips.html"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><span>Tips</span><div class="tab-dot"></div></a>
  <a class="tab" href="carrito.html"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span><div class="tab-dot"></div></a>
  <a class="tab active" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><span>Pedidos</span><div class="tab-dot"></div></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let todosPedidos=[], filtroActual='todos', userId='';

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  const { data } = await sb.from('pedidos').select('*').eq('emprendedor_id',userId).order('created_at',{ascending:false});
  todosPedidos=data||[];
  renderPedidos();
})();

function renderPedidos(){
  let lista=[...todosPedidos];
  if(filtroActual!=='todos') lista=lista.filter(p=>p.estado===filtroActual);
  const cont=document.getElementById('pedidos-lista');
  if(!lista.length){ cont.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><p>Sin pedidos en este estado</p></div>'; return; }
  cont.innerHTML='';
  lista.forEach(p=>{
    const div=document.createElement('div'); div.className='pedido-card';
    const est=p.estado||'pendiente';
    const fecha=new Date(p.created_at).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});
    const steps=['pendiente','proceso','completado'];
    const stepIdx=steps.indexOf(est);
    const tl=steps.map((s,i)=>`<div class="tl-step"><div class="tl-dot ${i<stepIdx?'done':i===stepIdx?'active':''}">${i<stepIdx?`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div><div class="tl-label ${i<=stepIdx?'done':''}">${s==='pendiente'?'Pendiente':s==='proceso'?'En proceso':'Entregado'}</div></div>`).join('');
    const items=(p.items||[]).slice(0,3);
    div.innerHTML=`<div class="ped-header"><div><div class="ped-num">#PV-${p.id.slice(-6).toUpperCase()}</div><div class="ped-fecha">${fecha}</div></div><span class="est-badge est-${est}">${est}</span></div><div class="ped-timeline">${tl}</div><div class="ped-items">${items.map(i=>`<div class="ped-item-row"><span>${i.nombre} ×${i.cantidad}</span><span>$${(i.precio*i.cantidad).toFixed(2)}</span></div>`).join('')}${p.items?.length>3?`<div class="ped-item-row"><span style="color:#bbb">+${p.items.length-3} productos más</span></div>`:''}</div><div class="ped-footer"><div class="ped-total">$${Number(p.total||0).toFixed(2)}</div><button class="btn-repetir" onclick="repetirPedido('${p.id}')">↺ Repetir pedido</button></div>`;
    cont.appendChild(div);
  });
}

window.filtrar=function(f,el){ filtroActual=f; document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderPedidos(); };

window.repetirPedido=function(id){
  const p=todosPedidos.find(p=>p.id===id);
  if(!p||!p.items?.length) return;
  const carrito=JSON.parse(localStorage.getItem('carrito_proveed')||'[]');
  p.items.forEach(i=>{ const idx=carrito.findIndex(c=>c.id===i.id); if(idx>=0) carrito[idx].cantidad+=i.cantidad; else carrito.push({...i}); });
  localStorage.setItem('carrito_proveed',JSON.stringify(carrito));
  window.location.href='carrito.html';
};
</script>
</body>
</html>
