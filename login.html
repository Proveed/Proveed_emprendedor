<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#111111; --blanco:#FFFFFF; --gris:#F5F6F2; --error:#FF4D4D; }
  html,body{ height:100%; }
  body{
    background:var(--gris);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
    -webkit-font-smoothing:antialiased;
  }

  /* HEADER LOGO */
  .top-logo{ display:flex; align-items:center; gap:10px; margin-bottom:24px; }
  .top-logo svg{ width:36px; height:36px; }
  .top-logo-text{ font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:900; color:var(--negro); letter-spacing:-0.5px; }
  .top-logo-text span{ color:var(--verde); }
  .top-logo-sub{ font-size:0.58rem; color:#aaa; text-transform:uppercase; letter-spacing:1.5px; display:block; margin-top:-2px; }

  /* CARD */
  .card{
    width:100%;
    max-width:420px;
    background:var(--blanco);
    border-radius:24px;
    padding:28px 24px;
    box-shadow:0 4px 24px rgba(0,0,0,0.08);
  }
  .card-title{ font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:var(--negro); margin-bottom:4px; }
  .card-sub{ font-size:0.85rem; color:#aaa; margin-bottom:22px; }

  /* TABS */
  .tabs{ display:flex; background:var(--gris); border-radius:14px; padding:4px; gap:4px; margin-bottom:22px; }
  .tab{ flex:1; padding:10px; border-radius:11px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:600; transition:0.25s; background:transparent; color:#aaa; }
  .tab.active{ background:var(--verde); color:var(--negro); font-weight:700; }

  /* FIELDS */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input{
    width:100%; padding:13px 15px;
    background:var(--gris); border:1.5px solid #eee;
    border-radius:13px; color:var(--negro);
    font-family:'DM Sans',sans-serif; font-size:0.95rem;
    outline:none; transition:0.2s;
  }
  .field input:focus{ border-color:var(--verde); background:white; }

  /* BTN */
  .btn-main{
    width:100%; padding:15px; border:none; border-radius:14px;
    background:var(--negro); color:white;
    font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800;
    cursor:pointer; transition:0.2s; margin-top:6px;
  }
  .btn-main:active{ transform:scale(0.98); }
  .btn-main:disabled{ opacity:0.5; }

  /* ERROR */
  .msg-error{ display:none; background:rgba(255,77,77,0.08); border:1px solid rgba(255,77,77,0.25); border-radius:12px; padding:11px 14px; font-size:0.82rem; color:var(--error); margin-bottom:14px; }
  .msg-error.visible{ display:block; }
  .msg-success{ color: #22C55E; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); }

  .switch-portal{ text-align:center; margin-top:20px; font-size:0.8rem; color:#aaa; }
  .switch-portal a{ color:var(--naranja); font-weight:700; text-decoration:none; }
</style>
</head>
<body>

<div class="top-logo">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#A8E63D"/><stop offset="100%" style="stop-color:#7BC820"/></linearGradient></defs>
    <path d="M50 4 L93 28 V72 L50 96 L7 72 V28 Z" fill="url(#g1)"/>
    <path d="M30 52 L44 66 L70 36" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <div>
    <div class="top-logo-text">PRO<span>VEED</span></div>
    <span class="top-logo-sub">Portal Emprendedor</span>
  </div>
</div>

<div class="card">
  <div class="card-title" id="title-text">Bienvenido</div>
  <div class="card-sub" id="sub-text">Accede a miles de proveedores mayoristas</div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
    <button class="tab" id="tab-reg" onclick="switchTab('reg')">Crear cuenta</button>
  </div>

  <div id="msg-box" class="msg-error"></div>

  <div id="form-login">
    <div class="field"><label>Correo electrónico</label><input type="email" id="l-email" placeholder="tucorreo@ejemplo.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••"></div>
    <button class="btn-main" id="btn-login" onclick="doLogin()">ENTRAR →</button>
  </div>

  <div id="form-reg" style="display:none;">
    <div class="field"><label>Nombre Completo</label><input type="text" id="r-nombre" placeholder="Juan Torres"></div>
    <div class="field"><label>Correo electrónico</label><input type="email" id="r-email" placeholder="tucorreo@ejemplo.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="r-pass" placeholder="Mínimo 6 caracteres"></div>
    <button class="btn-main" id="btn-reg" onclick="doRegistro()">CREAR CUENTA →</button>
  </div>
</div>

<div class="switch-portal">¿Eres proveedor? <a href="https://proveed-proveedor.vercel.app">Entra aquí →</a></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// Configuración de Supabase (Proveed Intelligence)
const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

window.switchTab = (tab) => {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-reg').classList.toggle('active', tab === 'reg');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-reg').style.display = tab === 'reg' ? 'block' : 'none';
  document.getElementById('title-text').textContent = tab === 'login' ? 'Bienvenido' : 'Únete a Proveed';
  document.getElementById('msg-box').classList.remove('visible');
};

function showMsg(msg, isError = true) {
  const box = document.getElementById('msg-box');
  box.textContent = msg;
  box.className = isError ? 'msg-error visible' : 'msg-error visible msg-success';
}

window.doLogin = async () => {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  const btn = document.getElementById('btn-login');

  if(!email || !password) return showMsg('Completa todos los campos');
  
  btn.disabled = true;
  btn.textContent = 'AUTENTICANDO...';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    showMsg(error.message);
    btn.disabled = false;
    btn.textContent = 'ENTRAR →';
  } else {
    // Verificar rol en tabla perfiles
    const { data: perfil } = await supabase.from('usuarios').select('rol').eq('id', data.user.id).single();
    
    if (perfil && perfil.rol === 'proveedor') {
      await supabase.auth.signOut();
      showMsg('Esta cuenta es de Proveedor. Usa el portal correspondiente.');
      btn.disabled = false;
      btn.textContent = 'ENTRAR →';
    } else {
      window.location.href = 'dashboard.html';
    }
  }
};

window.doRegistro = async () => {
  const nombre = document.getElementById('r-nombre').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  const btn = document.getElementById('btn-reg');

  if(!nombre || !email || !password) return showMsg('Completa todos los campos');
  if(password.length < 6) return showMsg('La contraseña es muy corta');

  btn.disabled = true;
  btn.textContent = 'CREANDO CUENTA...';

  const { data, error } = await supabase.auth.signUp({ 
    email, 
    password,
    options: { data: { nombre: nombre } }
  });

  if (error) {
    showMsg(error.message);
    btn.disabled = false;
    btn.textContent = 'CREAR CUENTA →';
  } else {
    // Insertar en tabla de usuarios personalizados
    await supabase.from('usuarios').insert([{
      id: data.user.id,
      nombre: nombre,
      email: email,
      rol: 'emprendedor',
      activo: true
    }]);
    
    showMsg('¡Cuenta creada! Revisa tu correo o inicia sesión.', false);
    btn.textContent = 'CUENTA LISTA';
  }
};

// Enter key support
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    if(document.getElementById('form-login').style.display !== 'none') window.doLogin();
    else window.doRegistro();
  }
});
</script>
</body>
</html>
