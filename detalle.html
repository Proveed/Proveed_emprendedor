<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED — Detalle de Producto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .back-btn {
            position: absolute; top: 50px; left: 20px; z-index: 100;
            background: white; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: none;
        }
        .main-img { width: 100%; height: 60vh; object-fit: cover; background: #f9f9f9; }
        .info-container { 
            background: white; margin-top: -30px; border-radius: 30px 30px 0 0;
            padding: 30px 20px 120px; position: relative; min-height: 40vh;
        }
        .price-big { font-family: 'Syne'; font-size: 2.2rem; color: var(--negro); letter-spacing: -1px; }
        .moq-info { background: #fff8e1; color: #b78103; padding: 10px 15px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; margin: 15px 0; display: inline-block; }
        .action-bar {
            position: fixed; bottom: 0; width: 100%; background: white;
            padding: 20px; border-top: 1px solid #eee; display: flex; gap: 12px; z-index: 200;
        }
    </style>
</head>
<body>

    <button class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <img id="p-img" class="main-img" src="" alt="Cargando...">

    <div class="info-container">
        <h2 id="p-name" style="font-size: 1.4rem; margin-bottom: 10px; line-height: 1.2;">Cargando...</h2>
        <div id="p-price" class="price-big">$0.00</div>
        
        <div class="moq-info">📦 Cantidad Mínima: <span id="p-moq">12</span> unidades</div>
        
        <p style="color: #666; font-size: 0.9rem; line-height: 1.6; margin-top: 20px;">
            Este producto está disponible para importación directa a Ecuador. Tiempo estimado de entrega: 15-20 días laborables. Garantía PROVEED Seg incluida.
        </p>
    </div>

    <div class="action-bar">
        <button class="btn-lima" style="flex: 1; padding: 15px;" onclick="addCart()">Añadir</button>
        <button id="btn-cotizar" class="btn-secondary" style="flex: 2; padding: 15px; background: var(--naranja);">Cotizar con Ulises</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Obtener ID de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProduct() {
            if (!productId) return;
            const docRef = doc(db, "productos", productId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const p = docSnap.data();
                document.getElementById('p-img').src = p.imagen;
                document.getElementById('p-name').innerText = p.nombre;
                document.getElementById('p-price').innerText = `$${p.precio}`;
                document.getElementById('p-moq').innerText = p.cantidadMinima || '12';

                // Configurar botón naranja para WhatsApp o Messenger
                document.getElementById('btn-cotizar').onclick = () => {
                    window.open(`https://wa.me/593987654321?text=Hola Ulises, me interesa el producto: ${p.nombre}`, '_blank');
                };
            }
        }

        window.addCart = () => {
            alert("¡Añadido al carrito!");
        };

        loadProduct();
    </script>
</body>
</html>
