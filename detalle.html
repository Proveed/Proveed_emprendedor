<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle del Negocio — PROVEED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: white; padding-bottom: 120px; margin: 0; }
        .product-hero { width: 100%; aspect-ratio: 1/1; background: #f9f9f9; position: relative; }
        .product-hero img { width: 100%; height: 100%; object-fit: cover; }
        .back-btn { 
            position: absolute; top: 20px; left: 20px; 
            background: white; border-radius: 12px; width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 10;
        }
        .details-container { padding: 25px 20px; }
        .price-main { font-family: 'Syne'; font-size: 2.2rem; color: #1A1A1A; margin: 0; letter-spacing: 0.5px; }
        .product-name { font-size: 1.1rem; color: #555; font-weight: 400; margin: 10px 0 20px; line-height: 1.4; }
        .vendor-card { 
            display: flex; align-items: center; gap: 12px; padding: 15px; 
            background: #F8F9FA; border-radius: 15px; border: 1px solid #eee;
        }
        .vendor-avatar { 
            width: 45px; height: 45px; border-radius: 12px; 
            background: #000; color: white; display: flex; 
            align-items: center; justify-content: center; font-weight: 800; 
        }
        .action-bar {
            position: fixed; bottom: 0; width: 100%; background: white;
            padding: 15px 20px 35px; border-top: 1px solid #eee;
            display: flex; gap: 12px; z-index: 1000;
        }
        .btn-outline { 
            flex: 1; border: 1.8px solid #1A1A1A; background: white; 
            border-radius: 14px; font-weight: 700; height: 55px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-filled { 
            flex: 2; background: #1A1A1A; color: white; border: none; 
            border-radius: 14px; font-weight: 700; height: 55px; font-size: 0.95rem;
        }
        .icon-pro { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div class="product-hero">
        <a href="dashboard.html" class="back-btn">
            <svg class="icon-pro" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
        <img id="p-imagen" src="https://via.placeholder.com/800" alt="Cargando...">
    </div>

    <div class="details-container">
        <div style="background: #E8F5E9; color: #2E7D32; font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; font-weight: 800; display: inline-block; margin-bottom: 12px; text-transform: uppercase;">
            Mínimo Sugerido: <span id="p-moq">12</span> UDS
        </div>
        
        <h1 class="price-main" id="p-precio">$0.00</h1>
        <h2 class="product-name" id="p-nombre">Cargando detalles del producto...</h2>

        <div class="banner-seg" style="margin: 20px 0;">
            <svg class="icon-pro" style="color:#856404; width:22px;" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <p><b>PROVEED SEG:</b> Pago 100% protegido hasta recibir en tu ciudad.</p>
        </div>

        <div class="vendor-card">
            <div class="vendor-avatar" id="v-avatar">P</div>
            <div style="flex:1;">
                <p style="font-size: 0.9rem; font-weight: 800; margin: 0;" id="v-nombre">Proveedor de Ecuador</p>
                <p style="font-size: 0.7rem; color: #32D74B; margin: 0; font-weight: 700;">● Proveedor Verificado</p>
            </div>
        </div>
    </div>

    <footer class="action-bar">
        <button class="btn-outline" onclick="location.href='messenger.html'">
            <svg class="icon-pro" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"></path></svg>
            Negociar
        </button>
        <button class="btn-filled" id="btn-compra">
            Añadir al Pedido
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pData = {}; // Guardamos los datos para las métricas del dueño

        async function load() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) return;

            const docSnap = await getDoc(doc(db, "productos", id));
            if (docSnap.exists()) {
                pData = docSnap.data();
                document.getElementById('p-nombre').innerText = pData.nombre;
                document.getElementById('p-precio').innerText = `$${pData.precio}`;
                document.getElementById('p-imagen').src = pData.imagen;
                document.getElementById('p-moq').innerText = pData.moq || "12";
                document.getElementById('v-nombre').innerText = pData.proveedor || "Global Smart";
                document.getElementById('v-avatar').innerText = (pData.proveedor || "G").charAt(0);
            }
        }

        // FUNCIÓN CLAVE PARA EL DUEÑO: Registra la estadística real
        async function comprar() {
            const btn = document.getElementById('btn-compra');
            btn.innerText = "REGISTRANDO...";
            btn.disabled = true;

            try {
                // Enviamos los datos que pidió Luis Alejandro
                await addDoc(collection(db, "metricas"), {
                    tipo: "click_en_compra",
                    categoria: pData.categoria || "General",
                    precio: parseFloat(pData.precio) || 0,
                    ciudad: "Esmeraldas", // Nota: Esto se volverá dinámico con el Login
                    nombreProducto: pData.nombre,
                    timestamp: serverTimestamp() // Para saber las HORAS PICO
                });

                alert("¡Pedido registrado! Revisa la pestaña de Pedidos.");
                btn.innerText = "¡Añadido!";
            } catch (e) {
                alert("Error de conexión");
                btn.disabled = false;
                btn.innerText = "Añadir al Pedido";
            }
        }

        document.getElementById('btn-compra').onclick = comprar;
        load();
    </script>
</body>
</html>
