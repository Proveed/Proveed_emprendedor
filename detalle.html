<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle Real — PROVEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #32D74B; --negro: #000; --fondo: #ffffff; }
        body { background: var(--fondo); margin: 0; font-family: 'DM Sans', sans-serif; color: var(--negro); display: none; /* Oculto hasta que cargue BD */ }
        
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; position: sticky; top: 0; background: white; z-index: 10; }
        .back-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 15px 0 0; }

        .product-visual { width: 100%; height: 350px; background: #fdfdfd; display: flex; align-items: center; justify-content: center; }
        .product-visual img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .main-content { padding: 25px 20px; }
        .tag-status { background: #e8fdf0; color: #15803d; font-size: 0.7rem; font-weight: 800; padding: 5px 10px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }
        .price { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .product-title { font-family: 'Syne'; font-size: 1.2rem; margin: 10px 0 25px; text-transform: uppercase; }

        /* RECUADRO DEL PROVEEDOR - SIN DATOS FALSOS */
        .provider-card { border: 2px solid #f0f0f0; border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px; }
        .avatar-real { width: 50px; height: 50px; background: var(--negro); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne'; font-size: 1.2rem; }
        .provider-info h4 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .provider-info p { margin: 3px 0 0; font-size: 0.7rem; color: var(--verde); font-weight: 700; text-transform: uppercase; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 20px; display: flex; gap: 10px; box-sizing: border-box; }
        .btn-main { flex: 2; background: var(--negro); color: white; border: none; padding: 18px; border-radius: 15px; font-family: 'Syne'; font-weight: 700; cursor: pointer; }
        .btn-chat { flex: 1; background: #f0f0f0; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="location.href='dashboard.html'">←</button>
        <div style="font-family: 'Syne'; font-size: 0.8rem; font-weight: 800;">VERIFICACIÓN TÉCNICA</div>
    </header>

    <div class="product-visual">
        <img id="db-image" src="" alt="">
    </div>

    <div class="main-content">
        <div id="db-minimo" class="tag-status">VERIFICANDO STOCK...</div>
        <h1 id="db-precio" class="price">$0.00</h1>
        <h2 id="db-titulo" class="product-title">CARGANDO PRODUCTO...</h2>

        <div class="provider-card">
            <div id="db-avatar" class="avatar-real">?</div>
            <div class="provider-info">
                <h4 id="db-nombre-proveedor">BUSCANDO EN BASE DE DATOS...</h4>
                <p>● PROVEEDOR REGISTRADO</p>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <button class="btn-chat" onclick="abrirChat()">CHAT</button>
        <button class="btn-main">ORDENAR AHORA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. OBTENER IDENTIFICADORES REALES
        const productID = localStorage.getItem('lastSelectedProdID');
        const provEmail = localStorage.getItem('currentProveedor'); // Este viene del Dashboard

        async function conectarBaseDeDatos() {
            if (!productID) {
                alert("Error: No se seleccionó un producto válido.");
                location.href = 'dashboard.html';
                return;
            }

            try {
                // 2. CONSULTA REAL AL PRODUCTO
                const docRef = doc(db, "productos", productID);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const p = docSnap.data();
                    
                    // 3. INYECTAR DATOS DE FIREBASE
                    document.getElementById('db-image').src = p.imagen || p.imageUrl;
                    document.getElementById('db-precio').innerText = `$${p.precio}`;
                    document.getElementById('db-titulo').innerText = p.titulo || p.nombre;
                    document.getElementById('db-minimo').innerText = `MÍNIMO: ${p.minimo || 1} UNIDADES`;

                    // 4. BUSCAR EL NOMBRE DEL PROVEEDOR (SIN FANTASÍAS)
                    // Buscamos en la colección usuarios usando el email asociado al producto
                    const userRef = doc(db, "usuarios", provEmail); 
                    // Nota: Si usas el email como ID de documento, esto funcionará. 
                    // Si no, el Dashboard ya debería habernos pasado el nombre real.
                    
                    const nombreReal = localStorage.getItem('currentProveedorNombre');
                    
                    if (nombreReal && nombreReal !== "Global Smart") {
                        document.getElementById('db-nombre-proveedor').innerText = nombreReal;
                        document.getElementById('db-avatar').innerText = nombreReal.charAt(0).toUpperCase();
                    } else {
                        document.getElementById('db-nombre-proveedor').innerText = "PROVEEDOR NO IDENTIFICADO";
                    }

                    // MOSTRAR PÁGINA SOLO CUANDO TODO ES REAL
                    document.body.style.display = 'block';

                } else {
                    alert("El producto no existe en la base de datos real.");
                    location.href = 'dashboard.html';
                }
            } catch (e) {
                console.error("Error crítico:", e);
                location.href = 'dashboard.html';
            }
        }

        window.abrirChat = () => {
            location.href = "messenger.html";
        };

        conectarBaseDeDatos();
    </script>
</body>
</html>
