<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle — PROVEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #32D74B; --negro: #000; --gris: #f8f8f8; }
        body { background: #fff; margin: 0; font-family: 'DM Sans', sans-serif; padding-bottom: 120px; }
        
        /* HEADER FIJO */
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; position: sticky; top: 0; background: white; z-index: 100; }
        .back-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding-right: 15px; }

        /* GALERÍA DE PRODUCTO */
        .product-gallery { width: 100%; height: 380px; background: var(--gris); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #p-img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .container { padding: 25px 20px; }
        .price-line { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; }
        .title { font-family: 'Syne'; font-size: 1.4rem; text-transform: uppercase; margin: 10px 0 25px; line-height: 1.1; }

        /* INTERACCIÓN: CANTIDAD */
        .section-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #888; margin-bottom: 12px; display: block; }
        .selector { display: flex; align-items: center; gap: 20px; background: var(--gris); padding: 12px 20px; border-radius: 15px; width: fit-content; margin-bottom: 30px; }
        .qty-btn { background: none; border: none; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: var(--negro); }
        #qty-val { font-size: 1.3rem; font-weight: 800; min-width: 30px; text-align: center; }

        /* INFO DEL PROVEEDOR */
        .prov-card { border: 1.5px solid #eee; border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .prov-avatar { width: 50px; height: 50px; background: var(--negro); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne'; font-size: 1.2rem; }
        .prov-name { font-size: 0.95rem; font-weight: 700; margin: 0; text-transform: uppercase; }
        .prov-status { font-size: 0.7rem; color: var(--verde); font-weight: 800; display: block; margin-top: 2px; }

        /* FOOTER CON CHAT Y ACCIÓN */
        .footer-actions { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 12px; box-sizing: border-box; z-index: 1000; }
        .btn-chat { background: #f0f0f0; border: none; border-radius: 18px; font-weight: 700; cursor: pointer; height: 60px; font-size: 0.8rem; }
        .btn-order { background: var(--negro); color: white; border: none; border-radius: 18px; font-family: 'Syne'; font-weight: 700; cursor: pointer; height: 60px; text-transform: uppercase; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="location.href='dashboard.html'">←</button>
        <div style="font-family: 'Syne'; font-size: 0.85rem; font-weight: 800; letter-spacing: 1px;">DATOS DEL PRODUCTO</div>
    </header>

    <div class="product-gallery">
        <img id="p-img" src="" alt="">
    </div>

    <div class="container">
        <div class="price-line">
            <span id="p-price" class="price">$0.00</span>
            <span id="p-min-tag" style="background: #e8fdf0; color: #15803d; font-size: 0.65rem; padding: 5px 10px; border-radius: 6px; font-weight: 800;">MIN. 1</span>
        </div>
        <h1 id="p-title" class="title">...</h1>

        <span class="section-label">Cantidad a Pedir</span>
        <div class="selector">
            <button class="qty-btn" onclick="updateQty(-1)">-</button>
            <span id="qty-val">1</span>
            <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>

        <span class="section-label">Proveedor Responsable</span>
        <div class="prov-card">
            <div id="p-avatar" class="prov-avatar">?</div>
            <div class="p-info">
                <h4 id="p-prov-name" class="prov-name">...</h4>
                <span class="prov-status">● VERIFICADO POR PROVEED</span>
            </div>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-chat" onclick="location.href='messenger.html'">CHAT</button>
        <button class="btn-order" onclick="addToCart()">AÑADIR AL PEDIDO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LEER LOS DATOS DEL NAVEGADOR (Pase de posta del Dashboard)
        const productID = localStorage.getItem('lastSelectedProdID');
        const provNombre = localStorage.getItem('currentProveedorNombre');
        let minUnits = 1;
        let currentQty = 1;

        async function loadProductData() {
            if (!productID) return location.href = 'dashboard.html';

            try {
                const snap = await getDoc(doc(db, "productos", productID));
                if (snap.exists()) {
                    const data = snap.data();
                    
                    // CARGA DE DATOS REALES DE FIREBASE
                    document.getElementById('p-img').src = data.imagenUrl || data.imagen || "";
                    document.getElementById('p-price').innerText = `$${data.precio || 0}`;
                    document.getElementById('p-title').innerText = data.nombre || data.titulo || "Producto Sin Nombre";
                    
                    // Lógica de Mínimos
                    minUnits = parseInt(data.minimo) || 1;
                    currentQty = minUnits;
                    document.getElementById('qty-val').innerText = currentQty;
                    document.getElementById('p-min-tag').innerText = `MÍNIMO: ${minUnits} UDS`;

                    // Lógica del Proveedor
                    const nombreFinal = provNombre || "Proveedor Proveed";
                    document.getElementById('p-prov-name').innerText = nombreFinal;
                    document.getElementById('p-avatar').innerText = nombreFinal.charAt(0).toUpperCase();
                }
            } catch (error) {
                console.error("Error al conectar con Firebase:", error);
            }
        }

        window.updateQty = (val) => {
            currentQty += val;
            if (currentQty < minUnits) currentQty = minUnits;
            document.getElementById('qty-val').innerText = currentQty;
        };

        window.addToCart = () => {
            // Guardamos la cantidad seleccionada para el proceso de pago
            localStorage.setItem('lastSelectedQty', currentQty);
            alert(`Añadido: ${currentQty} unidades al pedido.`);
        };

        loadProductData();
    </script>
</body>
</html>
