<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED — Detalle Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #32D74B; --negro: #000; }
        body { background: #fff; margin: 0; font-family: 'DM Sans', sans-serif; color: var(--negro); }
        
        /* HEADER LIMPIO */
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; background: white; position: sticky; top: 0; z-index: 10; }
        .back-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding-right: 15px; }

        /* CONTENEDOR DE IMAGEN */
        .img-box { width: 100%; height: 350px; background: #fdfdfd; display: flex; align-items: center; justify-content: center; }
        #p-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* INFORMACIÓN DINÁMICA */
        .main-info { padding: 25px 20px; }
        .price { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .title { font-family: 'Syne'; font-size: 1.2rem; margin: 10px 0 25px; text-transform: uppercase; }

        /* CUADRO PROVEEDOR - TODO VIENE DE LA BD */
        .provider-row { border: 1px solid #eee; border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--negro); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne'; font-size: 1.2rem; }
        .p-details h4 { margin: 0; font-size: 0.9rem; text-transform: uppercase; }
        .p-details p { margin: 3px 0 0; font-size: 0.7rem; color: var(--verde); font-weight: 700; }

        /* ACCIONES INFERIORES */
        .actions { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 10px; box-sizing: border-box; }
        .btn-chat { background: #f0f0f0; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .btn-order { background: var(--negro); color: white; border: none; padding: 18px; border-radius: 15px; font-family: 'Syne'; font-weight: 700; cursor: pointer; }

        /* PANTALLA DE CARGA */
        #loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; font-family: 'Syne'; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loader-screen">CARGANDO DATOS REALES...</div>

    <header>
        <button class="back-btn" onclick="location.href='dashboard.html'">←</button>
        <div style="font-family: 'Syne'; font-size: 0.8rem; font-weight: 800;">VERIFICACIÓN PROVEED</div>
    </header>

    <div class="img-box">
        <img id="p-img" src="" alt="">
    </div>

    <div class="main-info">
        <h1 id="p-price" class="price"></h1>
        <h2 id="p-title" class="title"></h2>

        <div class="provider-row">
            <div id="p-avatar" class="avatar">?</div>
            <div class="p-details">
                <h4 id="p-prov-name"></h4>
                <p>● PROVEEDOR VERIFICADO</p>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-chat" onclick="location.href='messenger.html'">CHAT</button>
        <button class="btn-order">AÑADIR AL PEDIDO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LEER IDs DESDE EL DASHBOARD
        const productID = localStorage.getItem('lastSelectedProdID');
        const provNombreReal = localStorage.getItem('currentProveedorNombre');

        async function cargarPagina() {
            if (!productID) {
                alert("Selecciona un producto real.");
                location.href = 'dashboard.html';
                return;
            }

            try {
                // CONSULTA A TU COLECCIÓN 'productos'
                const snap = await getDoc(doc(db, "productos", productID));

                if (snap.exists()) {
                    const data = snap.data();
                    
                    // INYECTAR SOLO DATOS DE TU BASE DE DATOS
                    document.getElementById('p-img').src = data.imagen || data.imageUrl;
                    document.getElementById('p-price').innerText = `$${data.precio || data.price}`;
                    document.getElementById('p-title').innerText = data.titulo || data.nombre;
                    
                    // USAR EL NOMBRE QUE VIENE DE TU COLECCIÓN USUARIOS (PASADO POR EL DASHBOARD)
                    const nombreFinal = provNombreReal || "Proveedor Oficial";
                    document.getElementById('p-prov-name').innerText = nombreFinal;
                    document.getElementById('p-avatar').innerText = nombreFinal.charAt(0).toUpperCase();

                    // QUITAR CARGADOR
                    document.getElementById('loader-screen').style.display = 'none';
                } else {
                    alert("Este producto no existe en tu base de datos.");
                    location.href = 'dashboard.html';
                }
            } catch (e) {
                console.error(e);
                location.href = 'dashboard.html';
            }
        }

        cargarPagina();
    </script>
</body>
</html>
