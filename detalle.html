<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle — PROVEED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background: white;">
    <button onclick="history.back()" style="position:fixed; top:40px; left:20px; z-index:10; background:white; border:none; width:40px; height:40px; border-radius:50%; box-shadow:0 4px 10px rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:center;">
        <svg class="icon-pro" style="stroke:#000;" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <img id="p-img" style="width:100%; height:50vh; object-fit:cover;">

    <div style="padding:25px; background:white; border-radius:30px 30px 0 0; margin-top:-30px; position:relative;">
        <h2 id="p-name" style="font-size:1.4rem; margin-bottom:10px;">Cargando...</h2>
        <p id="p-price" style="font-family:'Syne'; font-size:2rem; font-weight:800;">$0.00</p>
        <div style="background:#F8F9FA; padding:15px; border-radius:15px; margin-top:20px; display:flex; align-items:center; gap:10px;">
            <svg class="icon-pro" style="width:18px; stroke:var(--naranja);" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            <p style="font-size:0.8rem; font-weight:700;">Pedido Mínimo: <span id="p-moq">12</span> unidades</p>
        </div>
    </div>

    <div style="position:fixed; bottom:0; width:100%; padding:20px 20px 35px; background:white; border-top:1px solid #eee; display:flex; gap:10px;">
        <button class="btn-naranja" style="flex:2;">Cotizar con Ulises</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const id = new URLSearchParams(window.location.search).get('id');
        async function load() {
            if(!id) return;
            const snap = await getDoc(doc(db, "productos", id));
            if(snap.exists()) {
                const p = snap.data();
                document.getElementById('p-img').src = p.imagen;
                document.getElementById('p-name').innerText = p.nombre;
                document.getElementById('p-price').innerText = `$${p.precio}`;
                document.getElementById('p-moq').innerText = p.cantidadMinima || 12;
            }
        }
        load();
    </script>
</body>
</html>
