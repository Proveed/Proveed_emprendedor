<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Catálogo Ordenado</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris-f: #F2F3F0; --blanco: #FFFFFF; }
        
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER SLIM ELEVADO */
        .header { background: var(--lima); padding: 50px 20px 20px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .greeting-name { font-size: 1.15rem; font-weight: 700; color: var(--negro); letter-spacing: -0.4px; }
        .search-mini { background: rgba(0,0,0,0.06); padding: 10px; border-radius: 12px; border: none; outline: none; width: 100%; font-size: 0.9rem; font-weight: 500; font-family: 'DM Sans'; }

        /* ÁREA DE CONTENIDO */
        .content { flex: 1; overflow-y: auto; padding-bottom: 90px; }

        /* CATEGORÍAS EN CHIPS INTEGRADOS */
        .section-h { padding: 20px 22px 10px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #888; }
        
        .cat-scroll-box { position: relative; z-index: 500; padding: 0 20px 15px; }
        .cat-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-chip { background: white; padding: 9px 18px; border-radius: 14px; font-size: 0.8rem; font-weight: 600; border: 1.5px solid #eee; white-space: nowrap; transition: 0.2s; color: #666; }
        .cat-chip.active { background: var(--negro); color: white; border-color: var(--negro); }
        .cat-chip:active { transform: scale(0.96); }
        .cat-fade { position: absolute; right: 18px; top: 0; height: 100%; width: 50px; background: linear-gradient(to right, rgba(242,243,240,0), rgba(242,243,240,1)); pointer-events: none; }

        /* GRID DE PRODUCTOS CON ESPACIADO REAL */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 18px; margin-top: 15px; position: relative; z-index: 10; }
        .card { background: white; border-radius: 22px; overflow: hidden; border: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .card:active { transform: scale(0.98); }
        .card-img-container { width: 100%; height: 160px; background: #fafafa; display: flex; align-items: center; justify-content: center; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 12px 14px; text-align: left; }
        .p-name { font-size: 0.85rem; font-weight: 500; height: 36px; overflow: hidden; color: #333; line-height: 1.3; }
        .p-price { color: #2bb12b; font-weight: 700; font-size: 1.05rem; }

        /* NAV BAR */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0 28px; border-top: 1px solid #f2f2f2; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.02); }
        .nav-link { color: #ccc; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; border: none; background: none; font-family: 'DM Sans', sans-serif; cursor: pointer; }
        .nav-link.active { color: var(--negro); }
        .nav-link svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
        .nav-link span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-row">
        <div class="greeting-name">Explorar</div>
    </div>
    <div style="margin-top:15px;">
        <input type="text" class="search-mini" placeholder="Buscar productos para mi stock...">
    </div>
</header>

<main class="content">
    <div class="section-h"><h3>Categorías</h3></div>
    <div class="cat-scroll-box">
        <div class="cat-scroll" id="category-scroller">
            <div class="cat-chip active" onclick="filtrar('todos', this)">Todos</div>
            <div class="cat-chip" onclick="filtrar('textiles', this)">Textiles</div>
            <div class="cat-chip" onclick="filtrar('tecnologia', this)">Tecnología</div>
            <div class="cat-chip" onclick="filtrar('zapatos', this)">Zapatos</div>
            <div class="cat-chip" onclick="filtrar('accesorios', this)">Accesorios</div>
        </div>
        <div class="cat-fade"></div>
    </div>

    <div class="grid" id="main-grid">
        </div>
</main>

<nav class="nav">
    <a href="dashboard.html" class="nav-link"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Inicio</span></a>
    <a href="explorar.html" class="nav-link active"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span></a>
    <a href="perfil.html" class="nav-link"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let cache = [];

    onAuthStateChanged(auth, user => {
        if(user) { iniciar(); } 
        else { location.href = 'login.html'; }
    });

    async function iniciar() {
        const snap = await getDocs(query(collection(db, "productos"), where("activo", "==", true), limit(12)));
        cache = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderGrid(cache);
    }

    function renderGrid(lista) {
        document.getElementById('main-grid').innerHTML = lista.map(p => `
            <div class="card" onclick="location.href='producto_detalle.html?id=${p.id}'">
                <div class="card-img-container">
                    <img src="${p.imagenes?.[0] || p.imagen}" class="card-img">
                </div>
                <div class="card-body">
                    <p class="p-name">${p.nombre}</p>
                    <p class="p-price">$${Number(p.precio).toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }

    window.filtrar = (cat, btn) => {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const lista = cat === 'todos' ? cache : cache.filter(p => p.categoria === cat);
        renderGrid(lista);
    };
</script>
</body>
</html>
