<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Real — PROVEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #32D74B; --negro: #000; --gris: #111; --borde: #222; }
        body { background: var(--negro); color: white; margin: 0; font-family: 'DM Sans', sans-serif; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde); position: sticky; top: 0; background: var(--negro); z-index: 100; }
        .logo { font-family: 'Syne'; font-size: 1.2rem; letter-spacing: 2px; }
        
        .welcome-section { padding: 25px 20px; }
        .welcome-section h1 { font-family: 'Syne'; font-size: 1.5rem; margin: 0; }
        .user-badge { color: var(--verde); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-top: 5px; display: block; }

        /* GRID DE PRODUCTOS REALES */
        #productos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: var(--gris); border-radius: 20px; border: 1px solid var(--borde); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:active { transform: scale(0.97); }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #222; }
        
        .card-info { padding: 12px; flex: 1; display: flex; flex-direction: column; }
        .card-info h3 { font-size: 0.9rem; margin: 0; font-weight: 700; color: #fff; }
        .prov-name { font-size: 0.65rem; color: #888; margin: 5px 0; text-transform: uppercase; font-weight: 800; }
        .price-tag { color: var(--verde); font-weight: 800; font-size: 1.1rem; margin-top: auto; }
        
        .btn-negociar { background: white; color: black; border: none; padding: 10px; border-radius: 10px; font-weight: 800; font-family: 'Syne'; font-size: 0.7rem; cursor: pointer; margin-top: 10px; width: 100%; text-transform: uppercase; }

        .loader { text-align: center; padding: 50px; color: var(--verde); font-family: 'Syne'; }
        
        /* BARRA INFERIOR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--negro); border-top: 1px solid var(--borde); display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: #555; text-decoration: none; font-size: 0.7rem; font-weight: bold; text-align: center; }
        .nav-item.active { color: var(--verde); }
    </style>
</head>
<body>

    <header>
        <div class="logo">PROVEED</div>
        <button onclick="logout()" style="background:none; border:none; color:#ff4444; font-weight:bold; font-size:0.7rem; cursor:pointer;">SALIR</button>
    </header>

    <div class="welcome-section">
        <h1 id="user-name">Cargando...</h1>
        <span class="user-badge" id="user-location">Verificando ubicación...</span>
    </div>

    <div id="loader" class="loader">CONECTANDO A BASE DE DATOS...</div>
    <div id="productos-grid"></div>

    <div style="height: 80px;"></div> <nav class="nav-bar">
        <a href="#" class="nav-item active">EXPLORAR</a>
        <a href="pedidos.html" class="nav-item">MIS PEDIDOS</a>
        <a href="perfil.html" class="nav-item">MI CUENTA</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, getDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('productos-grid');
        const loader = document.getElementById('loader');

        // 1. VERIFICACIÓN DE SESIÓN REAL
        const userEmail = localStorage.getItem('userEmail');
        if (!userEmail) { location.href = "index.html"; }

        async function initDashboard() {
            try {
                // Traer datos del emprendedor logueado
                const qU = query(collection(db, "usuarios"), where("email", "==", userEmail));
                const userSnap = await getDocs(qU);
                
                if (!userSnap.empty) {
                    const uData = userSnap.docs[0].data();
                    document.getElementById('user-name').innerText = `Hola, ${uData.nombre || uData.nombres}`;
                    document.getElementById('user-location').innerText = `RED ECUADOR: ${uData.provincia || 'Nacional'}`;
                    
                    // Cargar productos reales
                    await cargarProductos(uData.provincia);
                }
            } catch (e) { console.error(e); }
        }

        // 2. CARGA DE PRODUCTOS Y SUS PROVEEDORES REALES
        async function cargarProductos(provinciaUsuario) {
            // Buscamos productos (podrías filtrar por provinciaUsuario si quieres)
            const qP = query(collection(db, "productos"));
            const snapP = await getDocs(qP);
            
            loader.style.display = 'none';
            grid.innerHTML = '';

            if (snapP.empty) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#555;">No hay productos disponibles en tu zona aún.</p>';
                return;
            }

            // Usamos for...of para manejar las consultas asíncronas de proveedores
            for (const docProd of snapP.docs) {
                const prod = docProd.data();
                
                // BUSCAR EL NOMBRE REAL DEL PROVEEDOR PARA ESTE PRODUCTO
                const qProv = query(collection(db, "usuarios"), where("email", "==", prod.proveedorEmail));
                const snapProv = await getDocs(qProv);
                let nombreProv = "Proveedor Oficial";

                if (!snapProv.empty) {
                    const d = snapProv.docs[0].data();
                    nombreProv = `${d.nombres} ${d.apellidos}`;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${prod.imagen || 'https://via.placeholder.com/300'}" alt="${prod.titulo}">
                    <div class="card-info">
                        <h3>${prod.titulo}</h3>
                        <p class="prov-name">📦 ${nombreProv}</p>
                        <div class="price-tag">$${prod.precio}</div>
                        <button class="btn-negociar" onclick="irAChat('${prod.proveedorEmail}', '${nombreProv}')">Negociar Precio</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        // 3. NAVEGACIÓN REAL AL CHAT
        window.irAChat = (emailProv, nombreProv) => {
            localStorage.setItem('currentProveedor', emailProv);
            localStorage.setItem('currentProveedorNombre', nombreProv);
            location.href = "messenger.html";
        };

        window.logout = () => {
            localStorage.clear();
            location.href = "index.html";
        };

        initDashboard();
    </script>
</body>
</html>
