<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root { --lima:#CCFF00; --negro:#0E0E0E; --gris:#F8F8F5; --verde-precio:#32CD32; }
        body { background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:80px; }

        /* HEADER DELGADO */
        .header { background:var(--lima); padding:45px 20px 15px; border-radius:0 0 25px 25px; display:flex; justify-content:space-between; align-items:center; }
        .user-info { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }

        .search-area { padding:15px 20px; }
        .search-bar { background:white; padding:12px; border-radius:15px; border:1px solid #eee; width:100%; font-size:0.9rem; outline:none; }

        .section-title { padding:10px 20px; font-family:'Syne',sans-serif; font-size:0.9rem; color:#888; text-transform:uppercase; }
        
        /* GRID DE PRODUCTOS DINÁMICOS */
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px; }
        .card { background:white; border-radius:22px; padding:10px; border:1px solid #f0f0f0; cursor:pointer; }
        .card img { width:100%; height:140px; object-fit:cover; border-radius:18px; margin-bottom:8px; background:#f0f0f0; }
        .p-name { font-weight:700; font-size:0.85rem; margin-bottom:4px; height:34px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
        .p-price { color:var(--verde-precio); font-weight:800; font-size:1.1rem; }

        .nav { position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:15px 0 30px; border-top:1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <div class="user-info" id="user-name">Hola...</div>
</div>

<div class="search-area">
    <input type="text" class="search-bar" placeholder="¿Qué stock buscas?">
</div>

<div class="section-title">Explorar</div>
<div id="grid" class="grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Extraer nombre real para evitar el "undefined"
            const userSnap = await getDoc(doc(db, "usuarios", user.uid));
            document.getElementById('user-name').innerText = "Hola, " + (userSnap.exists() ? userSnap.data().nombre.split(' ')[0] : "Emprendedor");
            fetchData();
        } else {
            window.location.href = "login.html";
        }
    });

    async function fetchData() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '<p style="grid-column:1/3; text-align:center;">Cargando productos...</p>';

        try {
            // Consulta basada en tu estructura de Firestore
            const q = query(collection(db, "productos"), where("activo", "==", true));
            const snap = await getDocs(q);
            grid.innerHTML = '';

            snap.forEach(documento => {
                const p = documento.data();
                const item = document.createElement('div');
                item.className = 'card';
                
                // REDIRECCIÓN: El archivo DEBE llamarse detalle.html para evitar el 404
                item.onclick = () => window.location.href = `detalle.html?id=${documento.id}`;

                item.innerHTML = `
                    <img src="${p.imagen || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-name">${p.nombre || 'Producto Proveed'}</div>
                    <div class="p-price">$${Number(p.precio || 0).toFixed(2)}</div>
                `;
                grid.appendChild(item);
            });
        } catch (e) {
            grid.innerHTML = '<p>Error al conectar. Verifica tu conexión.</p>';
        }
    }
</script>
</body>
</html>
