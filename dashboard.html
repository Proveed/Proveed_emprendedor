<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Dashboard & Chats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root { --lima: #D9FF66; --negro: #1A1A1A; --gris-f: #FBFBFA; --blanco: #FFFFFF; }
        
        body { background: var(--gris-f); color: var(--negro); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER ULTRA SLIM */
        .header { background: var(--lima); padding: 45px 20px 12px; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000; transition: 0.3s; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .greeting-name { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.3px; }
        
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { background: rgba(0,0,0,0.05); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .badge { position: absolute; top: -3px; right: -3px; background: #FF3B30; color: white; font-size: 0.6rem; font-weight: 700; padding: 1px 5px; border-radius: 10px; border: 2px solid var(--lima); }

        /* SECCIONES (VISTAS) */
        .view { display: none; padding-bottom: 90px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* VISTA DE CHATS (ESTILO WHATSAPP) */
        .chat-list { background: var(--blanco); min-height: 80vh; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f2f2f2; transition: 0.2s; cursor: pointer; }
        .chat-item:active { background: #f9f9f9; }
        .chat-avatar { width: 52px; height: 52px; border-radius: 18px; background: #eee; margin-right: 15px; object-fit: cover; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-size: 0.95rem; font-weight: 600; color: var(--negro); }
        .chat-time { font-size: 0.7rem; color: #aaa; }
        .chat-msg { font-size: 0.85rem; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VISTA DE TIENDA */
        .search-area { padding: 15px 20px; }
        .search-bar { background: white; padding: 12px 16px; border-radius: 14px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 0.9rem; font-family: 'Inter'; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px; }
        .card { background: white; border-radius: 18px; overflow: hidden; border: 1px solid #f0f0f0; }
        .card-img { width: 100%; height: 145px; object-fit: cover; }
        .card-body { padding: 10px; }
        .p-prov { font-size: 0.6rem; color: #bbb; font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
        .p-name { font-size: 0.8rem; font-weight: 500; height: 34px; overflow: hidden; margin-bottom: 6px; }
        .p-price { color: #2bb12b; font-weight: 600; font-size: 1rem; }

        /* NAV BAR */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0 28px; border-top: 1px solid #f2f2f2; z-index: 1000; }
        .nav-item { color: #ccc; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; border:none; background:none; font-family: 'Inter'; }
        .nav-item.active { color: var(--negro); }
        .nav-item span { font-size: 0.65rem; font-weight: 500; }
    </style>
</head>
<body>

<header class="header" id="main-header">
    <div class="header-row">
        <div class="greeting-name" id="view-title">Bienvenido</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="showView('chats')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <div class="badge" id="msg-count">0</div>
            </button>
            <button class="icon-btn" onclick="location.href='carrito.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </button>
        </div>
    </div>
</header>

<div id="view-home" class="view active">
    <div class="search-area">
        <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" placeholder="¿Qué stock buscas hoy?" id="search-input">
        </div>
    </div>
    <div class="grid" id="product-grid">
        </div>
</div>

<div id="view-chats" class="view">
    <div style="padding: 15px 20px; font-size: 0.8rem; font-weight: 600; color: #888;">MENSAJES RECIENTES</div>
    <div class="chat-list" id="chat-container">
        </div>
</div>

<nav class="nav">
    <button class="nav-item active" id="nav-home" onclick="showView('home')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Inicio</span>
    </button>
    <button class="nav-item" onclick="location.href='explorar.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Explorar</span>
    </button>
    <button class="nav-item" onclick="location.href='perfil.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Perfil</span>
    </button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('view-title').innerText = "Hola, " + (user.displayName?.split(' ')[0] || "Emprendedor");
            cargarProductos();
            escucharChats(user.uid);
        } else { location.href = 'login.html'; }
    });

    // SISTEMA DE NAVEGACIÓN SIN CARGA
    window.showView = (viewName) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewName).classList.add('active');
        
        // Actualizar UI del header y nav
        if(viewName === 'chats') {
            document.getElementById('view-title').innerText = "Mensajes";
            document.getElementById('nav-home').classList.remove('active');
        } else {
            document.getElementById('nav-home').classList.add('active');
        }
    };

    // ESCUCHAR CHATS EN TIEMPO REAL (WHATSAPP STYLE)
    function escucharChats(uid) {
        const q = query(collection(db, "chats"), where("usuarios", "array-contains", uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            let unread = 0;
            snap.forEach(doc => {
                const chat = doc.data();
                if(!chat.leido) unread++;
                container.innerHTML += `
                    <div class="chat-item" onclick="location.href='chat.html?id=${doc.id}'">
                        <img src="${chat.foto || 'https://via.placeholder.com/50'}" class="chat-avatar">
                        <div class="chat-info">
                            <div class="chat-top">
                                <span class="chat-name">${chat.nombreRemitente}</span>
                                <span class="chat-time">Ahora</span>
                            </div>
                            <div class="chat-msg">${chat.ultimoMensaje}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('msg-count').innerText = unread;
            document.getElementById('msg-count').style.display = unread > 0 ? 'block' : 'none';
        });
    }

    // CARGAR PRODUCTOS DEL PROVEEDOR
    async function cargarProductos() {
        const snap = await getDocs(collection(db, "productos"));
        const grid = document.getElementById('product-grid');
        grid.innerHTML = snap.docs.map(doc => {
            const p = doc.data();
            return `
                <div class="card" onclick="location.href='producto.html?id=${doc.id}'">
                    <img src="${p.imagenes?.[0] || p.imagen}" class="card-img">
                    <div class="card-body">
                        <p class="p-prov">${p.nombreProveedor || 'PROVEEDOR'}</p>
                        <p class="p-name">${p.nombre}</p>
                        <p class="p-price">$${Number(p.precio).toFixed(2)}</p>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
