<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para el Feed de Productos */
        .search-container {
            padding: 20px;
            background: var(--negro);
            position: sticky;
            top: 95px; /* Debajo del header */
            z-index: 900;
        }

        .search-bar {
            background: var(--gris-oscuro);
            border: 1px solid var(--gris-suave);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            width: 100%;
            outline: none;
            font-family: var(--fuente-cuerpo);
        }

        .search-bar:focus {
            border-color: var(--lima);
        }

        .feed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px 120px;
        }

        .card-price {
            color: var(--lima);
            font-weight: 800;
            font-size: 1.1rem;
            font-family: var(--fuente-titulo);
        }

        .card-name {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .category-tag {
            background: var(--naranja);
            color: white;
            font-size: 0.6rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="header-proveed">
        <div style="background: var(--negro); color: var(--lima); padding: 8px; border-radius: 8px; font-family: 'Syne'; font-weight: 800;">P</div>
        <h1>PROVEED</h1>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Buscar productos mayoristas...">
    </div>

    <main class="feed-grid" id="main-feed">
        </main>

    <nav class="tab-bar">
        <a href="dashboard.html" class="tab-item active">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>Explorar</span>
        </a>
        <a href="tips.html" class="tab-item">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 2v20M2 12h20"/></svg>
            <span>Tips</span>
        </a>
        <a href="messenger.html" class="tab-item">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Mensajes</span>
        </a>
        <a href="perfil.html" class="tab-item">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Mi Centro</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // Configuración de tu Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", 
            projectId: "proveed-8cb7c" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarProductos() {
            const feed = document.getElementById('main-feed');
            try {
                const snap = await getDocs(collection(db, "productos"));
                feed.innerHTML = snap.docs.map(doc => {
                    const p = doc.data();
                    return `
                        <div class="card-proveed" onclick="window.location.href='detalle.html?id=${doc.id}'">
                            <img src="${p.imagen}" alt="${p.nombre}">
                            <div style="padding: 12px;">
                                <span class="category-tag">Importación</span>
                                <div class="card-price">$${p.precio}</div>
                                <div class="card-name">${p.nombre}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                feed.innerHTML = '<p style="color: #555; text-align: center; grid-column: span 2;">Cargando catálogo...</p>';
            }
        }

        cargarProductos();
    </script>
</body>
</html>
