<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* TU DISEÑO ORIGINAL */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --lima:#CCFF00; --verde:#32CD32; --negro:#0E0E0E; }
        body { background:#F8F8F5; font-family:'DM Sans',sans-serif; padding-bottom:100px; }
        .header { background:var(--lima); padding:45px 20px 15px; border-radius:0 0 25px 25px; }
        .greeting { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }
        .search-area { padding:15px 20px; }
        .search-input { width:100%; padding:12px; border-radius:15px; border:1px solid #eee; outline:none; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:20px; }
        .card { background:white; border-radius:20px; padding:10px; border:1px solid #eee; cursor:pointer; }
        .card img { width:100%; height:140px; object-fit:cover; border-radius:15px; }
        .p-name { font-weight:700; font-size:0.8rem; margin:5px 0; }
        .p-price { color:var(--verde); font-weight:800; }
        .nav { position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:15px 0 30px; border-top:1px solid #eee; }
    </style>
</head>
<body>

<header class="header">
    <div class="greeting" id="user-greeting">Hola, ...</div>
</header>

<div class="search-area">
    <input type="text" class="search-input" placeholder="Buscar stock...">
</div>

<div id="products-grid" class="grid">
    </div>

<nav class="nav">
    <a href="dashboard.html">Inicio</a>
    <a href="perfil.html">Perfil</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        authDomain: "proveed-8cb7c.firebaseapp.com",
        projectId: "proveed-8cb7c",
        storageBucket: "proveed-8cb7c.firebasestorage.app",
        messagingSenderId: "235073250367",
        appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-greeting').innerText = "Hola, " + (user.displayName || "Usuario");
            cargar();
        } else {
            window.location.href = 'login.html';
        }
    });

    async function cargar() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '<p>Cargando productos...</p>';
        
        try {
            // Consulta directa a la colección que vimos en tu captura
            const q = query(collection(db, "productos"), where("activo", "==", true));
            const snap = await getDocs(q);
            
            grid.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                const item = document.createElement('div');
                item.className = 'card';
                // El error NOT_FOUND se quita creando este archivo:
                item.onclick = () => window.location.href = `producto.html?id=${doc.id}`;
                item.innerHTML = `
                    <img src="${p.imagen}">
                    <div class="p-name">${p.nombre}</div>
                    <div class="p-price">$${p.precio}</div>
                `;
                grid.appendChild(item);
            });
        } catch (e) {
            grid.innerHTML = '<p>Error de conexión: ' + e.message + '</p>';
        }
    }
</script>
</body>
</html>
