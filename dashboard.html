<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PROVEED — Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde-lima:#CCFF00; --verde:#32CD32; --negro:#0E0E0E; --blanco:#F8F8F5; --gris-fondo:#F8F8F5; --rojo:#FF4D4D; }
  body{ background:var(--gris-fondo); color:var(--negro); font-family:'DM Sans',sans-serif; min-height:100vh; padding-bottom:90px; }
  
  /* HEADER LIMA DELGADO SEGÚN TU SOLICITUD */
  .header{ background:var(--verde-lima); color:var(--negro); padding:40px 22px 15px; border-radius:0 0 25px 25px; position:sticky; top:0; z-index:100; }
  .header-row{ display:flex; align-items:center; justify-content:space-between; }
  .greeting-name{ font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }
  .header-actions{ display:flex; align-items:center; gap:12px; }
  .icon-btn-h{ background:rgba(0,0,0,0.05); width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }

  /* SECCIONES COMPACTAS PARA MÁS VISIBILIDAD DE PRODUCTOS */
  .search-section{ padding:15px 20px 0; }
  .search-box{ background:white; display:flex; align-items:center; padding:12px 16px; border-radius:16px; gap:10px; border:1.5px solid #eee; }
  .search-box input{ border:none; outline:none; flex:1; font-family:'DM Sans',sans-serif; font-size:0.9rem; }

  .section-head{ display:flex; justify-content:space-between; align-items:center; padding:15px 20px 8px; }
  .section-head h3{ font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800; text-transform: uppercase; color: #888; }
  
  .cats-scroll{ display:flex; gap:10px; padding:0 20px 15px; overflow-x:auto; scrollbar-width:none; }
  .cat-chip{ padding:9px 18px; border-radius:15px; white-space:nowrap; cursor:pointer; border:1.5px solid #eee; background:white; font-size:0.8rem; font-weight:700; color:#555; }
  .cat-chip.active{ background:var(--negro); color:white; border-color:var(--negro); }

  /* GRID DE PRODUCTOS DINÁMICOS */
  .products-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 20px 20px; }
  .prod-card{ background:white; border-radius:22px; overflow:hidden; border: 1.5px solid #f0f0f0; cursor:pointer; transition: 0.2s; }
  .prod-card:active { transform: scale(0.96); }
  .prod-img{ width:100%; height:155px; background:#f9f9f9; display:flex; align-items:center; justify-content:center; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .prod-info{ padding:12px; }
  .prod-name{ font-size:0.85rem; font-weight:700; margin-bottom:4px; height: 36px; overflow: hidden; }
  .prod-precio{ font-size:1rem; font-weight:800; color:var(--verde); }

  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 25px; border-top:1px solid #eee; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; color:#bbb; text-decoration:none; }
  .tab.active{ color:var(--negro); }
  .tab svg{ width:24px; height:24px; stroke:currentColor; fill:none; stroke-width:2; }
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="greeting-name" id="user-greeting">Hola, ...</div>
    <div class="header-actions">
      <div class="icon-btn-h" onclick="window.location.href='carrito.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </div>
    </div>
  </div>
</header>

<div class="search-section">
  <div class="search-box">
    <input type="text" placeholder="¿Qué stock buscas?">
  </div>
</div>

<div class="section-head"><h3>Categorías</h3></div>
<div class="cats-scroll" id="cat-container">
  <div class="cat-chip active" data-cat="todos">Todo</div>
  <div class="cat-chip" data-cat="textiles">Textiles</div>
  <div class="cat-chip" data-cat="tecnologia">Tecnología</div>
</div>

<div class="section-head"><h3>Explorar</h3></div>
<div class="products-grid" id="products-grid"></div>

<nav class="tab-bar">
  <a class="tab active" href="dashboard.html"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></a>
  <a class="tab" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain: "proveed-8cb7c.firebaseapp.com",
  projectId: "proveed-8cb7c",
  storageBucket: "proveed-8cb7c.firebasestorage.app",
  messagingSenderId: "235073250367",
  appId: "1:235073250367:web:89ec59fea5f0b8a347448a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    if (userSnap.exists()) {
      document.getElementById('user-greeting').textContent = `Hola, ${userSnap.data().nombre || 'Usuario'}`;
    }
    cargarProductos('todos');
  } else {
    window.location.href = 'login.html';
  }
});

async function cargarProductos(categoria) {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '<p>Cargando...</p>';
  
  let q = query(collection(db, "productos"), where("activo", "==", true));
  if (categoria !== 'todos') {
    q = query(collection(db, "productos"), where("activo", "==", true), where("categoria", "==", categoria));
  }

  const querySnapshot = await getDocs(q);
  grid.innerHTML = '';

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    const card = document.createElement('div');
    card.className = 'prod-card';
    
    // REDIRECCIÓN DINÁMICA: Asegúrate de tener el archivo producto.html
    card.onclick = () => {
      window.location.href = `producto.html?id=${doc.id}`;
    };

    card.innerHTML = `
      <div class="prod-img">
        <img src="${data.imagen || 'https://via.placeholder.com/150'}" alt="${data.nombre}">
      </div>
      <div class="prod-info">
        <div class="prod-name">${data.nombre}</div>
        <div class="prod-precio">$${parseFloat(data.precio).toFixed(2)}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Filtro de categorías
document.querySelectorAll('.cat-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelector('.cat-chip.active').classList.remove('active');
    chip.classList.add('active');
    cargarProductos(chip.dataset.cat);
  };
});
</script>
</body>
</html>
