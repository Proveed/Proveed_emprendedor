<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Dashboard Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; --verde-ok: #2bb12b; }
        
        /* FUENTE CUERPO ACTUALIZADA A MONTSERRAT */
        body { background: var(--gris-f); color: var(--negro); font-family: 'Montserrat', sans-serif; padding-bottom: 100px; }

        /* HEADER SLIM LIMA REFORMADO */
        .header { background: var(--lima); color: var(--negro); padding: 50px 20px 18px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; }
        
        .greeting-small { font-size: 0.75rem; font-weight: 500; color: rgba(0,0,0,0.6); margin-bottom: 3px; }
        .greeting-name { font-family: 'Syne'; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; line-height: 1.1; }
        
        .btn-circle { background: rgba(0,0,0,0.05); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--negro); color: var(--lima); font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 7px; }

        /* BUSCADOR INTEGRADO */
        .search-section { padding: 18px 20px 12px; }
        .search-box { background: white; padding: 14px 18px; border-radius: 16px; display: flex; align-items: center; gap: 12px; border: 1.5px solid #eee; box-shadow: 0 5px 20px rgba(0,0,0,0.03); cursor: pointer; }
        .search-box input { border: none; outline: none; width: 100%; font-weight: 600; font-size: 0.95rem; font-family: 'Montserrat', sans-serif; color: var(--negro); }
        .search-box input::placeholder { color: #aaa; }

        /* CATEGORÍAS ELEGANTE */
        .section-h { padding: 20px 20px 12px; font-family: 'Syne'; font-size: 1rem; font-weight: 800; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .section-h a { font-size: 0.8rem; color: var(--verde-ok); font-weight: 700; text-decoration: none; font-family: 'Montserrat', sans-serif; }
        
        .cat-scroll { display: flex; gap: 9px; padding: 0 20px 6px; overflow-x: auto; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .chip { background: white; padding: 10px 18px; border-radius: 14px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; border: 1.5px solid #eee; color: #666; transition: 0.2s; cursor: pointer; }
        .chip.active { background: var(--negro); color: var(--lima); border-color: var(--negro); }

        /* GRID PRODUCTOS */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 20px; }
        .card { background: white; border-radius: 22px; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 6px 18px rgba(0,0,0,0.03); cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.97); }
        .card-img { width: 100%; height: 160px; object-fit: cover; background: #fafafa; }
        
        .card-body { padding: 14px; text-align: center; }
        .p-prov { font-size: 0.6rem; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 3px; }
        .p-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
        .p-price { color: var(--verde-ok); font-weight: 800; font-size: 1.1rem; }

        /* TAB BAR PREMIUM */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid #eee; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-link { color: #ccc; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
        .nav-link.active { color: var(--negro); }
        .nav-link span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        /* TOAST ANIMADO */
        .toast { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%) translateY(15px); background: var(--negro); color: white; padding: 12px 24px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; opacity: 0; transition: 0.3s; z-index: 2000; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-row">
        <div>
            <div class="greeting-small" id="time-display">Cargando...</div>
            <div class="greeting-name">Bienvenido/a</div>
            <div class="greeting-name" id="user-display">...</div>
        </div>
        <div class="header-actions">
            <div class="btn-circle" onclick="window.location.href='carrito.html'">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <div class="badge" id="badge-n">0</div>
            </div>
        </div>
    </div>
</header>

<div class="search-section">
    <div class="search-box" onclick="window.location.href='explorar.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="¿Qué stock buscas hoy?" readonly>
    </div>
</div>

<div class="section-h">
    <h3>Categorías</h3>
    <a href="explorar.html">Ver todo</a>
</div>
<div class="cat-scroll">
    <div class="chip active" onclick="filtrar('todos', this)">Todos</div>
    <div class="chip" onclick="filtrar('textiles', this)">Textiles</div>
    <div class="chip" onclick="filtrar('tecnologia', this)">Tecnología</div>
    <div class="chip" onclick="filtrar('maquinaria', this)">Maquinaria</div>
</div>

<div class="section-h"><h3>Nuevos Ingresos</h3></div>
<div class="grid" id="dash-grid">
    </div>

<nav class="nav">
    <a href="dashboard.html" class="nav-link active"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Inicio</span></a>
    <a href="explorar.html" class="nav-link"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span></a>
    <a href="perfil.html" class="nav-link"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Cuenta</span></a>
</nav>

<div class="toast" id="dash-toast">✓ Añadido</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, limit, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let cacheProds = [];

    // LÓGICA DE SALUDO DINÁMICO Y NOMBRE
    onAuthStateChanged(auth, async user => {
        if(user){
            // 1. Obtener la hora y poner el saludo correcto
            const hora = new Date().getHours();
            document.getElementById('time-display').innerText = hora < 12 ? "Buenos días," : hora < 18 ? "Buenas tardes," : "Buenas noches,";
            
            // 2. Buscar el nombre real del emprendedor en Firebase
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid));
                if(snap.exists()){
                    const nombreCompleto = snap.data().nombre || "Emprendedor";
                    // Mostramos solo el primer nombre
                    document.getElementById('user-display').innerText = nombreCompleto.split(' ')[0] + "!";
                } else {
                    document.getElementById('user-display').innerText = "Emprendedor!";
                }
            } catch(e) { document.getElementById('user-display').innerText = "Emprendedor!"; }
            
            cargarDashboard();
        } else { window.location.href = 'login.html'; }
    });

    async function cargarDashboard() {
        const grid = document.getElementById('dash-grid');
        grid.innerHTML = '<p style="grid-column: span 2; text-align:center; padding:30px; color:#aaa; font-size:0.8rem;">Actualizando stock premium...</p>';
        const q = query(collection(db, "productos"), where("activo", "==", true), limit(12));
        const snap = await getDocs(q);
        cacheProds = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderGrid(cacheProds);
    }

    function renderGrid(lista) {
        const grid = document.getElementById('dash-grid');
        grid.innerHTML = lista.map(p => `
            <div class="card" onclick="window.location.href='explorar.html?id=${p.id}'">
                <img src="${p.imagenes?.[0] || p.imagen}" class="card-img">
                <div class="card-body">
                    <p class="p-prov">${p.nombreProveedor || 'PROVEED Ecuador'}</p>
                    <p class="p-name">${p.nombre}</p>
                    <p class="p-price">$${Number(p.precio).toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }

    window.filtrar = (cat, btn) => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const filtrados = cat === 'todos' ? cacheProds : cacheProds.filter(p => p.categoria === cat);
        renderGrid(filtrados);
    };
</script>
</body>
</html>
