<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PROVEED — Dashboard Interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --lima:#CCFF00; --negro:#0E0E0E; --gris-f:#F2F3F0; --verde:#00a650; }
  body{ background:var(--gris-f); font-family:'DM Sans',sans-serif; padding-bottom:100px; }

  /* HEADER PROVEED */
  .header{ background:var(--lima); padding:45px 20px 15px; border-radius:0 0 24px 24px; position:sticky; top:0; z-index:100; }
  .greeting{ font-family:'Syne'; font-weight:800; font-size:1.1rem; }

  /* GRID DE PRODUCTOS (ESTILO ALIBABA/REFERENCIA) */
  .section-title{ padding:15px 20px; font-family:'Syne'; font-size:1rem; }
  .grid-container{ display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px; }
  .prod-card{ background:white; border-radius:15px; overflow:hidden; border:1px solid #eee; }
  .prod-img{ width:100%; height:140px; object-fit:cover; background:#f9f9f9; }
  .prod-info{ padding:10px; }
  .price{ color:var(--negro); font-weight:800; font-size:1.1rem; }
  .name{ font-size:0.75rem; color:#666; margin-top:4px; height:32px; overflow:hidden; }

  /* --- MODAL DE CONSULTA (ESTILO VIDEO 0:54) --- */
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:flex-end; }
  .modal-consulta { 
    background:white; width:100%; border-radius:24px 24px 0 0; padding:20px; 
    transform:translateY(100%); transition:transform 0.3s ease;
  }
  .modal-consulta.show { transform:translateY(0); }
  
  .user-badge { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .user-img { width:45px; height:45px; border-radius:50%; object-fit:cover; background:#eee; }
  
  .consulta-box { 
    background:#f8f8f8; border-radius:16px; padding:15px; border:1px solid #eee;
    display:flex; gap:12px; align-items:center; margin-bottom:20px;
  }
  .preview-img { width:60px; height:60px; border-radius:10px; object-fit:cover; }
  .preview-info { flex:1; }
  .preview-price { font-weight:800; font-size:0.9rem; }
  
  .input-area { display:flex; gap:10px; align-items:center; background:#eee; padding:5px 5px 5px 15px; border-radius:30px; }
  .input-area input { flex:1; border:none; background:transparent; outline:none; font-size:0.9rem; }
  .btn-send { background:var(--negro); color:var(--lima); border:none; padding:10px 20px; border-radius:25px; font-weight:700; }

  /* BOTONES INFERIORES DEL MODAL */
  .modal-actions { display:flex; gap:10px; margin-top:10px; }
  .btn-outline { flex:1; padding:12px; border-radius:12px; border:1px solid #ddd; background:white; font-size:0.8rem; font-weight:700; text-align:center; }
</style>
</head>
<body>

<header class="header">
  <div class="greeting" id="user-greeting">Hola, Emprendedor</div>
</header>

<h2 class="section-title">Recomendado para ti</h2>
<div class="grid-container" id="main-grid">
  </div>

<div id="overlay" onclick="closeModal(event)">
  <div class="modal-consulta" id="modal-content">
    <div class="user-badge">
        <img src="https://via.placeholder.com/50" class="user-img" id="prov-img">
        <div>
            <p style="font-size:0.9rem; font-weight:800;" id="prov-name">Proveedor</p>
            <p style="font-size:0.7rem; color:var(--verde);">● En línea ahora</p>
        </div>
    </div>

    <div class="consulta-box">
      <img src="" class="preview-img" id="modal-prod-img">
      <div class="preview-info">
        <p class="preview-price" id="modal-prod-price"></p>
        <p style="font-size:0.7rem; color:#888;">Certificado por Proveed Seg</p>
      </div>
      <button class="btn-send" id="final-send">Enviar</button>
    </div>

    <div class="input-area">
      <input type="text" placeholder="Escribe tu consulta..." id="mensaje-input">
    </div>

    <div class="modal-actions">
        <div class="btn-outline" onclick="window.location.href='explorar.html'">Ver detalles</div>
        <div class="btn-outline">Similares</div>
    </div>
  </div>
</div>

<script type="module">
  // Configuración de Firebase (asegúrate que sea la tuya)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
    projectId: "proveed-8cb7c",
    // ... resto de tu config
  });
  const db = getFirestore(app);

  async function init() {
    const snap = await getDocs(collection(db, "productos"));
    const productos = snap.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('main-grid').innerHTML = productos.map(p => `
      <div class="prod-card" onclick='openModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
        <img src="${p.imagen}" class="prod-img">
        <div class="prod-info">
          <p class="price">$${Number(p.precio).toFixed(2)}</p>
          <p class="name">${p.nombre}</p>
        </div>
      </div>
    `).join('');
  }

  let selectedProd = null;

  window.openModal = (p) => {
    selectedProd = p;
    document.getElementById('modal-prod-img').src = p.imagen;
    document.getElementById('modal-prod-price').innerText = `$${Number(p.precio).toFixed(2)}`;
    document.getElementById('prov-name').innerText = p.proveedorNombre || "Socio Proveed";
    
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('modal-content');
    overlay.style.display = 'flex';
    setTimeout(() => content.classList.add('show'), 10);
  };

  window.closeModal = (e) => {
    if(e.target.id === 'overlay') {
        const content = document.getElementById('modal-content');
        content.classList.remove('show');
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
    }
  };

  document.getElementById('final-send').onclick = () => {
    const msg = document.getElementById('mensaje-input').value || "Me interesa este producto";
    // Aquí rediriges al chat real con los datos
    window.location.href = `chat.html?chatId=NUEVO&refMsg=${msg}&refImg=${selectedProd.imagen}`;
  };

  init();
</script>
</body>
</html>
