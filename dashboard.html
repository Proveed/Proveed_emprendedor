<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Dashboard Slim</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --blanco: #FFFFFF; --gris-f: #F2F3F0; --verde-ok: #2bb12b; }
        
        body { background: var(--gris-f); color: var(--negro); font-family: 'DM Sans', sans-serif; padding-bottom: 100px; }

        /* HEADER SLIM LIMA */
        .header { background: var(--lima); color: var(--negro); padding: 45px 20px 15px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .greeting-name { font-family: 'Syne'; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
        
        .header-actions { display: flex; gap: 12px; }
        .btn-circle { background: rgba(0,0,0,0.05); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .badge { position: absolute; top: -4px; right: -4px; background: var(--negro); color: var(--lima); font-size: 0.6rem; font-weight: 900; padding: 2px 5px; border-radius: 6px; }

        /* BUSCADOR INTEGRADO */
        .search-section { padding: 15px 20px 10px; }
        .search-box { background: white; padding: 12px 16px; border-radius: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .search-box input { border: none; outline: none; width: 100%; font-weight: 600; font-size: 0.9rem; }

        /* CATEGORÍAS */
        .section-h { padding: 15px 20px 10px; font-family: 'Syne'; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; display: flex; justify-content: space-between; }
        .cat-scroll { display: flex; gap: 8px; padding: 0 20px 5px; overflow-x: auto; scrollbar-width: none; }
        .chip { background: white; padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; border: 1.5px solid #eee; }
        .chip.active { background: var(--negro); color: white; border-color: var(--negro); }

        /* PRODUCTOS CON PROVEEDOR */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px; }
        .card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .card-img { width: 100%; height: 150px; object-fit: cover; background: #fafafa; }
        
        .card-body { padding: 12px; text-align: center; }
        .p-prov { font-size: 0.6rem; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 2px; }
        .p-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; }
        .p-price { color: var(--verde-ok); font-weight: 800; font-size: 1.05rem; }

        /* TAB BAR */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0 20px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { color: #ccc; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .nav-link.active { color: var(--negro); }
        .nav-link span { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-row">
        <div class="greeting-name" id="user-display">Hola, Cargando...</div>
        <div class="header-actions">
            <div class="btn-circle" onclick="window.location.href='carrito.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <div class="badge" id="badge-n">0</div>
            </div>
        </div>
    </div>
</header>

<div class="search-section">
    <div class="search-box" onclick="window.location.href='explorar.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="¿Qué stock necesitas hoy?" readonly>
    </div>
</div>

<div class="section-h"><h3>Categorías</h3></div>
<div class="cat-scroll">
    <div class="chip active" onclick="filtrar('todos', this)">Todo</div>
    <div class="chip" onclick="filtrar('textiles', this)">Textiles</div>
    <div class="chip" onclick="filtrar('tecnologia', this)">Tecnología</div>
    <div class="chip" onclick="filtrar('calzado', this)">Calzado</div>
</div>

<div class="section-h"><h3>Nuevos Ingresos</h3></div>
<div class="grid" id="main-grid">
    </div>

<nav class="nav">
    <a href="dashboard.html" class="nav-link active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Inicio</span></a>
    <a href="explorar.html" class="nav-link"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explorar</span></a>
    <a href="perfil.html" class="nav-link"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Cuenta</span></a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
        projectId: "proveed-8cb7c"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let cache = [];

    onAuthStateChanged(auth, user => {
        if(user){
            document.getElementById('user-display').innerText = "Hola, " + (user.displayName?.split(' ')[0] || "Emprendedor");
            iniciar();
        } else { window.location.href = 'login.html'; }
    });

    async function iniciar() {
        const q = query(collection(db, "productos"), where("activo", "==", true), limit(12));
        const snap = await getDocs(q);
        cache = snap.docs.map(d => ({id: d.id, ...d.data()}));
        render(cache);
    }

    function render(lista) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = lista.map(p => `
            <div class="card" onclick="window.location.href='explorar.html?id=${p.id}'">
                <img src="${p.imagenes?.[0] || p.imagen}" class="card-img">
                <div class="card-body">
                    <p class="p-prov">${p.nombreProveedor || 'Proveedor Pro'}</p>
                    <p class="p-name">${p.nombre}</p>
                    <p class="p-price">$${Number(p.precio).toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }

    window.filtrar = (cat, btn) => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const filtrados = cat === 'todos' ? cache : cache.filter(p => p.categoria === cat);
        render(filtrados);
    };
</script>
</body>
</html>
