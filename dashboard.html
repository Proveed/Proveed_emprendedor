<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Dashboard Mayorista</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CONFIGURACIÓN MAESTRA */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris-f: #F7F8F5; --verde-ok: #00a650; --rojo: #FF3B30; }
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

        /* NAVEGACIÓN SPA */
        .view { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .view.active { display: block; }

        /* HEADERS */
        .app-header { background: var(--lima); padding: 50px 20px 15px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 1000; }
        .app-header h1 { font-family: 'Syne'; font-size: 1.2rem; text-transform: uppercase; color: var(--negro); }

        /* --- VISTA: EXPLORAR --- */
        .search-container { padding: 15px 20px; }
        .search-bar { background: white; border-radius: 30px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; }
        .search-bar input { border: none; outline: none; flex: 1; font-size: 0.9rem; }
        
        .prod-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .prod-card { background: white; border-radius: 18px; overflow: hidden; border: 1px solid #eee; transition: 0.2s; }
        .prod-card img { width: 100%; height: 155px; object-fit: cover; }
        .prod-info { padding: 10px; }

        /* --- VISTA: DETALLE DE PRODUCTO (PANTALLA COMPLETA) --- */
        #view-detalle { display: none; position: fixed; inset: 0; background: white; z-index: 3000; flex-direction: column; overflow-y: auto; padding-bottom: 110px; animation: slideUp 0.3s ease-out; }
        #view-detalle.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .btn-back-float { position: absolute; top: 45px; left: 15px; background: rgba(0,0,0,0.4); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; z-index: 10; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .det-img { width: 100%; height: 45vh; object-fit: cover; background: #eee; }

        .det-body { padding: 25px 20px; }
        .det-price { font-size: 2.2rem; font-weight: 800; color: var(--negro); }
        .det-name { font-size: 1.1rem; font-weight: 500; color: #444; margin: 10px 0 20px; line-height: 1.3; }

        /* SELECTORES DE COMPRA */
        .selector-box { background: #f9f9f9; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .label-sm { font-size: 0.75rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 1px #ddd; cursor: pointer; transition: 0.2s; }
        .color-dot.active { box-shadow: 0 0 0 2px var(--negro); transform: scale(1.1); }

        .qty-control { display: flex; align-items: center; justify-content: space-between; background: white; padding: 8px 15px; border-radius: 12px; }
        .qty-btn { border: none; background: none; font-size: 1.5rem; color: #ccc; font-weight: 800; width: 30px; }
        .qty-btn.plus { color: var(--negro); }

        /* BARRA ACCIÓN FIJA */
        .action-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 20px 35px; display: flex; gap: 12px; border-top: 1px solid #eee; z-index: 3100; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); }
        .btn-act { flex: 1; padding: 16px; border-radius: 30px; border: none; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-cotizar { background: var(--negro); color: var(--lima); }
        .btn-mensaje { background: var(--lima); color: var(--negro); }

        /* TAB BAR (5 ICONOS) */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; border-top: 1px solid #eee; z-index: 2000; padding: 5px 5px 25px; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; }
        .tab-btn.active { color: var(--negro); }
        .tab-btn svg { width: 22px; height: 22px; margin-bottom: 4px; }
        .tab-btn span { font-size: 0.55rem; font-weight: 700; }
    </style>
</head>
<body>

    <div id="view-home" class="view active">
        <header class="app-header"><h1>Explorar</h1></header>
        <div class="search-container">
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" placeholder="Buscar productos para mi negocio...">
            </div>
        </div>
        <div class="prod-grid" id="main-feed"></div>
    </div>

    <div id="view-detalle">
        <button class="btn-back-float" onclick="closeDetalle()">&larr;</button>
        <img id="d-img" class="det-img">
        
        <div class="det-body">
            <div style="display: flex; align-items: baseline; gap: 5px;">
                <span class="det-price" id="d-price">$0.00</span>
                <span style="color:#999; font-size:0.9rem;">/ unidad</span>
            </div>
            <h2 class="det-name" id="d-name">Cargando producto...</h2>

            <div class="selector-box">
                <span class="label-sm">Seleccionar Color / Estilo</span>
                <div style="display: flex; gap: 15px;" id="color-options">
                    <div class="color-dot active" style="background: #111;" onclick="selectColor(this)"></div>
                    <div class="color-dot" style="background: #e0e0e0;" onclick="selectColor(this)"></div>
                    <div class="color-dot" style="background: #0044ff;" onclick="selectColor(this)"></div>
                </div>
            </div>

            <div class="selector-box" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span class="label-sm" style="margin:0;">Cantidad</span>
                    <p style="font-size: 0.65rem; color: #999;">Pedido mín: <span id="d-moq">12</span> unids.</p>
                </div>
                <div class="qty-control" style="width: 130px;">
                    <button class="qty-btn" onclick="updateQty(-1)">-</button>
                    <span id="d-qty-val" style="font-weight: 800;">12</span>
                    <button class="qty-btn plus" onclick="updateQty(1)">+</button>
                </div>
            </div>

            <div style="margin-top: 20px; padding: 15px; border-top: 1px solid #eee;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span style="color:#888; font-size:0.85rem;">Total estimado:</span>
                    <span id="d-total" style="font-weight: 800; color: var(--verde-ok);">$0.00</span>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn-act btn-cotizar" onclick="solicitarCotizacion()">Cotizar Ulises</button>
            <button class="btn-act btn-mensaje" onclick="alert('Abriendo Messenger...')">Mensaje</button>
        </div>
    </div>

    <div id="view-tips" class="view"></div>
    <div id="view-chats" class="view"></div>
    <div id="view-carrito" class="view"></div>
    <div id="view-perfil" class="view"></div>

    <nav class="tab-bar">
        <div class="tab-btn active" onclick="switchView('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></div>
        <div class="tab-btn" onclick="switchView('tips')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg><span>Tips</span></div>
        <div class="tab-btn" onclick="switchView('chats')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Mensajes</span></div>
        <div class="tab-btn" onclick="switchView('carrito')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Carrito</span></div>
        <div class="tab-btn" onclick="switchView('perfil')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Mi Centro</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedProduct = null;
        let selectedQty = 1;

        // --- NAVEGACIÓN ---
        window.switchView = (id) => {
            closeDetalle();
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- CARGA DE PRODUCTOS ---
        async function loadProducts() {
            const snap = await getDocs(collection(db, "productos"));
            const feed = document.getElementById('main-feed');
            feed.innerHTML = snap.docs.map(doc => {
                const p = doc.data();
                return `
                    <div class="prod-card" onclick='openDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <img src="${p.imagen}">
                        <div class="prod-info"><p style="font-weight:800;">$${Number(p.precio).toFixed(2)}</p><p style="font-size:0.7rem; color:#888;">${p.nombre}</p></div>
                    </div>
                `;
            }).join('');
        }

        // --- LÓGICA DE DETALLE ---
        window.openDetalle = (p) => {
            selectedProduct = p;
            selectedQty = p.cantidadMinima || 12;
            
            document.getElementById('d-img').src = p.imagen;
            document.getElementById('d-name').innerText = p.nombre;
            document.getElementById('d-price').innerText = `$${Number(p.precio).toFixed(2)}`;
            document.getElementById('d-moq').innerText = selectedQty;
            document.getElementById('d-qty-val').innerText = selectedQty;
            
            updateTotalDisplay();
            
            document.getElementById('view-detalle').classList.add('active');
            document.querySelector('.tab-bar').style.display = 'none';
        };

        window.closeDetalle = () => {
            document.getElementById('view-detalle').classList.remove('active');
            document.querySelector('.tab-bar').style.display = 'flex';
        };

        window.updateQty = (val) => {
            const min = selectedProduct.cantidadMinima || 12;
            selectedQty += val;
            if(selectedQty < min) selectedQty = min;
            document.getElementById('d-qty-val').innerText = selectedQty;
            updateTotalDisplay();
        };

        function updateTotalDisplay() {
            const total = selectedQty * Number(selectedProduct.precio);
            document.getElementById('d-total').innerText = `$${total.toFixed(2)}`;
        }

        window.selectColor = (el) => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        };

        window.solicitarCotizacion = () => {
            alert(`Cotización enviada a Ulises:\n${selectedQty}x ${selectedProduct.nombre}\nTotal: ${document.getElementById('d-total').innerText}`);
            closeDetalle();
        };

        loadProducts();
    </script>
</body>
</html>
