<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROVEED — Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-proveed">
        <div class="logo-master">
            <div class="hex-icon"><div class="check"></div></div>
            <h1 class="logo-text" style="color: var(--negro);">PROVEED</h1>
        </div>
    </header>

    <div id="product-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", projectId: "proveed-8cb7c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function load() {
            const snap = await getDocs(collection(db, "productos"));
            const grid = document.getElementById('product-grid');
            grid.innerHTML = snap.docs.map(doc => {
                const p = doc.data();
                return `
                    <div style="background: var(--gris-d); border-radius: 20px; overflow: hidden; border: 1px solid #333;">
                        <img src="${p.imagen}" style="width: 100%; height: 150px; object-fit: cover;">
                        <div style="padding: 12px;">
                            <p style="color: var(--lima); font-weight: 800;">$${p.precio}</p>
                            <p style="font-size: 0.7rem; color: #aaa;">${p.nombre}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }
        load();
    </script>
</body>
</html>
