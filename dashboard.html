<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROVEED — Super App Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CONFIGURACIÓN GLOBAL */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --lima: #CCFF00; --negro: #0E0E0E; --gris-f: #F7F8F5; --verde-ok: #00a650; --rojo: #FF3B30; }
        body { background: var(--gris-f); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

        /* NAVEGACIÓN DE VISTAS */
        .view { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .view.active { display: block; }

        /* HEADERS */
        .app-header { background: var(--lima); padding: 50px 20px 15px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 1000; }
        .app-header h1 { font-family: 'Syne'; font-size: 1.2rem; text-transform: uppercase; letter-spacing: -0.5px; color: var(--negro); }

        /* --- VISTA: HOME (EXPLORAR) --- */
        .search-container { padding: 15px 20px; }
        .search-bar { background: white; border-radius: 30px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .search-bar input { border: none; outline: none; flex: 1; font-size: 0.9rem; }
        
        .prod-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .prod-card { background: white; border-radius: 18px; overflow: hidden; border: 1px solid #eee; transition: 0.2s; }
        .prod-card img { width: 100%; height: 155px; object-fit: cover; background: #f9f9f9; }
        .prod-info { padding: 10px; }
        .prod-price { font-weight: 800; font-size: 1.1rem; color: var(--negro); }

        /* --- VISTA: PERFIL (GESTIÓN COMPLETA) --- */
        .perfil-card { background: var(--lima); padding: 30px 20px 55px; text-align: left; }
        .user-row { display: flex; align-items: center; gap: 15px; }
        .user-row img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; }
        
        /* ESTADOS DE PEDIDO */
        .order-status-row { background: white; margin: -35px 20px 20px; border-radius: 22px; padding: 20px 10px; display: flex; justify-content: space-around; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        .status-box { text-align: center; position: relative; flex: 1; }
        .status-box svg { width: 24px; height: 24px; margin-bottom: 6px; stroke: #444; fill: none; stroke-width: 2; }
        .status-box span { font-size: 0.65rem; font-weight: 700; color: #777; }
        .badge { position: absolute; top: -5px; right: 12px; background: var(--rojo); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: 800; border: 2px solid white; }

        /* GRID DE HERRAMIENTAS */
        .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 0 20px; text-align: center; }
        .tool-item { background: white; padding: 15px 5px; border-radius: 18px; border: 1px solid #eee; }
        .tool-item svg { width: 22px; height: 22px; stroke: #555; stroke-width: 2; margin-bottom: 5px; }
        .tool-item p { font-size: 0.6rem; font-weight: 700; color: #444; }

        /* --- TAB BAR INFERIOR --- */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; border-top: 1px solid #eee; z-index: 2000; padding-bottom: 20px; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; cursor: pointer; }
        .tab-btn.active { color: var(--negro); }
        .tab-btn svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .tab-btn span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

        /* MODAL DE CONSULTA RÁPIDA (VIDEO 0:54) */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; align-items: flex-end; }
        .modal-sheet { background: white; width: 100%; border-radius: 25px 25px 0 0; padding: 25px; transform: translateY(100%); transition: 0.3s ease; }
        .modal-sheet.up { transform: translateY(0); }
        .btn-enviar-modal { background: var(--negro); color: var(--lima); border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="view-home" class="view active">
        <header class="app-header"><h1>Explorar</h1></header>
        <div class="search-container">
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" placeholder="Buscar productos, marcas...">
            </div>
        </div>
        <div class="prod-grid" id="main-feed">
            </div>
    </div>

    <div id="view-chats" class="view">
        <header class="app-header"><h1>Mis Mensajes</h1></header>
        <div id="lista-chats" style="padding: 20px; text-align: center; color: #999;">
            <p style="margin-top: 40px;">No tienes mensajes nuevos.</p>
        </div>
    </div>

    <div id="view-perfil" class="view">
        <div class="perfil-card">
            <div class="user-row">
                <img src="https://via.placeholder.com/100" id="user-avatar">
                <div>
                    <h2 id="userName" style="font-family:'Syne';">Luis Alejandro</h2>
                    <span style="background: rgba(0,0,0,0.1); padding: 3px 10px; border-radius: 12px; font-size: 0.65rem; font-weight: 800;">EMPRENDEDOR GOLD</span>
                </div>
            </div>
        </div>
        
        <div class="order-status-row">
            <div class="status-box">
                <div class="badge">1</div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                <span>Por pagar</span>
            </div>
            <div class="status-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 17h4V5H2v12h3m15 0h1v-4h-3l-3-4h-5v8h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
                <span>Por enviar</span>
            </div>
            <div class="status-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3m18 0v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0-9 6-9-6"/></svg>
                <span>En camino</span>
            </div>
            <div class="status-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span>Recibido</span>
            </div>
        </div>

        <p style="padding: 0 20px 15px; font-family:'Syne'; font-size: 0.9rem;">Servicios y Herramientas</p>
        <div class="tools-grid">
            <div class="tool-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                <p>Logística</p>
            </div>
            <div class="tool-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 5l-1.761 4.239L9 11l4.239 1.761L15 17l1.761-4.239L21 11l-4.239-1.761z"/></svg>
                <p>Cupones</p>
            </div>
            <div class="tool-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00a650"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <p>Seguro</p>
            </div>
            <div class="tool-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <p>Favoritos</p>
            </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-sheet" id="modal-content">
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <img id="modal-img" src="" style="width: 80px; height: 80px; border-radius: 12px; object-fit: cover;">
                <div>
                    <h3 id="modal-price" style="font-size: 1.2rem; font-weight: 800;"></h3>
                    <p style="font-size: 0.8rem; color: #888;">Precio mayorista disponible</p>
                </div>
            </div>
            <textarea placeholder="Hola, me interesa este producto..." style="width: 100%; height: 80px; border-radius: 12px; border: 1px solid #ddd; padding: 12px; font-family: inherit; outline: none;"></textarea>
            <button class="btn-enviar-modal">Enviar Consulta</button>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-btn active" onclick="switchView('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </div>
        <div class="tab-btn" onclick="switchView('chats')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Mensajes</span>
        </div>
        <div class="tab-btn" onclick="switchView('perfil')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Perfil</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
            projectId: "proveed-8cb7c",
            // Agrega aquí tu appId y resto de config si los tienes
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DE NAVEGACIÓN ---
        window.switchView = (viewId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- CARGA DE CATÁLOGO ---
        async function loadProducts() {
            const snap = await getDocs(collection(db, "productos"));
            const feed = document.getElementById('main-feed');
            feed.innerHTML = snap.docs.map(doc => {
                const p = doc.data();
                return `
                    <div class="prod-card" onclick='openModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <img src="${p.imagen}">
                        <div class="prod-info">
                            <p class="prod-price">$${Number(p.precio).toFixed(2)}</p>
                            <p style="font-size:0.75rem; color:#777;">${p.nombre}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- LÓGICA DEL MODAL (VIDEO 0:54) ---
        window.openModal = (p) => {
            document.getElementById('modal-img').src = p.imagen;
            document.getElementById('modal-price').innerText = `$${Number(p.precio).toFixed(2)}`;
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.style.display = 'flex';
            setTimeout(() => content.classList.add('up'), 10);
        };

        window.closeModal = (e) => {
            if(e.target.id === 'modal-overlay') {
                const content = document.getElementById('modal-content');
                content.classList.remove('up');
                setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
            }
        };

        loadProducts();
    </script>
</body>
</html>
